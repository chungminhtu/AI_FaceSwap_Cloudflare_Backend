portrait_f_4.json\",\n  \"lottie_avif_1.5x\": \"preset_thumb/lottie_avif_1.5x/fs_frosted_window_portrait_f_4.json\",\n  \"lottie_avif_2x\": \"preset_thumb/lottie_avif_2x/fs_frosted_window_portrait_f_4.json\",\n  \"lottie_avif_3x\": \"preset_thumb/lottie_avif_3x/fs_frosted_window_portrait_f_4.json\",\n  \"lottie_avif_4x\": \"preset_thumb/lottie_avif_4x/fs_frosted_window_portrait_f_4.json\"\n}\n```\n\n**Key trong JSON = `{folderType}_{resolution}`**\n**Value trong JSON = R2 key (full path tб»« root)**\n\n**CГЎch xГўy dб»ұng URL tб»« R2 key:**\n\n1. LбәҘy R2 key tб»« database: `preset_thumb/lottie_1x/fs_frosted_window_portrait_f_4.json`\n2. Kбәҝt hб»Јp vб»ӣi R2 public domain: `https://resources.d.shotpix.app/{bucket-name}/{r2Key}`\n3. Kбәҝt quбәЈ: `https://resources.d.shotpix.app/faceswap-images-office-dev/preset_thumb/lottie_1x/fs_frosted_window_portrait_f_4.json`\n\n**LЖ°u ГҪ quan trб»Қng:**\n\n1. **KhГҙng cГі duplicate folders:** URL khГҙng bao giб»қ cГі dбәЎng `preset_thumb/lottie_1x/lottie_1x/` (folder name bб»Ӣ lбә·p). Format Д‘Гәng lГ  `preset_thumb/lottie_1x/{presetId}.json`.\n\n2. **Preset ID extraction:** Preset ID Д‘Ж°б»Јc extract tб»« filename (basename), khГҙng bao gб»“m path. VГӯ dб»Ҙ:\n   - File: `lottie_1x/fs_frosted_window_portrait_f_4.json`\n   - Preset ID: `fs_frosted_window_portrait_f_4` (khГҙng phбәЈi `lottie_1x/fs_frosted_window_portrait_f_4`)\n\n3. **Bucket name:** Bucket name khГЎc nhau theo environment:\n   - Development: `faceswap-images-office-dev`\n   - Production: `faceswap-images-office-prod`\n   - Default: `faceswap-images-office`\n\n4. **R2 Public Domain:** LuГҙn sб»ӯ dб»Ҙng `https://resources.d.shotpix.app` cho public URLs.\n\n5. **Cache Control:** TбәҘt cбәЈ thumbnails cГі cache control header: `public, max-age=31536000, immutable` (1 nДғm).\n\n**VГӯ dб»Ҙ sб»ӯ dб»Ҙng trong code:**\n\n**JavaScript/TypeScript:**\n```javascript\n// LбәҘy thumbnail URL tб»« database response\nconst preset = {\n  id: \"fs_frosted_window_portrait_f_4\",\n  thumbnail_r2: '{\"lottie_1x\":\"preset_thumb/lottie_1x/fs_frosted_window_portrait_f_4.json\"}'\n};\n\nconst thumbnailData = JSON.parse(preset.thumbnail_r2);\nconst r2Key = thumbnailData['lottie_1x']; // \"preset_thumb/lottie_1x/fs_frosted_window_portrait_f_4.json\"\nconst bucketName = \"faceswap-images-office-dev\";\nconst publicUrl = `https://resources.d.shotpix.app/${bucketName}/${r2Key}`;\n// Result: https://resources.d.shotpix.app/faceswap-images-office-dev/preset_thumb/lottie_1x/fs_frosted_window_portrait_f_4.json\n```\n\n**Mobile App (Swift/Kotlin):**\n```swift\n// Swift example\nlet thumbnailData = try JSONDecoder().decode([String: String].self, from: preset.thumbnailR2.data(using: .utf8)!)\nif let r2Key = thumbnailData[\"lottie_1x\"] {\n    let bucketName = \"faceswap-images-office-dev\"\n    let publicUrl = \"https://resources.d.shotpix.app/\\(bucketName)/\\(r2Key)\"\n    // Use publicUrl to load thumbnail\n}\n```\n\n**Best Practices:**\n\n1. **Fallback resolution:** LuГҙn cГі fallback khi resolution khГҙng tб»“n tбәЎi:\n   ```javascript\n   const thumbnailUrl =\n     thumbnailData['lottie_4x'] ||\n     thumbnailData['lottie_3x'] ||\n     thumbnailData['lottie_2x'] ||\n     thumbnailData['lottie_1x'] ||\n     thumbnailData['webp_4x'] ||\n     thumbnailData['webp_1x'];\n   ```\n\n2. **Format preference:** ЖҜu tiГӘn format theo thб»© tб»ұ:\n   - Lottie AVIF (tб»‘i Ж°u nhбәҘt cho animation)\n   - Lottie (standard animation)\n   - WebP (static image fallback)\n\n3. **Resolution selection:** Chб»Қn resolution dб»ұa trГӘn device pixel ratio:\n   - 1x devices: `1x` hoбә·c `1.5x`\n   - 2x devices (Retina): `2x` hoбә·c `3x`\n   - 3x+ devices (Super Retina): `3x` hoбә·c `4x`\n\n4. **Error handling:** LuГҙn kiб»ғm tra URL tб»“n tбәЎi trЖ°б»ӣc khi sб»ӯ dб»Ҙng:\n   ```javascript\n   if (thumbnailUrl && thumbnailUrl.startsWith('https://')) {\n     // Safe to use\n   }\n   ```\n\n---\n",
      "API_SYSTEM_VI.md": "# 5. Hб»Ү thб»‘ng & CбәҘu hГ¬nh\n\n## 5.1. GET `/config` - LбәҘy config\n\n**Mб»Ҙc Д‘Гӯch:** LбәҘy cбәҘu hГ¬nh public cб»§a Worker (custom domains).\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Request:**\n```bash\ncurl https://api.d.shotpix.app/config\n```\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"backendDomain\": \"https://api.d.shotpix.app\",\n    \"r2Domain\": \"https://resources.d.shotpix.app\",\n    \"kvCache\": {\n      \"available\": true,\n      \"test\": \"success\",\n      \"details\": {\n        \"bindingName\": \"PROMPT_CACHE_KV\",\n        \"envKeys\": [\"PROMPT_CACHE_KV_BINDING_NAME\", \"...\"]\n      }\n    }\n  },\n  \"status\": \"success\",\n  \"message\": \"Config retrieved successfully\",\n  \"code\": 200\n}\n```\n\n---\n\n## 5.2. OPTIONS `/*` - CORS preflight requests\n\n**Mб»Ҙc Д‘Гӯch:** Xб»ӯ lГҪ CORS preflight requests cho tбәҘt cбәЈ cГЎc endpoints. Tб»ұ Д‘б»ҷng Д‘Ж°б»Јc gб»Қi bб»ҹi trГ¬nh duyб»Үt khi thб»ұc hiб»Үn cross-origin requests.\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Response:**\n\nTrбәЈ vб»Ғ HTTP 204 (No Content) vб»ӣi cГЎc headers CORS:\n- `Access-Control-Allow-Origin`: Cho phГ©p tбәҘt cбәЈ origins\n- `Access-Control-Allow-Methods`: GET, POST, PUT, DELETE, OPTIONS\n- `Access-Control-Allow-Headers`: Content-Type, Authorization, X-API-Key, vГ  cГЎc headers khГЎc\n- `Access-Control-Max-Age`: 86400 (24 giб»қ)\n\nEndpoint `/upload-proxy/*` cГі hб»— trб»Ј thГӘm method PUT trong CORS headers.\n\n---\n",
      "API_TONG_QUAN_VI.md": "# Tб»•ng quan API Face Swap AI\n\nTГ i liб»Үu nГ y mГҙ tбәЈ Д‘бә§y Д‘б»§ cГЎc Д‘iб»ғm cuб»‘i (endpoint) mГ  Cloudflare Worker cung cбәҘp.\n\n**Base URL:** `https://api.d.shotpix.app`\n\n---\n\n## Mб»Ҙc lб»Ҙc\n\n- [XГЎc thб»ұc API](#xГЎc-thб»ұc-api-api-authentication)\n- [APIs cбә§n tГӯch hб»Јp vб»ӣi mobile](#apis-cбә§n-tГӯch-hб»Јp-vб»ӣi-mobile-22-apis)\n- [Provider Aspect Ratio (Vertex / WaveSpeed)](#provider-aspect-ratio-vertex--wavespeed)\n- [AI Model / Provider theo tб»«ng API](#ai-model--provider-theo-tб»«ng-api)\n- [Error Codes Reference](#error-codes-reference)\n- [API Endpoints (Chi tiбәҝt)](#api-endpoints-chi-tiбәҝt)\n  - [1. Upload & QuбәЈn lГҪ File](API_UPLOAD_VI.md)\n  - [2. AI Processing](API_AI_PROCESSING_VI.md)\n  - [3. QuбәЈn lГҪ Profile](API_PROFILE_DATA_VI.md)\n  - [4. Truy vбәҘn Dб»Ҝ liб»Үu](API_PROFILE_DATA_VI.md#4-truy-vбәҘn-dб»Ҝ-liб»Үu)\n  - [5. Hб»Ү thб»‘ng & CбәҘu hГ¬nh](API_SYSTEM_VI.md)\n  - [6. Thanh toГЎn & Subscription](API_BILLING_VI.md)\n- [Tб»•ng kбәҝt](#tб»•ng-kбәҝt)\n\n---\n\n## XГЎc thб»ұc API (API Authentication)\n\n### Mobile API Key Authentication\n\nHб»Ү thб»‘ng hб»— trб»Ј xГЎc thб»ұc bбәұng API key cho cГЎc mobile APIs. TГӯnh nДғng nГ y cГі thб»ғ Д‘Ж°б»Јc bбәӯt/tбәҜt thГҙng qua biбәҝn mГҙi trЖ°б»қng `ENABLE_MOBILE_API_KEY_AUTH`.\n\n**Khi bбәӯt (`ENABLE_MOBILE_API_KEY_AUTH=true`):**\n- CГЎc mobile APIs Д‘Ж°б»Јc bбәЈo vб»Ү yГӘu cбә§u API key trong request header\n- API key cГі thб»ғ Д‘Ж°б»Јc gб»ӯi qua:\n  - Header `X-API-Key`: `X-API-Key: your_api_key_here`\n  - Header `Authorization`: `Authorization: Bearer your_api_key_here`\n\n**CГЎc endpoints Д‘Ж°б»Јc bбәЈo vб»Ү (khi authentication Д‘Ж°б»Јc bбәӯt):**\n- POST `/upload-url` (type=selfie) - Chб»ү khi upload selfie\n- POST `/faceswap`\n- POST `/background`\n- POST `/enhance`\n- POST `/beauty`\n- POST `/filter`\n- POST `/restore`\n- POST `/aging`\n- POST `/upscaler4k`\n- POST `/remove-object`\n- POST `/expression`\n- POST `/expand`\n- POST `/replace-object`\n- POST `/remove-text`\n- POST `/editor`\n- POST `/hair-style`\n- POST `/upload-url` (type=mask) - Upload mask image\n- POST `/profiles` - Chб»ү khi tбәЎo profile mб»ӣi\n- GET `/profiles/{id}` - Chб»ү khi lбәҘy profile theo ID\n- DELETE `/results/{id}` - XГіa result\n\n**LЖ°u ГҪ:**\n- POST `/upload-url` (type=preset) khГҙng yГӘu cбә§u API key (backend only)\n- CГЎc endpoints khГЎc khГҙng nбәұm trong danh sГЎch trГӘn khГҙng yГӘu cбә§u API key\n\n---\n\n**TбәЎo API Key:**\n\nSб»ӯ dб»Ҙng script `generate-api-key.js` Д‘б»ғ tбәЎo API key mб»ӣi:\n\n```bash\nnode backend-cloudflare-workers/generate-api-key.js\n```\n\nScript sбәҪ tбәЎo mб»ҷt API key ngбә«u nhiГӘn 32 bytes (256 bits) vГ  hiб»ғn thб»Ӣ hЖ°б»ӣng dбә«n thГӘm vГ o `deployments-secrets.json`:\n\n```json\n{\n  \"MOBILE_API_KEY\": \"your_generated_key_here\",\n  \"ENABLE_MOBILE_API_KEY_AUTH\": \"true\"\n}\n```\n\n**VГӯ dб»Ҙ request vб»ӣi API key:**\n\n```bash\ncurl -X POST https://api.d.shotpix.app/faceswap \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"preset_1234567890_abc123\",\n    \"selfie_ids\": [\"selfie_1234567890_xyz789\"],\n    \"profile_id\": \"profile_1234567890\"\n  }'\n```\n\nHoбә·c sб»ӯ dб»Ҙng Authorization header:\n\n```bash\ncurl -X POST https://api.d.shotpix.app/faceswap \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"preset_1234567890_abc123\",\n    \"selfie_ids\": [\"selfie_1234567890_xyz789\"],\n    \"profile_id\": \"profile_1234567890\"\n  }'\n```\n\n**Error Response (401 Unauthorized):**\n\nKhi API key khГҙng hб»Јp lб»Ү hoбә·c thiбәҝu:\n\n```json\n{\n  \"data\": null,\n  \"status\": \"error\",\n  \"message\": \"Unauthorized\",\n  \"code\": 401\n}\n```\n\n---\n\n## APIs cбә§n tГӯch hб»Јp vб»ӣi mobile (22 APIs)\n\n**Tб»•ng sб»‘ API endpoints: 30**\n\n### APIs cбә§n tГӯch hб»Јp vб»ӣi mobile (22 APIs)\n\n1. POST `/upload-url` (type=selfie) - Upload selfie\n2. POST `/upload-url` (type=mask) - Upload mask image (cho remove object)\n3. POST `/faceswap` - Дҗб»•i mбә·t (Face Swap) - luГҙn dГ№ng Vertex AI, hб»— trб»Ј multiple selfies\n4. POST `/background` - TбәЎo nб»Ғn AI (AI Background)\n5. POST `/enhance` - AI enhance бәЈnh (cбәЈi thiб»Үn chбәҘt lЖ°б»Јng kб»№ thuбәӯt)\n6. POST `/beauty` - AI beautify бәЈnh (cбәЈi thiб»Үn thбә©m mб»№ khuГҙn mбә·t)\n7. POST `/filter` - AI Filter (Styles) - ГҒp dб»Ҙng style tб»« preset lГӘn selfie\n8. POST `/restore` - AI khГҙi phб»Ҙc vГ  nГўng cбәҘp бәЈnh\n9. POST `/aging` - AI lГЈo hГіa khuГҙn mбә·t\n10. POST `/upscaler4k` - AI upscale бәЈnh lГӘn 4K\n11. POST `/remove-object` - AI xГіa vбәӯt thб»ғ khб»Ҹi бәЈnh bбәұng mask\n12. POST `/expression` - AI thay Д‘б»•i biб»ғu cбәЈm khuГҙn mбә·t\n13. POST `/expand` - AI mб»ҹ rб»ҷng бәЈnh\n14. POST `/replace-object` - AI thay thбәҝ vбәӯt thб»ғ trong бәЈnh\n15. POST `/remove-text` - AI xГіa text khб»Ҹi бәЈnh\n16. POST `/hair-style` - AI thay Д‘б»•i kiб»ғu tГіc\n17. POST `/profiles` - TбәЎo profile\n18. GET `/profiles/{id}` - LбәҘy profile (hб»— trб»Ј cбәЈ Profile ID vГ  Device ID)\n19. PUT `/profiles/{id}` - Cбәӯp nhбәӯt profile (hб»— trб»Ј phone)\n20. DELETE `/profiles/{id}` - XГіa profile (yГӘu cбә§u xГЎc minh: profile_id + user_id + email hoбә·c phone)\n21. GET `/selfies` - Liб»Үt kГӘ selfies\n21. GET `/results` - Liб»Үt kГӘ results (generated images)\n22. DELETE `/results/{id}` - XГіa result\n\n### APIs khГҙng cбә§n tГӯch hб»Јp vб»ӣi mobile (11 APIs)\n\n20. GET `/profiles` - Liб»Үt kГӘ profiles\n21. POST `/upload-url` (type=preset) - Upload preset (backend only)\n22. GET `/presets` - Liб»Үt kГӘ presets\n23. GET `/presets/{id}` - LбәҘy preset theo ID (bao gб»“m prompt_json)\n24. DELETE `/presets/{id}` - XГіa preset\n25. DELETE `/selfies/{id}` - XГіa selfie\n26. POST `/upload-thumbnails` - TбәЈi lГӘn thumbnails vГ  presets (batch)\n27. GET `/thumbnails` - Liб»Үt kГӘ thumbnails\n28. GET `/thumbnails/{id}/preset` - LбәҘy preset_id tб»« thumbnail_id\n29. GET `/config` - LбәҘy config\n30. OPTIONS `/*` - CORS preflight requests\n\n---\n\n## Provider Aspect Ratio (Vertex / WaveSpeed)\n\nBackend hб»— trб»Ј hai provider: **Vertex AI** vГ  **WaveSpeed**. Mб»—i provider cГі cГЎch xб»ӯ lГҪ aspect ratio vГ  kГӯch thЖ°б»ӣc khГЎc nhau.\n\n### Vertex AI (Google)\n- **Chб»ү dГ№ng tб»· lб»Ү chuбә©n.** бәўnh input Д‘Ж°б»Јc map sang tб»· lб»Ү hб»— trб»Ј gбә§n nhбәҘt; tб»· lб»Ү gб»‘c cГі thб»ғ khГҙng giб»Ҝ nguyГӘn.\n- **Tб»· lб»Ү hб»— trб»Ј:** 1:1, 3:2, 2:3, 3:4, 4:3, 4:5, 5:4, 9:16, 16:9, 21:9.\n- **DГ№ng khi:** Cбә§n tб»· lб»Ү chuбә©n (9:16 stories, 1:1 posts, v.v.).\n\n### WaveSpeed\n- **Giб»Ҝ nguyГӘn tб»· lб»Ү gб»‘c.** Hб»— trб»Ј custom dimensions 256вҖ“1536 px mб»—i cбәЎnh; scale tб»· lб»Ү trong giб»ӣi hбәЎn.\n- **Giб»ӣi hбәЎn:** Min 256px, max 1536px mб»—i cбәЎnh.\n- **DГ№ng khi:** Cбә§n giб»Ҝ Д‘Гәng tб»· lб»Ү бәЈnh gб»‘c, khГҙng crop mГ©o.\n\n### So sГЎnh\n\n| Feature | Vertex AI | WaveSpeed |\n|---------|-----------|-----------|\n| Aspect Ratio | Chб»ү tб»· lб»Ү chuбә©n | Custom dimensions |\n| Giб»Ҝ tб»· lб»Ү | Snap gбә§n nhбәҘt | Giб»Ҝ chГӯnh xГЎc |\n| KГӯch thЖ°б»ӣc | Theo ratio | 256вҖ“1536px linh hoбәЎt |\n\n### Override theo request\n\nMб»Қi endpoint AI cГі thб»ғ gб»ӯi `\"provider\": \"vertex\"`, `\"provider\": \"wavespeed\"` (Flux), hoбә·c `\"provider\": \"wavespeed_gemini_2_5_flash_image\"` (Gemini 2.5 Flash Image qua WaveSpeed). Mбә·c Д‘б»Ӣnh theo env `IMAGE_PROVIDER`.\n\n### Endpoints ГЎp dб»Ҙng\n\n`/enhance`, `/beauty`, `/restore`, `/aging`, `/filter`, `/faceswap` вҖ” Д‘б»Ғu hб»— trб»Ј cбәЈ hai provider vб»ӣi hГ nh vi trГӘn.\n\n---\n\n## AI Model / Provider theo tб»«ng API\n\n| Endpoint | Provider URL | Дҗiб»ғm | Chi phГӯ/lбә§n |\n|----------|-------------|------|-------------|\n| POST `/enhance` | `api.wavespeed.ai/api/v3/google/gemini-2.5-flash-image/edit` hoбә·c `.../flux-2-klein-9b/edit` | 2 | $0.038 / $0.016 |\n| POST `/restore` | `api.wavespeed.ai/api/v3/google/gemini-2.5-flash-image/edit` hoбә·c `.../flux-2-klein-9b/edit` | 2 | $0.038 / $0.016 |\n| POST `/upscaler4k` | `api.wavespeed.ai/api/v1/wavespeed-ai/image-upscaler` | 5 | $0.010 |\n| POST `/beauty` | `api.wavespeed.ai/api/v1/wavespeed-ai/flux-2-klein-9b/edit` | 2 | $0.016 |\n| POST `/filter` | `api.wavespeed.ai/api/v1/wavespeed-ai/flux-2-klein-9b/edit` | 3 | $0.016 |\n| POST `/faceswap` | `api.wavespeed.ai/api/v1/wavespeed-ai/flux-2-klein-9b/edit` | 5 | $0.016 |\n| POST `/expression` | Vertex AI Gemini (`aiplatform.googleapis.com`) | 1 | вҖ” |\n| POST `/hair-style` | `api.wavespeed.ai/api/v3/wavespeed-ai/flux-2-klein-9b/edit` | 1 | $0.016 |\n| POST `/aging` | `api.wavespeed.ai/api/v3/google/gemini-2.5-flash-image/edit` | 1 | $0.038 |\n| POST `/remove-object` | `api.wavespeed.ai/api/v3/bria/eraser` | 1 | $0.040 |\n| POST `/background` | `api.wavespeed.ai/api/v3/bytedance/seedream-v4/edit-sequential` | 5 | $0.027 |\n| POST `/expand` | `api.wavespeed.ai/api/v3/wavespeed-ai/flux-2-klein-9b/edit` | 2 | $0.016 |\n| POST `/replace-object` | `api.wavespeed.ai/api/v3/wavespeed-ai/flux-2-klein-9b/edit` | 2 | $0.016 |\n| POST `/remove-text` | `api.wavespeed.ai/api/v3/google/gemini-2.5-flash-image/edit` | 1 | $0.038 |\n| POST `/editor` | `api.wavespeed.ai/api/v3/google/gemini-2.5-flash-image/edit` hoбә·c `.../flux-2-klein-9b/edit` | 5 | $0.016-$0.038 |\n\n> **Ghi chГә:** GiГЎ tб»« [WaveSpeed.ai](https://wavespeed.ai/pricing) вҖ” cГі thб»ғ thay Д‘б»•i. `/enhance` vГ  `/restore` tб»ұ Д‘б»ҷng chб»Қn model theo kГӯch thЖ°б»ӣc бәЈnh: nhб»Ҹ (< 800px) dГ№ng Gemini 2.5 Flash Image, lб»ӣn (вүҘ 800px) dГ№ng Flux 2 Klein 9B v3. Дҗiб»ғm = chi phГӯ credits khi `ENABLE_CREDIT_SYSTEM=true`, cГі thб»ғ override bбәұng env var `CREDIT_COST_*`.\n\n---\n\n## Error Codes Reference\n\n### Vision API Safety Error Codes (1001-1005) & Flat Color Detection (1010)\n\nCГЎc error codes nГ y Д‘Ж°б»Јc trбәЈ vб»Ғ khi Google Vision API SafeSearch phГЎt hiб»Үn nб»ҷi dung khГҙng phГ№ hб»Јp trong бәЈnh, hoбә·c khi phГЎt hiб»Үn бәЈnh Д‘ЖЎn sбәҜc/flat color. ДҗЖ°б»Јc sб»ӯ dб»Ҙng cho:\n- POST `/upload-url` (type=selfie) - Kiб»ғm tra **tбәҘt cбәЈ** бәЈnh selfie trЖ°б»ӣc khi lЖ°u (trб»« custom prompt flow - kiб»ғm tra sau khi generate xong)\n\n| Error Code | Category | MГҙ tбәЈ |\n|------------|----------|-------|\n| **1001** | ADULT | Thб»ғ hiб»Үn khбәЈ nДғng nб»ҷi dung dГ nh cho ngЖ°б»қi lб»ӣn cб»§a hГ¬nh бәЈnh. Nб»ҷi dung dГ nh cho ngЖ°б»қi lб»ӣn cГі thб»ғ bao gб»“m cГЎc yбәҝu tб»‘ nhЖ° khб»Ҹa thГўn, hГ¬nh бәЈnh hoбә·c phim hoбәЎt hГ¬nh khiГӘu dГўm, hoбә·c cГЎc hoбәЎt Д‘б»ҷng tГ¬nh dб»Ҙc. |\n| **1002** | VIOLENCE | HГ¬nh бәЈnh nГ y cГі khбәЈ nДғng chб»©a nб»ҷi dung bбәЎo lб»ұc. Nб»ҷi dung bбәЎo lб»ұc cГі thб»ғ bao gб»“m cГЎi chбәҝt, thЖ°ЖЎng tГӯch nghiГӘm trб»Қng hoбә·c tб»•n hбәЎi Д‘бәҝn cГЎ nhГўn hoбә·c nhГіm cГЎ nhГўn. |\n| **1003** | RACY | KhбәЈ nДғng cao hГ¬nh бәЈnh Д‘Ж°б»Јc yГӘu cбә§u chб»©a nб»ҷi dung khiГӘu dГўm. Nб»ҷi dung khiГӘu dГўm cГі thб»ғ bao gб»“m (nhЖ°ng khГҙng giб»ӣi hбәЎn) quбә§n ГЎo mб»Ҹng manh hoбә·c xuyГӘn thбәҘu, khб»Ҹa thГўn Д‘Ж°б»Јc che Д‘бәӯy mб»ҷt cГЎch khГ©o lГ©o, tЖ° thбәҝ tб»Ҙc tД©u hoбә·c khiГӘu khГӯch, hoбә·c cбәӯn cбәЈnh cГЎc vГ№ng nhбәЎy cбәЈm trГӘn cЖЎ thб»ғ. |\n| **1004** | MEDICAL | RбәҘt cГі thб»ғ Д‘Гўy lГ  hГ¬nh бәЈnh y tбәҝ. |\n| **1005** | SPOOF | XГЎc suбәҘt chбәҝ giб»…u. XГЎc suбәҘt xбәЈy ra viб»Үc chб»үnh sб»ӯa phiГӘn bбәЈn gб»‘c cб»§a hГ¬nh бәЈnh Д‘б»ғ lГ m cho nГі trГҙng hГ i hЖ°б»ӣc hoбә·c phбәЈn cбәЈm. |\n| **1010** | FLAT_COLOR | бәўnh chб»ү chб»©a mГ u Д‘ЖЎn sбәҜc/flat color, khГҙng cГі Д‘б»‘i tЖ°б»Јng hoбә·c ngЖ°б»қi. бәўnh nГ y bб»Ӣ chбә·n Д‘б»ғ ngДғn chбә·n lбәЎm dб»Ҙng tбәЎo nб»ҷi dung khГҙng phГ№ hб»Јp tб»« canvas trб»‘ng. Kiб»ғm tra dб»ұa trГӘn: tб»ү lб»Ү nГ©n (bytes/pixel), entropy byte data, vГ  sб»‘ lЖ°б»Јng byte unique. |\n\n#### TГ¬m kiбәҝm An toГ n (Safe Search)\n\nTбәӯp hб»Јp cГЎc Д‘бә·c Д‘iб»ғm liГӘn quan Д‘бәҝn hГ¬nh бәЈnh, Д‘Ж°б»Јc tГӯnh toГЎn bбәұng cГЎc phЖ°ЖЎng phГЎp thб»Ӣ giГЎc mГЎy tГӯnh trГӘn cГЎc lД©nh vб»ұc tГ¬m kiбәҝm an toГ n (vГӯ dб»Ҙ: ngЖ°б»қi lб»ӣn, giбәЈ mбәЎo, y tбәҝ, bбәЎo lб»ұc).\n\n**CГЎc trЖ°б»қng (Fields):**\n\n- **adult** (Likelihood): Thб»ғ hiб»Үn khбәЈ nДғng nб»ҷi dung dГ nh cho ngЖ°б»қi lб»ӣn cб»§a hГ¬nh бәЈnh. Nб»ҷi dung dГ nh cho ngЖ°б»қi lб»ӣn cГі thб»ғ bao gб»“m cГЎc yбәҝu tб»‘ nhЖ° khб»Ҹa thГўn, hГ¬nh бәЈnh hoбә·c phim hoбәЎt hГ¬nh khiГӘu dГўm, hoбә·c cГЎc hoбәЎt Д‘б»ҷng tГ¬nh dб»Ҙc.\n\n- **spoof** (Likelihood): XГЎc suбәҘt chбәҝ giб»…u. XГЎc suбәҘt xбәЈy ra viб»Үc chб»үnh sб»ӯa phiГӘn bбәЈn gб»‘c cб»§a hГ¬nh бәЈnh Д‘б»ғ lГ m cho nГі trГҙng hГ i hЖ°б»ӣc hoбә·c phбәЈn cбәЈm.\n\n- **medical** (Likelihood): RбәҘt cГі thб»ғ Д‘Гўy lГ  hГ¬nh бәЈnh y tбәҝ.\n\n- **violence** (Likelihood): HГ¬nh бәЈnh nГ y cГі khбәЈ nДғng chб»©a nб»ҷi dung bбәЎo lб»ұc. Nб»ҷi dung bбәЎo lб»ұc cГі thб»ғ bao gб»“m cГЎi chбәҝt, thЖ°ЖЎng tГӯch nghiГӘm trб»Қng hoбә·c tб»•n hбәЎi Д‘бәҝn cГЎ nhГўn hoбә·c nhГіm cГЎ nhГўn.\n\n- **racy** (Likelihood): KhбәЈ nДғng cao hГ¬nh бәЈnh Д‘Ж°б»Јc yГӘu cбә§u chб»©a nб»ҷi dung khiГӘu dГўm. Nб»ҷi dung khiГӘu dГўm cГі thб»ғ bao gб»“m (nhЖ°ng khГҙng giб»ӣi hбәЎn) quбә§n ГЎo mб»Ҹng manh hoбә·c xuyГӘn thбәҘu, khб»Ҹa thГўn Д‘Ж°б»Јc che Д‘бәӯy mб»ҷt cГЎch khГ©o lГ©o, tЖ° thбәҝ tб»Ҙc tД©u hoбә·c khiГӘu khГӯch, hoбә·c cбәӯn cбәЈnh cГЎc vГ№ng nhбәЎy cбәЈm trГӘn cЖЎ thб»ғ.\n\n#### Severity Levels (Дҗб»ҷ nghiГӘm trб»Қng)\n\nGoogle Vision API SafeSearch trбәЈ vб»Ғ mб»©c Д‘б»ҷ nghiГӘm trб»Қng cho mб»—i field (adult, violence, racy, medical, spoof). App kiб»ғm tra **tбәҘt cбәЈ cГЎc fields** vГ  sб»ӯ dб»Ҙng **mб»©c Д‘б»ҷ cao nhбәҘt** trong bбәҘt kб»і field nГ o Д‘б»ғ quyбәҝt Д‘б»Ӣnh cГі chбә·n бәЈnh hay khГҙng:\n\n| Severity Level | GiГЎ trб»Ӣ | MГҙ tбәЈ | CГі bб»Ӣ chбә·n? |\n|----------------|---------|-------|-------------|\n| **VERY_UNLIKELY** | -1 | KhГҙng cГі nб»ҷi dung nhбәЎy cбәЈm, chбәҜc chбәҜn | вң… **Cho phГ©p** |\n| **UNLIKELY** | 0 | KhГҙng cГі nб»ҷi dung nhбәЎy cбәЈm, nhЖ°ng chЖ°a chбәҜc chбәҜn | вң… **Cho phГ©p** |\n| **POSSIBLE** | 1 | CГі thб»ғ cГі nб»ҷi dung nhбәЎy cбәЈm, nhЖ°ng chЖ°a chбәҜc chбәҜn | вқҢ **Chбә·n** |\n| **LIKELY** | 2 | CГі nб»ҷi dung nhбәЎy cбәЈm, chбәҜc chбәҜn | вқҢ **Chбә·n** |\n| **VERY_LIKELY** | 3 | CГі nб»ҷi dung nhбәЎy cбәЈm, chбәҜc chбәҜn | вқҢ **Chбә·n** |\n\n**CГЎch hoбәЎt Д‘б»ҷng:**\n- App kiб»ғm tra tбәҘt cбәЈ 5 fields: `adult`, `violence`, `racy`, `medical`, `spoof`\n- Nбәҝu **bбәҘt kб»і field nГ o** cГі level lГ  `POSSIBLE`, `LIKELY`, hoбә·c `VERY_LIKELY` вҶ’ бәўnh bб»Ӣ chбә·n\n- `statusCode` (1001-1005) Д‘Ж°б»Јc trбәЈ vб»Ғ dб»ұa trГӘn field cГі **mб»©c Д‘б»ҷ cao nhбәҘt** (worst violation)\n- Error code mapping: `adult`=1001, `violence`=1002, `racy`=1003, `medical`=1004, `spoof`=1005\n\n**VГӯ dб»Ҙ:**\n\n**VГӯ dб»Ҙ 1 - бәўnh bб»Ӣ chбә·n:**\n```json\n{\n  \"adult\": \"VERY_UNLIKELY\",\n  \"violence\": \"POSSIBLE\",\n  \"racy\": \"UNLIKELY\",\n  \"medical\": \"VERY_UNLIKELY\",\n  \"spoof\": \"VERY_UNLIKELY\"\n}\n```\nвҶ’ **Kбәҝt quбәЈ:** Bб»Ӣ chбә·n vГ¬ `violence` cГі level `POSSIBLE`. TrбәЈ vб»Ғ `code: 1002` (violence).\n\n**VГӯ dб»Ҙ 2 - бәўnh bб»Ӣ chбә·n (nhiб»Ғu violations):**\n```json\n{\n  \"adult\": \"LIKELY\",\n  \"violence\": \"POSSIBLE\",\n  \"racy\": \"VERY_LIKELY\",\n  \"medical\": \"UNLIKELY\",\n  \"spoof\": \"VERY_UNLIKELY\"\n}\n```\nвҶ’ **Kбәҝt quбәЈ:** Bб»Ӣ chбә·n. `racy` cГі level cao nhбәҘt (`VERY_LIKELY`), nГӘn trбәЈ vб»Ғ `code: 1003` (racy).\n\n**VГӯ dб»Ҙ 3 - бәўnh Д‘Ж°б»Јc phГ©p:**\n```json\n{\n  \"adult\": \"VERY_UNLIKELY\",\n  \"violence\": \"UNLIKELY\",\n  \"racy\": \"VERY_UNLIKELY\",\n  \"medical\": \"UNLIKELY\",\n  \"spoof\": \"VERY_UNLIKELY\"\n}\n```\nвҶ’ **Kбәҝt quбәЈ:** ДҗЖ°б»Јc phГ©p vГ¬ tбәҘt cбәЈ fields Д‘б»Ғu lГ  `VERY_UNLIKELY` hoбә·c `UNLIKELY`.\n\n**VГӯ dб»Ҙ Response khi bб»Ӣ chбә·n:**\n```json\n{\n  \"data\": null,\n  \"status\": \"error\",\n  \"message\": \"Upload failed\",\n  \"code\": 1001\n}\n```\n\n---\n\n### Vertex AI Safety Error Codes (2001-2004)\n\nCГЎc error codes nГ y Д‘Ж°б»Јc trбәЈ vб»Ғ khi Vertex AI Gemini safety filters chбә·n generated image. ДҗЖ°б»Јc sб»ӯ dб»Ҙng cho:\n- POST `/faceswap` - Khi Vertex AI chбә·n generated image\n- POST `/background` - Khi Vertex AI chбә·n generated image\n- POST `/enhance` - Khi Vertex AI chбә·n generated image\n- POST `/beauty` - Khi Vertex AI chбә·n generated image\n- POST `/filter` - Khi Vertex AI chбә·n generated image\n- POST `/restore` - Khi Vertex AI chбә·n generated image\n- POST `/aging` - Khi Vertex AI chбә·n generated image\n\n#### CГЎc loбәЎi tГЎc hбәЎi\n\nBб»ҷ lб»Қc nб»ҷi dung Д‘ГЎnh giГЎ nб»ҷi dung dб»ұa trГӘn cГЎc loбәЎi tГЎc hбәЎi sau:\n\n| Error Code | LoбәЎi nguy hiб»ғm | Sб»ұ Д‘б»Ӣnh nghД©a |\n|------------|----------------|---------------|\n| **2001** | Lб»қi lбәҪ kГӯch Д‘б»ҷng thГ№ hбәӯn | Nhб»Ҝng bГ¬nh luбәӯn tiГӘu cб»ұc hoбә·c gГўy hбәЎi nhбәҜm vГ o danh tГӯnh vГ /hoбә·c cГЎc thuб»ҷc tГӯnh Д‘Ж°б»Јc bбәЈo vб»Ү. |\n| **2002** | QuбәҘy rб»‘i | Nhб»Ҝng lб»қi lбәҪ Д‘e dб»Қa, hДғm dб»Қa, bбәҜt nбәЎt hoбә·c lДғng mбәЎ nhбәҜm vГ o ngЖ°б»қi khГЎc. |\n| **2003** | Nб»ҷi dung khiГӘu dГўm | CГі chб»©a nб»ҷi dung liГӘn quan Д‘бәҝn hГ nh vi tГ¬nh dб»Ҙc hoбә·c cГЎc nб»ҷi dung khiГӘu dГўm khГЎc. |\n| **2004** | Nб»ҷi dung nguy hiб»ғm | ThГәc Д‘бә©y hoбә·c tбәЎo Д‘iб»Ғu kiб»Үn tiбәҝp cбәӯn cГЎc hГ ng hГіa, dб»Ӣch vб»Ҙ vГ  hoбәЎt Д‘б»ҷng cГі hбәЎi. |\n\n#### So sГЎnh Д‘iб»ғm xГЎc suбәҘt vГ  Д‘iб»ғm mб»©c Д‘б»ҷ nghiГӘm trб»Қng (Probability Scores and Severity Scores)\n\nДҗiб»ғm an toГ n xГЎc suбәҘt phбәЈn ГЎnh khбәЈ nДғng phбәЈn hб»“i cб»§a mГҙ hГ¬nh cГі liГӘn quan Д‘бәҝn tГЎc hбәЎi tЖ°ЖЎng б»©ng. NГі cГі mб»ҷt Д‘iб»ғm tin cбәӯy tЖ°ЖЎng б»©ng nбәұm trong khoбәЈng tб»« **0.0 Д‘бәҝn 1.0**, Д‘Ж°б»Јc lГ m trГІn Д‘бәҝn mб»ҷt chб»Ҝ sб»‘ thбәӯp phГўn.\n\nДҗiб»ғm tin cбәӯy Д‘Ж°б»Јc chia thГ nh bб»‘n mб»©c Д‘б»ҷ tin cбәӯy:\n\n| Mб»©c Д‘б»ҷ tin cбәӯy | GiГЎ trб»Ӣ | MГҙ tбәЈ | CГі bб»Ӣ chбә·n? |\n|----------------|---------|-------|-------------|\n| **NEGLIGIBLE** | RбәҘt thбәҘp | KhбәЈ nДғng cГі nб»ҷi dung gГўy hбәЎi lГ  khГҙng Д‘ГЎng kб»ғ | вң… **Cho phГ©p** |\n| **LOW** | ThбәҘp | KhбәЈ nДғng cГі nб»ҷi dung gГўy hбәЎi lГ  thбәҘp | вң… **Cho phГ©p** |\n| **MEDIUM** | Trung bГ¬nh | KhбәЈ nДғng cГі nб»ҷi dung gГўy hбәЎi lГ  trung bГ¬nh | вң… **Cho phГ©p** |\n| **HIGH** | Cao | KhбәЈ nДғng cГі nб»ҷi dung gГўy hбәЎi lГ  cao | вқҢ **Chбә·n** |\n\n#### Safety Threshold Configuration\n\n**CбәҘu hГ¬nh hiб»Үn tбәЎi:**\n- вң… **Cho phГ©p**: `NEGLIGIBLE`, `LOW`, `MEDIUM`\n- вқҢ **Chбә·n**: `HIGH` only\n\n**ГҒp dб»Ҙng cho tбәҘt cбәЈ cГЎc loбәЎi tГЎc hбәЎi:**\n- HARM_CATEGORY_HATE_SPEECH (Lб»қi lбәҪ kГӯch Д‘б»ҷng thГ№ hбәӯn)\n- HARM_CATEGORY_HARASSMENT (QuбәҘy rб»‘i)\n- HARM_CATEGORY_SEXUALLY_EXPLICIT (Nб»ҷi dung khiГӘu dГўm)\n- HARM_CATEGORY_DANGEROUS_CONTENT (Nб»ҷi dung nguy hiб»ғm)\n\n**LЖ°u ГҪ:**\n- App chб»ү chбә·n nб»ҷi dung khi phГЎt hiб»Үn vi phбәЎm vб»ӣi `HIGH` confidence level\n- Nб»ҷi dung vб»ӣi `NEGLIGIBLE`, `LOW`, hoбә·c `MEDIUM` confidence level Д‘б»Ғu Д‘Ж°б»Јc cho phГ©p\n- Safety violations trбәЈ vб»Ғ HTTP 422 vб»ӣi internal error codes 2001-2004 trong trЖ°б»қng `code`\n- Message trбәЈ vб»Ғ tб»« Vertex AI API response (cГі thб»ғ lГ  finishMessage, refusalText, hoбә·c generic message)\n\n**VГӯ dб»Ҙ Response:**\n```json\n{\n  \"data\": null,\n  \"status\": \"error\",\n  \"message\": \"Processing failed\",\n  \"code\": 2003\n}\n```\n\n---\n\n### HTTP Status Codes\n\nNgoГ i cГЎc error codes trГӘn, API cЕ©ng trбәЈ vб»Ғ cГЎc HTTP status codes chuбә©n:\n\n| Status Code | MГҙ tбәЈ |\n|-------------|-------|\n| **200** | Success |\n| **400** | Bad Request - Request khГҙng hб»Јp lб»Ү |\n| **401** | Unauthorized - API key khГҙng hб»Јp lб»Ү hoбә·c thiбәҝu (khi `ENABLE_MOBILE_API_KEY_AUTH=true`) |\n| **422** | Unprocessable Entity - Content bб»Ӣ chбә·n (sб»ӯ dб»Ҙng error codes 1001-1005, 1010 hoбә·c 2001-2004) |\n| **429** | Rate Limit Exceeded - VЖ°б»Јt quГЎ giб»ӣi hбәЎn request |\n| **500** | Internal Server Error - Lб»—i server |\n\n**LЖ°u ГҪ:**\n- Error codes 1001-1005, 1010 vГ  2001-2004 Д‘Ж°б»Јc trбәЈ vб»Ғ trong trЖ°б»қng `code` cб»§a response body\n- HTTP status code luГҙn lГ  422 cho cГЎc safety violations (content bб»Ӣ chбә·n)\n- Chi tiбәҝt vб»Ғ violation cГі thб»ғ Д‘Ж°б»Јc tГ¬m thбәҘy trong `debug.vision` (cho Vision API) hoбә·c `debug.provider` (cho Vertex AI)\n\n---\n\n## Tб»•ng kбәҝt\n\n**Tб»•ng sб»‘ API endpoints: 33**\n\nXem danh sГЎch Д‘бә§y Д‘б»§ tбәЎi [APIs cбә§n tГӯch hб»Јp vб»ӣi mobile](#apis-cбә§n-tГӯch-hб»Јp-vб»ӣi-mobile-22-apis) б»ҹ Д‘бә§u tГ i liб»Үu.\n\n---\n\n## Custom Domain\n\n- **Worker API Domain**: `https://api.d.shotpix.app` - DГ№ng cho tбәҘt cбәЈ API endpoints\n- **R2 Public Domain**: `https://resources.d.shotpix.app` - DГ№ng cho public URLs cб»§a files trong R2 bucket\n- Format R2 public URL: `https://resources.d.shotpix.app/{bucket-name}/{key}`\n",
      "API_UPLOAD_VI.md": "# 1. Upload & QuбәЈn lГҪ File\n\n## 1.1. POST `/upload-url` (type=selfie) - Upload selfie\n\n**Mб»Ҙc Д‘Гӯch:** TбәЈi бәЈnh selfie trб»ұc tiбәҝp lГӘn server vГ  lЖ°u vГ o database. Endpoint nГ y Д‘Ж°б»Јc sб»ӯ dб»Ҙng bб»ҹi mobile app Д‘б»ғ upload selfie.\n\n**Authentication:** YГӘu cбә§u API key khi `ENABLE_MOBILE_API_KEY_AUTH=true` (chб»ү ГЎp dб»Ҙng cho `type=selfie`).\n\n**Request:**\n\n**Upload single selfie vб»ӣi action:**\n```bash\ncurl -X POST https://api.d.shotpix.app/upload-url \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -F \"files=@/path/to/selfie.jpg\" \\\n  -F \"type=selfie\" \\\n  -F \"profile_id=profile_1234567890\" \\\n  -F \"action=faceswap\" \\\n  -F \"dimensions=1024x768\"\n```\n\n**Upload multiple selfies vб»ӣi dimensions array:**\n```bash\ncurl -X POST https://api.d.shotpix.app/upload-url \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -F \"files=@/path/to/selfie1.jpg\" \\\n  -F \"files=@/path/to/selfie2.jpg\" \\\n  -F \"type=selfie\" \\\n  -F \"profile_id=profile_1234567890\" \\\n  -F \"action=faceswap\" \\\n  -F 'dimensions=[\"1024x768\", \"800x600\"]'\n```\n\n**JSON vб»ӣi image_urls vГ  dimensions array:**\n```bash\ncurl -X POST https://api.d.shotpix.app/upload-url \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_urls\": [\"https://example.com/selfie1.jpg\", \"https://example.com/selfie2.jpg\"],\n    \"type\": \"selfie\",\n    \"profile_id\": \"profile_1234567890\",\n    \"action\": \"faceswap\",\n    \"dimensions\": [\"1024x768\", \"800x600\"]\n  }'\n```\n\n**Request Parameters:**\n- `files` (file[], required nбәҝu dГ№ng multipart): MбәЈng file бәЈnh selfie cбә§n upload (hб»— trб»Ј nhiб»Ғu file).\n- `image_url` hoбә·c `image_urls` (string/string[], required nбәҝu dГ№ng JSON): URL бәЈnh selfie trб»ұc tiбәҝp.\n- `type` (string, required): LoбәЎi upload. CГЎc giГЎ trб»Ӣ hб»— trб»Ј:\n  - `\"selfie\"`: Upload бәЈnh selfie cho mobile app.\n  - `\"mask\"`: Upload бәЈnh mask (Д‘en trбәҜng) cho API `/remove-object`. Mask Д‘Ж°б»Јc lЖ°u vГ o R2 folder `mask/`, action tб»ұ Д‘б»ҷng Д‘бә·t lГ  `remove_object`.\n  - `\"preset\"`: Upload preset (backend only, khГҙng cбә§n API key).\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `action` (string, chб»ү ГЎp dб»Ҙng cho `type=selfie`): LoбәЎi action cб»§a selfie. Nбәҝu khГҙng truyб»Ғn, mбә·c Д‘б»Ӣnh lГ  `\"faceswap\"`. CГЎc giГЎ trб»Ӣ hб»— trб»Ј:\n  - `\"faceswap\"`: Tб»‘i Д‘a 8 бәЈnh (cГі thб»ғ cбәҘu hГ¬nh), tб»ұ Д‘б»ҷng xГіa бәЈnh cЕ© khi upload бәЈnh mб»ӣi (giб»Ҝ lбәЎi sб»‘ бәЈnh mб»ӣi nhбәҘt theo giб»ӣi hбәЎn). **KhГҙng kiб»ғm tra Vision API.**\n  - `\"filter\"`: Tб»‘i Д‘a 5 бәЈnh (cГі thб»ғ cбәҘu hГ¬nh), tб»ұ Д‘б»ҷng xГіa бәЈnh cЕ© khi upload бәЈnh mб»ӣi. **KhГҙng kiб»ғm tra Vision API.**\n  - `\"wedding\"`: Tб»‘i Д‘a 2 бәЈnh, tб»ұ Д‘б»ҷng xГіa бәЈnh cЕ© khi upload бәЈnh mб»ӣi (giб»Ҝ lбәЎi 1 бәЈnh mб»ӣi nhбәҘt). **KhГҙng kiб»ғm tra Vision API.**\n  - `\"4k\"` hoбә·c `\"4K\"`: Tб»‘i Д‘a 1 бәЈnh, tб»ұ Д‘б»ҷng xГіa бәЈnh cЕ© khi upload бәЈnh mб»ӣi. **бәўnh sбәҪ Д‘Ж°б»Јc kiб»ғm tra bбәұng Vision API trЖ°б»ӣc khi lЖ°u vГ o database.**\n  - `\"remove_object\"`: DГ№ng cho бәЈnh gб»‘c cбә§n xГіa vбәӯt thб»ғ. KhГҙng giб»ӣi hбәЎn sб»‘ lЖ°б»Јng, tб»ұ Д‘б»ҷng xГіa sau khi API xб»ӯ lГҪ xong.\n  - `\"expression\"`: DГ№ng cho бәЈnh cбә§n thay Д‘б»•i biб»ғu cбәЈm. KhГҙng giб»ӣi hбәЎn sб»‘ lЖ°б»Јng, tб»ұ Д‘б»ҷng xГіa sau khi API xб»ӯ lГҪ xong.\n  - CГЎc action khГЎc (`\"enhance\"`, `\"beauty\"`, `\"restore\"`, `\"aging\"`, ...): KhГҙng giб»ӣi hбәЎn sб»‘ lЖ°б»Јng, tб»ұ Д‘б»ҷng xГіa sau khi API xб»ӯ lГҪ xong. **KhГҙng kiб»ғm tra Vision API.**\n- `dimensions` (string | string[], optional): KГӯch thЖ°б»ӣc бәЈnh selfie theo Д‘б»Ӣnh dбәЎng `\"widthxheight\"` (vГӯ dб»Ҙ: `\"1024x768\"`). ДҗЖ°б»Јc sб»ӯ dб»Ҙng Д‘б»ғ truyб»Ғn kГӯch thЖ°б»ӣc бәЈnh gб»‘c cho WaveSpeed API khi thб»ұc hiб»Үn face swap, giГәp giб»Ҝ nguyГӘn tб»· lб»Ү vГ  kГӯch thЖ°б»ӣc бәЈnh Д‘бә§u ra. Nбәҝu khГҙng cung cбәҘp, WaveSpeed API sбәҪ tб»ұ Д‘б»ҷng xГЎc Д‘б»Ӣnh kГӯch thЖ°б»ӣc tб»« бәЈnh Д‘бә§u vГ o.\n  - **Cho single file**: CГі thб»ғ truyб»Ғn string Д‘ЖЎn: `\"1024x768\"`\n  - **Cho multiple files**: Truyб»Ғn JSON array cГ№ng thб»© tб»ұ vб»ӣi files: `[\"1024x768\", \"800x600\", null]` (null cho file khГҙng xГЎc Д‘б»Ӣnh Д‘Ж°б»Јc kГӯch thЖ°б»ӣc)\n\n**Response (Success 200):**\n```json\n{\n  \"data\": {\n    \"results\": [\n      {\n        \"id\": \"selfie_1234567890_xyz789\",\n        \"url\": \"https://resources.d.shotpix.app/faceswap-images/selfie/example.jpg\",\n        \"filename\": \"example.jpg\"\n      }\n    ],\n    \"count\": 1,\n    \"successful\": 1,\n    \"failed\": 0\n  },\n  \"status\": \"success\",\n  \"message\": \"Processing successful\",\n  \"code\": 200\n}\n```\n\n**Response (Error - Vision API Blocked):**\nKhi бәЈnh selfie khГҙng vЖ°б»Јt qua kiб»ғm tra an toГ n cб»§a Vision API, endpoint sбәҪ trбәЈ vб»Ғ error code tЖ°ЖЎng б»©ng vб»ӣi loбәЎi vi phбәЎm:\n\n```json\n{\n  \"data\": null,\n  \"status\": \"error\",\n  \"message\": \"Upload failed\",\n  \"code\": 1001\n}\n```\n\n**LЖ°u ГҪ quan trб»Қng:**\n- **Vision API Error Codes (1001-1005):** Chб»ү selfie uploads vб»ӣi `action=\"4k\"` hoбә·c `action=\"4K\"` mб»ӣi Д‘Ж°б»Јc quГ©t bб»ҹi Vision API trЖ°б»ӣc khi lЖ°u vГ o database. CГЎc action khГЎc (nhЖ° `\"faceswap\"`, `\"wedding\"`, `\"default\"`, v.v.) **khГҙng** Д‘Ж°б»Јc kiб»ғm tra bбәұng Vision API. Xem chi tiбәҝt error codes tбәЎi [Vision API Safety Error Codes](API_TONG_QUAN_VI.md#vision-api-safety-error-codes-1001-1005).\n- **Vertex AI Error Codes (2001-2004):** ДҗЖ°б»Јc trбәЈ vб»Ғ khi Vertex AI Gemini safety filters chбә·n generated image. ГҒp dб»Ҙng cho cГЎc endpoints: `/faceswap`, `/background`, `/enhance`, `/beauty`, `/filter`, `/restore`, `/aging`. Xem chi tiбәҝt error codes tбәЎi [Vertex AI Safety Error Codes](API_TONG_QUAN_VI.md#vertex-ai-safety-error-codes-2001-2004).\n- Chбә·n `POSSIBLE`, `LIKELY`, vГ  `VERY_LIKELY` violations\n- Nбәҝu бәЈnh khГҙng an toГ n, file sбәҪ bб»Ӣ xГіa khб»Ҹi R2 storage vГ  trбәЈ vб»Ғ error code tЖ°ЖЎng б»©ng\n- Error code Д‘Ж°б»Јc trбәЈ vб»Ғ trong trЖ°б»қng `code` cб»§a response\n- **Giб»ӣi hбәЎn sб»‘ lЖ°б»Јng selfie:** Mб»—i action cГі giб»ӣi hбәЎn riГӘng vГ  tб»ұ Д‘б»ҷng xГіa бәЈnh cЕ© khi vЖ°б»Јt quГЎ giб»ӣi hбәЎn:\n  - `faceswap`: Tб»‘i Д‘a 8 бәЈnh (cГі thб»ғ cбәҘu hГ¬nh qua `SELFIE_MAX_FACESWAP`)\n  - `wedding`: Tб»‘i Д‘a 2 бәЈnh (cбәҘu hГ¬nh qua `SELFIE_MAX_WEDDING`)\n  - `4k`/`4K`: Tб»‘i Д‘a 1 бәЈnh (cбәҘu hГ¬nh qua `SELFIE_MAX_4K`)\n  - CГЎc action khГЎc: Tб»‘i Д‘a 1 бәЈnh (cбәҘu hГ¬nh qua `SELFIE_MAX_OTHER`)\n\n---\n\n## 1.1b. POST `/upload-url` (type=mask) - Upload mask image\n\n**Mб»Ҙc Д‘Гӯch:** TбәЈi бәЈnh mask lГӘn server Д‘б»ғ sб»ӯ dб»Ҙng vб»ӣi API `/remove-object`. Mask image lГ  бәЈnh Д‘en trбәҜng, vГ№ng trбәҜng chб»ү Д‘б»Ӣnh vбәӯt thб»ғ cбә§n xГіa.\n\n**Authentication:** YГӘu cбә§u API key khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/upload-url \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -F \"files=@/path/to/mask.png\" \\\n  -F \"type=mask\" \\\n  -F \"profile_id=profile_1234567890\"\n```\n\n**Request Parameters:**\n- `files` (file[], required nбәҝu dГ№ng multipart): File бәЈnh mask.\n- `type` (string, required): PhбәЈi lГ  `\"mask\"`.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n\n**Response (Success 200):**\n```json\n{\n  \"data\": {\n    \"results\": [\n      {\n        \"id\": \"mask_abc123\",\n        \"url\": \"https://resources.d.shotpix.app/faceswap-images/mask/mask_abc123.png\",\n        \"filename\": \"mask_abc123.png\"\n      }\n    ],\n    \"count\": 1,\n    \"successful\": 1,\n    \"failed\": 0\n  },\n  \"status\": \"success\",\n  \"message\": \"Processing successful\",\n  \"code\": 200\n}\n```\n\n**LЖ°u ГҪ:**\n- Mask Д‘Ж°б»Јc lЖ°u vГ o R2 folder `mask/`\n- Trong database, mask Д‘Ж°б»Јc lЖ°u vГ o bбәЈng `selfies` vб»ӣi `action = 'remove_object'`\n- Mask sбәҪ tб»ұ Д‘б»ҷng bб»Ӣ xГіa sau khi API `/remove-object` xб»ӯ lГҪ xong\n- KhГҙng ГЎp dб»Ҙng giб»ӣi hбәЎn sб»‘ lЖ°б»Јng (khГҙng cГі limit enforcement)\n\n---\n\n## 1.2. POST `/upload-url` (type=preset) - Upload preset (backend only)\n\n**Mб»Ҙc Д‘Гӯch:** TбәЈi бәЈnh preset trб»ұc tiбәҝp lГӘn server vГ  lЖ°u vГ o database vб»ӣi xб»ӯ lГҪ tб»ұ Д‘б»ҷng (Vision scan, Vertex prompt generation). Endpoint nГ y chб»ү Д‘Ж°б»Јc sб»ӯ dб»Ҙng bб»ҹi backend, khГҙng cбә§n test trГӘn mobile.\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Request:**\n\n**Multipart/form-data:**\n```bash\ncurl -X POST https://api.d.shotpix.app/upload-url \\\n  -F \"files=@/path/to/image1.jpg\" \\\n  -F \"files=@/path/to/image2.jpg\" \\\n  -F \"type=preset\" \\\n  -F \"profile_id=profile_1234567890\" \\\n  -F \"enableVertexPrompt=true\"\n```\n\n**JSON vб»ӣi image_url:**\n```bash\ncurl -X POST https://api.d.shotpix.app/upload-url \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"image_url\": \"https://example.com/image.jpg\",\n    \"type\": \"preset\",\n    \"profile_id\": \"profile_1234567890\",\n    \"enableVertexPrompt\": true\n  }'\n```\n\n**Request Parameters:**\n- `files` (file[], required nбәҝu dГ№ng multipart): MбәЈng file бәЈnh preset cбә§n upload (hб»— trб»Ј nhiб»Ғu file).\n- `image_url` hoбә·c `image_urls` (string/string[], required nбәҝu dГ№ng JSON): URL бәЈnh preset trб»ұc tiбәҝp.\n- `type` (string, required): PhбәЈi lГ  `\"preset\"` cho backend upload.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `enableVertexPrompt` (boolean/string, optional): `true` hoбә·c `\"true\"` Д‘б»ғ bбәӯt tбәЎo prompt Vertex khi upload preset. Sб»ӯ dб»Ҙng Vertex AI Д‘б»ғ phГўn tГӯch бәЈnh vГ  tбәЎo prompt_json tб»ұ Д‘б»ҷng.\n- `art_style` (string, optional): Filter art style cho prompt generation. GiГЎ trб»Ӣ: `auto` (mбә·c Д‘б»Ӣnh), `photorealistic`, `figurine`, `popmart`, `clay`, `disney`, `anime`, `chibi`, `watercolor`, `oil_painting`, `sketch`, `comic`, `pixel_art`, `cyberpunk`, `fantasy`, `vintage`, `minimalist`, `ghibli`, `lego`, `cartoon`.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"results\": [\n      {\n        \"id\": \"preset_1234567890_abc123\",\n        \"url\": \"https://resources.d.shotpix.app/faceswap-images/preset/example.jpg\",\n        \"filename\": \"example.jpg\"\n      }\n    ],\n    \"count\": 1,\n    \"successful\": 1,\n    \"failed\": 0\n  },\n  \"status\": \"success\",\n  \"message\": \"Processing successful\",\n  \"code\": 200,\n  \"debug\": {\n    \"vertex\": [\n      {\n        \"hasPrompt\": true,\n        \"prompt_json\": {\n          \"prompt\": \"...\",\n          \"style\": \"...\",\n          \"lighting\": \"...\"\n        },\n        \"vertex_info\": {\n          \"success\": true,\n          \"promptKeys\": [\"prompt\", \"style\", \"lighting\"],\n          \"debug\": {\n            \"endpoint\": \"https://.../generateContent\",\n            \"status\": 200,\n            \"responseTimeMs\": 4200\n          }\n        }\n      }\n    ],\n    \"filesProcessed\": 1,\n    \"resultsCount\": 1\n  }\n}\n```\n\n---\n\n## 1.3. POST `/upload-thumbnails` - Upload thumbnails (backend only)\n\n**Mб»Ҙc Д‘Гӯch:** TбәЈi lГӘn thumbnails (WebP vГ  Lottie JSON) vГ  tб»ұ Д‘б»ҷng tбәЎo presets. Hб»— trб»Ј upload file zip chб»©a tбәҘt cбәЈ assets hoбә·c upload tб»«ng file riГӘng lбә». Mб»—i file sбәҪ trб»ҹ thГ nh mб»ҷt preset vб»ӣi filename lГ m preset_id. Vertex AI sбәҪ tб»ұ Д‘б»ҷng phГўn tГӯch бәЈnh WebP tб»« thЖ° mб»Ҙc preset vГ  tбәЎo prompt_json metadata.\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Upload individual files:**\n```bash\ncurl -X POST https://api.d.shotpix.app/upload-thumbnails \\\n  -F \"files=@/path/to/preset/fs_wonder_f_3.png\" \\\n  -F \"path_preset_fs_wonder_f_3.png=preset/\" \\\n  -F \"files=@/path/to/lottie_1x/fs_wonder_f_3.json\" \\\n  -F \"path_lottie_1x_fs_wonder_f_3.json=lottie_1x/\" \\\n  -F \"files=@/path/to/lottie_avif_2x/fs_wonder_f_3.json\" \\\n  -F \"path_lottie_avif_2x_fs_wonder_f_3.json=lottie_avif_2x/\" \\\n  -F \"art_style=auto\"\n```\n\n**Upload with Art Style Filter (e.g., Pop Mart style):**\n```bash\ncurl -X POST https://api.d.shotpix.app/upload-thumbnails \\\n  -F \"files=@/path/to/preset/popmart_figure.png\" \\\n  -F \"path_popmart_figure.png=preset/\" \\\n  -F \"art_style=popmart\"\n```\n\n**Upload zip file containing all assets:**\n```bash\ncurl -X POST https://api.d.shotpix.app/upload-thumbnails \\\n  -F \"files=@/path/to/thumbnails.zip\" \\\n  -F \"art_style=disney\"\n```\n\n**Supported Art Styles:**\n\n| Style | Description |\n|-------|-------------|\n| `auto` | Auto-detect style (default) |\n| `photorealistic` | Real photography |\n| `figurine` | 3D figurine/toy |\n| `popmart` | Pop Mart blind box |\n| `clay` | Clay/plasticine animation |\n| `disney` | Disney/Pixar 3D animation |\n| `anime` | Japanese anime/manga |\n| `chibi` | Chibi/super-deformed |\n| `watercolor` | Watercolor painting |\n| `oil_painting` | Classical oil painting |\n| `sketch` | Pencil/charcoal sketch |\n| `comic` | Western comic book |\n| `pixel_art` | Retro pixel art |\n| `cyberpunk` | Cyberpunk/neon futuristic |\n| `fantasy` | Fantasy/magical illustration |\n| `vintage` | Vintage/retro photography |\n| `minimalist` | Minimalist/flat design |\n| `ghibli` | Studio Ghibli animation |\n| `lego` | LEGO minifigure |\n| `cartoon` | General cartoon |\n\n**CбәҘu trГәc thЖ° mб»Ҙc:**\n```\nв”ңв”Җв”Җ preset/\nв”Ӯ   в”ңв”Җв”Җ fs_wonder_f_3.png    # Files here get Vertex AI prompt generation\nв”Ӯ   в””в”Җв”Җ fs_wonder_m_2.png\nв”ңв”Җв”Җ lottie_1x/\nв”Ӯ   в”ңв”Җв”Җ fs_wonder_f_3.json   # Thumbnails at 1x resolution\nв”Ӯ   в””в”Җв”Җ fs_wonder_m_2.json\nв”ңв”Җв”Җ lottie_1.5x/\nв”Ӯ   в”ңв”Җв”Җ fs_wonder_f_3.json   # Thumbnails at 1.5x resolution\nв”Ӯ   в””в”Җв”Җ fs_wonder_m_2.json\nв”ңв”Җв”Җ lottie_2x/\nв”Ӯ   в”ңв”Җв”Җ fs_wonder_f_3.json   # Thumbnails at 2x resolution\nв”Ӯ   в””в”Җв”Җ fs_wonder_m_2.json\nв”ңв”Җв”Җ lottie_avif_1x/\nв”Ӯ   в”ңв”Җв”Җ fs_wonder_f_3.json   # AVIF thumbnails at 1x resolution\nв”Ӯ   в””в”Җв”Җ fs_wonder_m_2.json\nв””в”Җв”Җ [other resolution folders...]\n```\n\n**Quy tбәҜc Д‘бә·t tГӘn file:**\n- Format: `[preset_id].[png|webp|json]`\n- VГӯ dб»Ҙ: `fs_wonder_f_3.png`, `fs_wonder_m_2.webp`, `fireworks_animation.json`\n- TГӘn file (khГҙng bao gб»“m extension) sбәҪ trб»ҹ thГ nh `preset_id`\n- Vertex AI chб»ү phГўn tГӯch file бәЈnh tб»« thЖ° mб»Ҙc \"preset\" Д‘б»ғ tбәЎo `prompt_json` metadata\n- File tб»« cГЎc thЖ° mб»Ҙc resolution khГЎc (lottie_*, lottie_avif_*) lГ  thumbnails, KHГ”NG Д‘Ж°б»Јc gб»ӯi Д‘бәҝn Vertex AI\n\n**TГӯnh nДғng Vertex AI:**\n- Tб»ұ Д‘б»ҷng gб»Қi Vertex AI Gemini Д‘б»ғ phГўn tГӯch file бәЈnh tб»« thЖ° mб»Ҙc \"preset\"\n- Sб»ӯ dб»Ҙng `Promise.all` Д‘б»ғ xб»ӯ lГҪ batch upload vГ  tбәЎo prompt song song\n- `prompt_json` Д‘Ж°б»Јc lЖ°u trong R2 custom metadata cб»§a preset files\n- Thumbnails Д‘Ж°б»Јc lЖ°u б»ҹ nhiб»Ғu resolution (1x, 1.5x, 2x, 3x, 4x) trong database\n- Chб»ү ГЎp dб»Ҙng cho file бәЈnh tб»« thЖ° mб»Ҙc \"preset\", bб»Ҹ qua thumbnails\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"total\": 3,\n    \"successful\": 3,\n    \"failed\": 0,\n    \"thumbnails_processed\": 3,\n    \"results\": [\n      {\n        \"filename\": \"fs_wonder_f_3.png\",\n        \"success\": true,\n        \"type\": \"preset\",\n        \"preset_id\": \"fs_wonder_f_3\",\n        \"url\": \"https://resources.d.shotpix.app/presets/fs_wonder_f_3.png\",\n        \"hasPrompt\": true,\n        \"prompt_json\": {\n          \"scene\": \"wonder woman portrait\",\n          \"style\": \"heroic\",\n          \"mood\": \"confident\",\n          \"colors\": [\"red\", \"blue\", \"gold\"]\n        },\n        \"vertex_info\": {\n          \"success\": true,\n          \"promptKeys\": [\"scene\", \"style\", \"mood\", \"colors\"]\n        },\n        \"metadata\": {\n          \"format\": \"webp\"\n        }\n      },\n      {\n        \"filename\": \"fs_wonder_f_3.json\",\n        \"success\": true,\n        \"type\": \"thumbnail\",\n        \"preset_id\": \"fs_wonder_f_3\",\n        \"url\": \"https://resources.d.shotpix.app/lottie_1x/fs_wonder_f_3.json\",\n        \"hasPrompt\": false,\n        \"vertex_info\": {\n          \"success\": false\n        },\n        \"metadata\": {\n          \"format\": \"lottie\",\n          \"resolution\": \"1x\"\n        }\n      },\n      {\n        \"filename\": \"fs_wonder_f_3.json\",\n        \"success\": true,\n        \"type\": \"thumbnail\",\n        \"preset_id\": \"fs_wonder_f_3\",\n        \"url\": \"https://resources.d.shotpix.app/lottie_avif_2x/fs_wonder_f_3.json\",\n        \"hasPrompt\": false,\n        \"vertex_info\": {\n          \"success\": false\n        },\n        \"metadata\": {\n          \"format\": \"lottie\",\n          \"resolution\": \"2x\"\n        }\n      }\n    ]\n  },\n  \"status\": \"success\",\n  \"message\": \"Processed 3 of 3 files\",\n  \"code\": 200,\n  \"debug\": {\n    \"filesProcessed\": 3,\n    \"resultsCount\": 3\n  }\n}\n```\n\n---\n",
      "FCM_SETUP_COMPLETE_VI.md": "# FCM Setup Complete вҖ“ Token Android / iOS / Web\n\n---\n\n## 1. Tб»•ng quan\n\n**Luб»“ng:** LбәҘy token вҶ’ `POST /api/device/register` (profile_id, platform, token) вҶ’ nhбәӯn push khi operation xong (faceswap/beauty/filter/вҖҰ).\n\n**Дҗбә·c Д‘iб»ғm:**\n- **Silent Push:** KhГҙng hiб»ғn thб»Ӣ notification bar; app xб»ӯ lГҪ data trong background.\n- **Multi-Device:** Mб»ҷt profile cГі thб»ғ cГі nhiб»Ғu devices (phone, tablet, web).\n- **Profile-Based:** Push gб»ӯi Д‘бәҝn tбәҘt cбәЈ devices cб»§a profile Д‘Гі.\n\n---\n\n## 2. Prerequisites (client)\n\n- **Firebase project** vб»ӣi Android / iOS / Web app Д‘ГЈ thГӘm (package name / Bundle ID / Web app trГ№ng vб»ӣi app cб»§a bбәЎn).\n- **Android:** `google-services.json` tб»« Firebase Console.\n- **iOS:** `GoogleService-Info.plist`; APNs key (.p8) Д‘ГЈ upload vГ o Firebase (Cloud Messaging вҶ’ Apple app).\n- **Web:** HTTPS; **firebaseConfig** vГ  **VAPID** (Firebase Console hoбә·c deploy inject). Xem mб»Ҙc 6 (Web вҖ“ Files vГ  config).\n- **Profile:** `POST /api/device/register` cбә§n `profile_id` hб»Јp lб»Ү (Д‘ГЈ tбәЎo qua API trЖ°б»ӣc Д‘Гі).\n\n---\n\n## 3. LбәҘy FCM device token вҖ“ Android\n\n### 3.1 Дҗiб»Ғu kiб»Үn bбәҜt buб»ҷc\n\n- Firebase project Д‘ГЈ tбәЎo; Д‘ГЈ thГӘm **Android app** (package name trГ№ng vб»ӣi app).\n- **google-services.json** tбәЈi tб»« Firebase Console (Project settings вҶ’ Your apps вҶ’ Android) vГ  Д‘бә·t Д‘Гәng vб»Ӣ trГӯ (vГӯ dб»Ҙ `android/app/google-services.json`).\n- Gradle: Д‘ГЈ apply plugin `com.google.gms.google-services` vГ  thГӘm dependency Firebase BOM + `firebase-messaging`.\n\n### 3.2 CГЎc bЖ°б»ӣc triб»ғn khai\n\n**BЖ°б»ӣc 1 вҖ“ Gradle (project-level):**\n```gradle\n// build.gradle (project)\nbuildscript {\n  dependencies {\n    classpath 'com.google.gms:google-services:4.x.x'\n  }\n}\n```\n\n**BЖ°б»ӣc 2 вҖ“ Gradle (app-level):**\n```gradle\n// build.gradle (app)\nplugins {\n  id 'com.android.application'\n  id 'com.google.gms.google-services'\n}\ndependencies {\n  implementation platform('com.google.firebase:firebase-bom:32.x.x')\n  implementation 'com.google.firebase:firebase-messaging'\n}\n```\n\n**BЖ°б»ӣc 3 вҖ“ AndroidManifest.xml:**  \nKhai bГЎo Service xб»ӯ lГҪ FCM (bбәҜt buб»ҷc Д‘б»ғ nhбәӯn message vГ  onNewToken):\n\n```xml\n<service\n    android:name=\".MyFirebaseMessagingService\"\n    android:exported=\"false\">\n  <intent-filter>\n    <action android:name=\"com.google.firebase.MESSAGING_EVENT\" />\n  </intent-filter>\n</service>\n```\n\n**BЖ°б»ӣc 4 вҖ“ LбәҘy token (Kotlin):**\n- Gб»Қi `Firebase.messaging.token` (coroutine) hoбә·c `FirebaseMessaging.getInstance().token.addOnCompleteListener`.\n- Token chб»ү cГі sau khi Firebase Д‘ГЈ init (sau khi app khб»ҹi Д‘б»ҷng, thЖ°б»қng ngay sau khi cГі google-services.json vГ  Д‘ГЈ build).\n\n```kotlin\n// Kotlin вҖ“ lбәҘy token (chбәЎy sau khi user Д‘ГЈ login / cГі profile_id)\nFirebaseMessaging.getInstance().token\n  .addOnCompleteListener { task ->\n    if (!task.isSuccessful) return@addOnCompleteListener\n    val token = task.result ?: return@addOnCompleteListener\n    registerDeviceToBackend(profileId = \"profile_xxx\", platform = \"android\", token = token)\n  }\n```\n\n**BЖ°б»ӣc 5 вҖ“ onNewToken (bбәҜt buб»ҷc):**  \nToken cГі thб»ғ Д‘б»•i; mб»—i khi cГі token mб»ӣi gб»ӯi lбәЎi qua `POST /api/device/register`.\n\n```kotlin\n// MyFirebaseMessagingService.kt\nclass MyFirebaseMessagingService : FirebaseMessagingService() {\n  override fun onNewToken(token: String) {\n    super.onNewToken(token)\n    registerDeviceToBackend(profileId = currentProfileId, platform = \"android\", token = token)\n  }\n\n  override fun onMessageReceived(remoteMessage: RemoteMessage) {\n    // Chб»ү nhбәӯn data payload (silent push). KhГҙng cГі remoteMessage.notification.\n    val data = remoteMessage.data\n    // Xб»ӯ lГҪ data: type, operation, result_id, v.v.\n  }\n}\n```\n\n**LЖ°u ГҪ quan trб»Қng:**  \n- KhГҙng lбәҘy token trong `Application.onCreate` quГЎ sб»ӣm; cГі thб»ғ dГ№ng `Handler().postDelayed` vГ i trДғm ms hoбә·c lбәҘy sau khi user Д‘ГЈ cГі profile_id.  \n- LuГҙn implement `onNewToken` vГ  gб»ӯi token mб»ӣi lГӘn backend.  \n- Data-only message (backend khГҙng gб»ӯi `notification`) вҶ’ luГҙn vГ o `onMessageReceived`; khГҙng hiб»Үn notification bar trб»« khi app tб»ұ hiб»ғn thб»Ӣ.\n\n---\n\n## 4. LбәҘy FCM device token вҖ“ iOS\n\n### 4.1 Дҗiб»Ғu kiб»Үn bбәҜt buб»ҷc\n\n- Firebase project Д‘ГЈ thГӘm **iOS app** (Bundle ID trГ№ng vб»ӣi Xcode).\n- **APNs key (.p8)** Д‘ГЈ tбәЎo trong Apple Developer (Keys), Д‘ГЈ upload vГ o Firebase (Project settings вҶ’ Cloud Messaging вҶ’ Apple app configuration).\n- **GoogleService-Info.plist** tбәЈi tб»« Firebase, thГӘm vГ o Xcode project.\n- Xcode: **Signing & Capabilities** вҶ’ bбәӯt **Push Notifications** vГ  **Background Modes** (chб»Қn **Remote notifications**).\n- Firebase SDK (Firebase/Messaging) Д‘ГЈ thГӘm qua SPM hoбә·c CocoaPods.\n\n### 4.2 CГЎc bЖ°б»ӣc triб»ғn khai\n\n**BЖ°б»ӣc 1 вҖ“ Capabilities:**  \nTarget вҶ’ Signing & Capabilities вҶ’ + Capability вҶ’ **Push Notifications**; thГӘm **Background Modes** вҶ’ bбәӯt **Remote notifications**.\n\n**BЖ°б»ӣc 2 вҖ“ AppDelegate / SceneDelegate:**  \nДҗДғng kГҪ remote notification vГ  set delegate cho Messaging Д‘б»ғ nhбәӯn FCM token.\n\n```swift\n// AppDelegate\nimport FirebaseCore\nimport FirebaseMessaging\nimport UserNotifications\n\n@main\nclass AppDelegate: UIResponder, UIApplicationDelegate, MessagingDelegate, UNUserNotificationCenterDelegate {\n\n  func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\n    FirebaseApp.configure()\n    UNUserNotificationCenter.current().delegate = self\n    Messaging.messaging().delegate = self\n    application.registerForRemoteNotifications()\n    return true\n  }\n\n  func application(_ application: UIApplication, didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {\n    Messaging.messaging().apnsToken = deviceToken\n  }\n\n  func messaging(_ messaging: Messaging, didReceiveRegistrationToken fcmToken: String?) {\n    guard let token = fcmToken else { return }\n    registerDeviceToBackend(profileId: currentProfileId, platform: \"ios\", token: token)\n  }\n}\n```\n\n**BЖ°б»ӣc 3 вҖ“ LбәҘy token:**  \nFCM token xuбәҘt hiб»Үn trong callback `messaging(_:didReceiveRegistrationToken:)`. Callback nГ y Д‘Ж°б»Јc gб»Қi:\n- Sau khi `registerForRemoteNotifications` vГ  APNs token Д‘ГЈ Д‘Ж°б»Јc set vГ o Firebase (`apnsToken`).\n- Mб»—i lбә§n app mб»ҹ hoбә·c khi token Д‘б»•i.\n\nNбәҝu cбә§n lбәҘy token chб»§ Д‘б»ҷng (vГӯ dб»Ҙ sau khi login):\n\n```swift\nMessaging.messaging().token { token, error in\n  guard let token = token else { return }\n  registerDeviceToBackend(profileId: currentProfileId, platform: \"ios\", token: token)\n}\n```\n\n**BЖ°б»ӣc 4 вҖ“ Silent push (data-only):**  \nBackend gб»ӯi khГҙng cГі `notification`, chб»ү `data`; cбә§n xб»ӯ lГҪ trong:\n\n```swift\nfunc application(_ application: UIApplication, didReceiveRemoteNotification userInfo: [AnyHashable: Any], fetchCompletionHandler completionHandler: @escaping (UIBackgroundFetchResult) -> Void) {\n  // Xб»ӯ lГҪ userInfo (data payload)\n  completionHandler(.newData)\n}\n```\n\n**LЖ°u ГҪ quan trб»Қng:**  \n- APNs key (.p8) phбәЈi Д‘Ж°б»Јc upload Д‘Гәng trong Firebase (Cloud Messaging вҶ’ Apple app). Thiбәҝu hoбә·c sai вҶ’ khГҙng cГі FCM token.  \n- Nбәҝu tбәҜt swizzling (`FirebaseAppDelegateProxyEnabled = NO`), phбәЈi tб»ұ set `Messaging.messaging().apnsToken = deviceToken` trong `didRegisterForRemoteNotificationsWithDeviceToken`.  \n- Simulator khГҙng nhбәӯn remote notification; cбә§n device thбәӯt.  \n- Silent push cбә§n Background Modes вҶ’ Remote notifications vГ  gб»Қi `completionHandler(.newData)`.\n\n---\n\n## 5. LбәҘy FCM device token вҖ“ Web\n\n### 5.1 Дҗiб»Ғu kiб»Үn bбәҜt buб»ҷc\n\n- **HTTPS** (service worker chб»ү chбәЎy trГӘn HTTPS).\n- **firebaseConfig** vГ  **VAPID** вҖ” mб»Ҙc 6.\n\n### 5.2 CГЎc bЖ°б»ӣc triб»ғn khai\n\n**BЖ°б»ӣc 1 вҖ“ ThГӘm Firebase SDK vГ  khб»ҹi tбәЎo:**\n```html\n<script type=\"module\">\n  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.x.x/firebase-app.js';\n  import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.x.x/firebase-messaging.js';\n\n  const firebaseConfig = { apiKey: \"...\", authDomain: \"...\", projectId: \"...\", storageBucket: \"...\", messagingSenderId: \"...\", appId: \"...\" };\n  const app = initializeApp(firebaseConfig);\n  const messaging = getMessaging(app);\n\u003c/script>\n```\n\n**BЖ°б»ӣc 2 вҖ“ Service worker:**  \nCбә§n **firebase-messaging-sw.js** tбәЎi root domain; import Firebase Messaging, `initializeApp(firebaseConfig)`, `onBackgroundMessage`. firebaseConfig vГ  VAPID: mб»Ҙc 6.\n\n```javascript\n// firebase-messaging-sw.js (root domain)\nimportScripts('https://www.gstatic.com/firebasejs/10.x.x/firebase-app-compat.js');\nimportScripts('https://www.gstatic.com/firebasejs/10.x.x/firebase-messaging-compat.js');\nfirebase.initializeApp(/* firebaseConfig */);\nfirebase.messaging().onBackgroundMessage((payload) => {});\n```\n\n**BЖ°б»ӣc 3 вҖ“ Xin quyб»Ғn vГ  lбәҘy token:**  \n`getToken(messaging, { vapidKey })` sau khi user cho phГ©p notification.\n\n```javascript\nconst permission = await Notification.requestPermission();\nif (permission !== 'granted') return null;\nconst token = await getToken(messaging, { vapidKey: '...' });\nif (token) {\n  await fetch(API_BASE + '/api/device/register', {\n    method: 'POST',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify({ profile_id: profileId, platform: 'web', token, app_version: '1.0.0' })\n  });\n}\n```\n\n**BЖ°б»ӣc 4 вҖ“ Foreground:**  \nNhбәӯn message khi tab Д‘ang mб»ҹ bбәұng `onMessage`:\n\n```javascript\nonMessage(messaging, (payload) => {\n  console.log('Foreground message', payload);\n  const data = payload.data || {};\n  // data.type, data.operation, data.result_id, ...\n});\n```\n\n---\n\n## 6. Web вҖ“ Files vГ  config cбә§n cГі\n\nДҗб»ғ tГӯch hб»Јp FCM trГӘn Web cбә§n:\n\n- **Trang cГі logic FCM** (vd. fcm-test.html): xin quyб»Ғn notification вҶ’ nhбәӯp profile_id вҶ’ gб»Қi `POST /api/device/register` vб»ӣi token вҶ’ (tГ№y chб»Қn) gб»ӯi push.\n- **firebase-messaging-sw.js** вҖ” Service worker, Д‘бә·t tбәЎi root domain (bбәҜt buб»ҷc).\n- **firebaseConfig** vГ  **VAPID** вҖ” Firebase Console вҶ’ Cloud Messaging вҶ’ Web Push certificates, hoбә·c inject lГәc deploy.\n\n---\n\n## 7. API Endpoints\n\n| Method | Path | Auth | MГҙ tбәЈ |\n|--------|------|------|--------|\n| POST | `/api/device/register` | None | ДҗДғng kГҪ/cбәӯp nhбәӯt FCM token. |\n| POST | `/api/push/silent` | `X-API-Key: MOBILE_API_KEY` | Gб»ӯi data-only push theo `profile_id`. |\n| DELETE | `/api/device/unregister` | None | XГіa FCM token. |\n\n### 7.1 POST /api/device/register\n\n**Body:** `profile_id` (required), `platform` (android \\| ios \\| web), `token` (required), `app_version` (optional).\n\n**Request:**\n```json\n{\n  \"profile_id\": \"profile_1234567890\",\n  \"platform\": \"android\",\n  \"token\": \"fcm-device-token-here\",\n  \"app_version\": \"1.0.0\"\n}\n```\n\n**Response 200:** `{ \"data\": { \"registered\": true }, \"status\": \"success\", \"message\": \"Processing successful\", \"code\": 200 }`\n\n**VГӯ dб»Ҙ:**\n```bash\ncurl -X POST https://api.d.shotpix.app/api/device/register \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"profile_id\":\"profile_abc123\",\"platform\":\"web\",\"token\":\"fcm-web-token-xyz\",\"app_version\":\"1.0.0\"}'\n```\n\n### 7.2 POST /api/push/silent\n\n**Auth:** `X-API-Key: MOBILE_API_KEY`\n\n**Body:** `profile_id` (required), `data` (object, values string), `exclude_token` (optional).\n\n**Request:**\n```json\n{\n  \"profile_id\": \"profile_1234567890\",\n  \"data\": {\n    \"type\": \"operation_complete\",\n    \"operation\": \"faceswap\",\n    \"status\": \"success\",\n    \"result_id\": \"result_xyz\"\n  },\n  \"exclude_token\": \"current-device-fcm-token\"\n}\n```\n\n**Response 200:** `{ \"data\": { \"sent\", \"failed\", \"cleaned\", \"results\": [...] }, \"status\": \"success\", ... }`\n\n**VГӯ dб»Ҙ:**\n```bash\ncurl -X POST https://api.d.shotpix.app/api/push/silent \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your-mobile-api-key-here\" \\\n  -d '{\"profile_id\":\"profile_abc123\",\"data\":{\"type\":\"balance_sync\",\"amount\":\"100\",\"timestamp\":\"1706900000\"}}'\n```\n\n### 7.3 DELETE /api/device/unregister\n\n**Body:** `token` (required).\n\n**Request:** `{ \"token\": \"fcm-device-token-to-remove\" }`\n\n**Response 200:** `{ \"data\": { \"unregistered\": true }, \"status\": \"success\", \"message\": \"Processing successful\", \"code\": 200 }`\n\n**VГӯ dб»Ҙ:**\n```bash\ncurl -X DELETE https://api.d.shotpix.app/api/device/unregister \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"token\":\"fcm-device-token-xyz\"}'\n```\n\n### 7.4 Auto-Push\n\nKhi thГ nh cГҙng, cГЎc API sau tб»ұ gб»ӯi push (payload nhЖ° 7.2): `/faceswap`, `/beauty`, `/filter`, `/upscaler4k`, `/background`. Payload: `type`, `operation`, `status`, `result_id`, `timestamp`. Lб»—i: `status: \"error\"`, `error`.\n\n---\n\n## 8. Troubleshooting\n\n| Triб»Үu chб»©ng / Lб»—i | NguyГӘn nhГўn cГі thб»ғ | HГ nh Д‘б»ҷng |\n|-------------------|--------------------|-----------|\n| 403 PERMISSION_DENIED (Firebase Installations) | API chЖ°a bбәӯt hoбә·c API key bб»Ӣ restrict | Bбәӯt Firebase Installations API + FCM API; Credentials вҶ’ sб»ӯa firebaseConfig.apiKey. |\n| 400 INVALID_ARGUMENT (Create Installation) | firebaseConfig/appId sai | DГ№ng Д‘Гәng firebaseConfig tб»« Firebase Console. |\n| applicationServerKey is not valid | Thiбәҝu hoбә·c sai VAPID | Firebase Console вҶ’ Cloud Messaging вҶ’ Web Push certificates вҶ’ lбәҘy key, dГ№ng Д‘Гәng trong getToken. |\n| Web khГҙng nhбәӯn push | Service worker chЖ°a Д‘Дғng kГҪ hoбә·c VAPID sai | DevTools вҶ’ Application вҶ’ Service Workers; kiб»ғm tra VAPID vГ  firebaseConfig trong sw. |\n| Android hiб»ғn thб»Ӣ notification bar | Payload cГі field `notification` | Chб»ү dГ№ng data-only message (khГҙng gб»ӯi `notification`). |\n| Token invalid (NOT_REGISTERED) | App gб»Ў, token xoay, bundle/package sai | ДҗДғng kГҪ lбәЎi token mб»ӣi qua POST /api/device/register. |\n| iOS khГҙng cГі token | APNs chЖ°a cбәҘu hГ¬nh hoбә·c thiбәҝu capability | Upload .p8 vГ o Firebase; bбәӯt Push Notifications + Remote notifications; chбәЎy trГӘn device thбәӯt. |\n",
      "GOOGLE_PLAY_SETUP_VI.md": "# HЖ°б»ӣng dбә«n thiбәҝt lбәӯp Google Play Billing\n\n## CГЎc bЖ°б»ӣc cбә§n thб»ұc hiб»Үn thб»§ cГҙng (one-time setup)\n\n### 1. Bбәӯt Google Play Android Developer API\n\n1. Truy cбәӯp [Google Cloud Console](https://console.cloud.google.com/)\n2. Chб»Қn project: `gen-lang-client-0149764456`\n3. VГ o **APIs & Services** > **Library**\n4. TГ¬m \"**Google Play Android Developer API**\"\n5. Click **Enable**\n\n### 2. CбәҘp quyб»Ғn Service Account trong Google Play Console\n\n1. Truy cбәӯp [Google Play Console](https://play.google.com/console)\n2. VГ o **Settings** > **API access**\n3. Click **Link** Д‘б»ғ liГӘn kбәҝt project GCP (`gen-lang-client-0149764456`)\n4. TГ¬m service account: `uppixaiphoto@gen-lang-client-0149764456.iam.gserviceaccount.com`\n5. Click **Grant access** vГ  cбәҘp quyб»Ғn:\n   - **Financial data**: Xem doanh thu, Д‘ЖЎn hГ ng\n   - **Manage orders and subscriptions**: QuбәЈn lГҪ Д‘ЖЎn hГ ng\n6. Click **Invite user** > **Send invitation**\n7. Chб»қ invitation Д‘Ж°б»Јc accept (tб»ұ Д‘б»ҷng nбәҝu Д‘ГЈ link project)\n\n### 3. Thiбәҝt lбәӯp Pub/Sub cho RTDN (Real-Time Developer Notifications)\n\n1. Trong **Google Cloud Console** > **Pub/Sub**\n2. TбәЎo Topic mб»ӣi: `play-billing-notifications`\n3. TбәЎo Subscription:\n   - **Type**: Push\n   - **Endpoint URL**: `https://api.d.shotpix.app/webhooks/google`\n   - **Authentication**: ThГӘm header `Authorization: Bearer YOUR_WEBHOOK_SECRET`\n4. Trong **Google Play Console** > **Monetization setup** > **Real-time developer notifications**:\n   - **Topic name**: `projects/gen-lang-client-0149764456/topics/play-billing-notifications`\n   - Click **Save**\n\n### 4. TбәЎo In-App Products & Subscriptions trong Google Play Console\n\n1. VГ o **Monetization** > **Products** > **In-app products**\n2. TбәЎo consumable products vб»ӣi cГЎc SKU:\n   - `credits_10` - 22,000 VND\n   - `credits_50` - 99,000 VND\n   - `credits_100` - 176,000 VND\n   - `credits_500` - 770,000 VND\n3. VГ o **Monetization** > **Products** > **Subscriptions**\n4. TбәЎo subscriptions:\n   - `sub_pro_monthly` - 99,000 VND/thГЎng\n   - `sub_pro_yearly` - 990,000 VND/nДғm\n   - `sub_premium_monthly` - 199,000 VND/thГЎng\n   - `sub_premium_yearly` - 1,990,000 VND/nДғm\n\n### 5. Cбәӯp nhбәӯt Environment Variables\n\nSau khi hoГ n thГ nh cГЎc bЖ°б»ӣc trГӘn, cбәӯp nhбәӯt trong `deployments-secrets.json`:\n\n```json\n{\n  \"GOOGLE_PLAY_PACKAGE_NAME\": \"com.your.app.package\",\n  \"GOOGLE_WEBHOOK_SECRET\": \"your-random-secret-string\",\n  \"ENABLE_CREDIT_SYSTEM\": \"true\"\n}\n```\n\nSau Д‘Гі deploy lбәЎi: `npm run deploy:parallel:test`\n\n### 6. ChбәЎy Database Migration\n\nMigration file: `backend-cloudflare-workers/migrations/0008_payments_credits.sql`\n\nChбәЎy migration: `npm run db:migrate`\n\n---\n\n## Kiб»ғm tra\n\n1. Gб»Қi `GET /api/products` - PhбәЈi trбәЈ vб»Ғ danh sГЎch SKU\n2. Gб»Қi `GET /api/user/balance?profile_id=xxx` - PhбәЈi trбәЈ vб»Ғ credits=0, tier=free\n3. Test purchase flow trГӘn Android app vб»ӣi test account\n4. Kiб»ғm tra webhook nhбәӯn notifications tб»« Google Play\n",
      "REQUIREMENTS.md": "# Face Swap AI - Requirements\n\n## Overview\nA minimal web application for face swapping that allows users to upload preset images, upload selfies, and generate face-swapped results. The application uses Cloudflare Workers for backend API, Cloudflare R2 for image storage, and Cloudflare D1 for database storage.\n\n## Frontend Structure\n\n### File Organization\n- `index.html` - Main HTML structure with inline CSS and JavaScript\n\n### UI Layout\n- Main workspace: Two-column grid layout\n  - Left column: Preset section (top) and Selfie section (bottom)\n  - Right column: Result image (spans both rows, large display)\n- Bottom section: Results history gallery\n- Both preset and selfie have identical UI: Upload area + Gallery for selection\n\n## UI/UX Design Guide\n\n### Design Principles\n- **Minimalism**: Remove all unnecessary elements. Every component must serve a purpose.\n- **Clarity**: Users should understand what to do without reading instructions.\n- **Efficiency**: Minimize clicks and steps to complete tasks.\n- **Consistency**: Use consistent spacing, colors, and interaction patterns throughout.\n- **Feedback**: Always provide clear visual feedback for user actions.\n\n### Layout Structure\n\n#### Main Container\n- Max width: 1200px (centered on large screens)\n- Padding: 24px on desktop, 16px on mobile\n- Background: #FFFFFF (white) or #FAFAFA (very light gray)\n- Border radius: 0px (sharp, professional edges)\n\n#### Main Workspace - Two Column Grid\n- **Layout**: CSS Grid with 2 columns\n- **Left Column** (40% width):\n  - **Preset Section** (top row):\n    - Upload area with drag & drop\n    - Gallery grid below for selecting existing presets\n    - Selected preset preview (large, prominent)\n  - **Selfie Section** (bottom row):\n    - Upload area with drag & drop (identical to preset)\n    - Gallery grid below for selecting existing selfies\n    - Selected selfie preview (large, prominent)\n  - Gap between sections: 24px\n- **Right Column** (60% width):\n  - **Result Image Display** (spans both rows):\n    - Large preview area (min-height: 600px)\n    - Shows generated face swap result\n    - Empty state: \"Result will appear here\"\n    - Centered, object-fit: contain\n- **Gap between columns**: 24px\n- **Generate Button**: Full width below the grid, centered\n\n#### Bottom Section - Results History\n- Full width grid layout\n- Responsive grid: 4 columns desktop, 3 tablets, 2 mobile\n- Gap: 16px between items\n\n### Color Palette\n\n#### Primary Colors\n- **Primary**: #2563EB (Blue 600) - Main actions, selected states\n- **Primary Hover**: #1D4ED8 (Blue 700) - Interactive elements on hover\n- **Primary Light**: #DBEAFE (Blue 100) - Subtle backgrounds\n\n#### Neutral Colors\n- **Background**: #FFFFFF (White)\n- **Surface**: #F9FAFB (Gray 50) - Card backgrounds\n- **Border**: #E5E7EB (Gray 200) - Dividers, borders\n- **Text Primary**: #111827 (Gray 900) - Main text\n- **Text Secondary**: #6B7280 (Gray 500) - Secondary text, labels\n\n#### Status Colors\n- **Success**: #10B981 (Green 500) - Success messages, completed states\n- **Error**: #EF4444 (Red 500) - Error messages, warnings\n- **Warning**: #F59E0B (Amber 500) - Warnings\n- **Info**: #3B82F6 (Blue 500) - Informational messages\n\n### Typography\n\n#### Font Family\n- **Primary**: System font stack: `-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif`\n- **Monospace**: `'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace` (for filenames only)\n\n#### Font Sizes\n- **H1 (Page Title)**: 28px / 1.2 line-height / 700 weight\n- **H2 (Section Title)**: 20px / 1.3 line-height / 600 weight\n- **Body**: 16px / 1.5 line-height / 400 weight\n- **Small**: 14px / 1.4 line-height / 400 weight\n- **Caption**: 12px / 1.3 line-height / 400 weight\n\n#### Text Hierarchy\n- Page title: H1, centered or left-aligned\n- Section headers: H2, left-aligned with 24px margin-bottom\n- Labels: Small, Text Secondary color, 8px margin-bottom\n- Body text: Body size, Text Primary color\n\n### Spacing System\n- Use 4px base unit for consistent spacing\n- **XS**: 4px (tight spacing)\n- **S**: 8px (small gaps)\n- **M**: 16px (default spacing)\n- **L**: 24px (section spacing)\n- **XL**: 32px (large sections)\n- **XXL**: 48px (major sections)\n\n### Component Specifications\n\n#### Upload Areas\n- **Container**: \n  - Background: #FFFFFF\n  - Border: 2px dashed #D1D5DB (Gray 300)\n  - Border radius: 8px\n  - Padding: 32px\n  - Min height: 200px\n  - Display: flex, column, center, align-items center\n  - Cursor: pointer\n  - Transition: border-color 0.2s ease\n\n- **Hover State**:\n  - Border color: #2563EB (Primary)\n  - Background: #F9FAFB (subtle highlight)\n\n- **Drag Over State**:\n  - Border color: #2563EB (Primary)\n  - Background: #DBEAFE (Primary Light)\n  - Border style: solid\n\n- **Icon/Illustration**:\n  - Size: 48px Г— 48px\n  - Color: #9CA3AF (Gray 400)\n  - Margin-bottom: 12px\n\n- **Text**:\n  - Primary: \"Click to upload or drag and drop\"\n  - Font: Body, Text Primary\n  - Margin-bottom: 4px\n\n- **Subtext**:\n  - \"JPG, PNG, WebP (max 10MB)\"\n  - Font: Small, Text Secondary\n\n- **File Input**:\n  - Hidden (display: none)\n  - Triggered by container click\n\n#### Selected Image Preview (Preset/Selfie)\n- **Container**:\n  - Position: relative\n  - Border radius: 8px\n  - Overflow: hidden\n  - Background: #F3F4F6 (Gray 100)\n  - Min height: 300px\n  - Max height: 400px\n  - Display: flex\n  - Align-items: center\n  - Justify-content: center\n  - Border: 2px solid #E5E7EB\n  - Margin-top: 16px\n\n- **Image**:\n  - Width: 100%\n  - Height: 100%\n  - Max height: 400px\n  - Object-fit: contain (show full image without cropping)\n  - Display: block\n\n- **Label**:\n  - Position: absolute, top-left\n  - Background: rgba(0, 0, 0, 0.7)\n  - Color: #FFFFFF\n  - Padding: 8px 12px\n  - Border-radius: 0 0 8px 0\n  - Font: Small, 600 weight\n  - Text: \"Selected Preset\" or \"Selected Selfie\"\n\n- **Delete Button**:\n  - Position: absolute, top-right corner\n  - Size: 36px Г— 36px\n  - Background: rgba(239, 68, 68, 0.9) (Red 500 with opacity)\n  - Color: #FFFFFF\n  - Border: none\n  - Border-radius: 50%\n  - Cursor: pointer\n  - Display: flex\n  - Align-items: center\n  - Justify-content: center\n  - Icon: Г— (close/delete, 20px, white)\n  - Z-index: 10\n  - Transition: background-color 0.2s ease, transform 0.2s ease\n  - Hover: Background rgba(220, 38, 38, 1) (Red 600), transform: scale(1.1)\n  - Click: Show confirmation dialog before deletion\n\n#### Result Image Display\n- **Container**:\n  - Background: #F9FAFB (Surface)\n  - Border: 2px solid #E5E7EB\n  - Border radius: 8px\n  - Min height: 600px\n  - Display: flex\n  - Align-items: center\n  - Justify-content: center\n  - Position: relative\n  - Grid-row: span 2 (spans both preset and selfie rows)\n\n- **Image** (when result exists):\n  - Max width: 100%\n  - Max height: 100%\n  - Object-fit: contain (show full image)\n  - Border radius: 8px\n\n- **Empty State**:\n  - Text: \"Result will appear here\"\n  - Font: Body, Text Secondary\n  - Icon: 64px Г— 64px, Gray 300\n  - Centered vertically and horizontally\n\n#### Gallery Grid (Preset/Selfie Selection)\n- **Container**:\n  - Display: grid\n  - Gap: 12px\n  - Grid-template-columns: repeat(auto-fill, minmax(100px, 1fr))\n  - Max columns: 3 on desktop (fits in left column)\n  - Max height: 200px\n  - Overflow-y: auto\n  - Margin-top: 16px\n  - Padding: 8px\n  - Background: #F9FAFB\n  - Border-radius: 8px\n\n- **Gallery Item**:\n  - Aspect ratio: 1:1 (square)\n  - Border radius: 8px\n  - Overflow: hidden\n  - Background: #F3F4F6\n  - Border: 2px solid transparent\n  - Cursor: pointer\n  - Transition: transform 0.2s ease, border-color 0.2s ease\n  - Position: relative\n\n- **Selected State**:\n  - Border color: #2563EB (Primary)\n  - Border width: 3px\n  - Box shadow: 0 0 0 3px rgba(37, 99, 235, 0.1)\n\n- **Hover State**:\n  - Transform: scale(1.02)\n  - Box shadow: 0 4px 12px rgba(0, 0, 0, 0.1)\n\n- **Image**:\n  - Width: 100%\n  - Height: 100%\n  - Object-fit: cover\n  - Display: block\n\n- **Delete Button** (Gallery Item):\n  - Position: absolute, top-right corner\n  - Size: 24px Г— 24px\n  - Background: rgba(239, 68, 68, 0.9) (Red 500 with opacity)\n  - Color: #FFFFFF\n  - Border: none\n  - Border-radius: 50%\n  - Cursor: pointer\n  - Display: flex\n  - Align-items: center\n  - Justify-content: center\n  - Icon: Г— (close/delete, 14px, white)\n  - Z-index: 10\n  - Opacity: 0 (hidden by default)\n  - Transition: opacity 0.2s ease, background-color 0.2s ease\n  - Hover (on gallery item): Opacity: 1\n  - Hover (on button): Background rgba(220, 38, 38, 1) (Red 600)\n  - Click: Show confirmation dialog, prevent event propagation (don't select item)\n\n#### Buttons\n\n##### Primary Button (Generate)\n- **Default**:\n  - Background: #2563EB (Primary)\n  - Color: #FFFFFF\n  - Padding: 12px 24px\n  - Border: none\n  - Border radius: 6px\n  - Font: Body, 600 weight\n  - Width: 100% (on mobile), auto (on desktop)\n  - Min width: 200px\n  - Cursor: pointer\n  - Transition: background-color 0.2s ease\n\n- **Hover**:\n  - Background: #1D4ED8 (Primary Hover)\n\n- **Disabled**:\n  - Background: #D1D5DB (Gray 300)\n  - Color: #9CA3AF (Gray 400)\n  - Cursor: not-allowed\n\n- **Loading**:\n  - Show spinner icon (16px) + text\n  - Disable interaction\n\n##### Secondary Button (Reset/Clear)\n- Background: transparent\n- Color: #6B7280 (Text Secondary)\n- Border: 1px solid #E5E7EB\n- Same padding and sizing as primary\n- Hover: Background #F9FAFB\n\n#### Status Messages\n- **Container**:\n  - Padding: 12px 16px\n  - Border radius: 6px\n  - Margin: 8px 0\n  - Font: Small\n  - Display: flex\n  - Align-items: center\n  - Gap: 8px\n\n- **Success**:\n  - Background: #D1FAE5 (Green 100)\n  - Color: #065F46 (Green 800)\n  - Icon: вң“ (checkmark)\n\n- **Error**:\n  - Background: #FEE2E2 (Red 100)\n  - Color: #991B1B (Red 800)\n  - Icon: вң• (cross)\n\n- **Info**:\n  - Background: #DBEAFE (Blue 100)\n  - Color: #1E40AF (Blue 800)\n  - Icon: в„№ (info)\n\n#### Loading Spinner\n- **Overlay**:\n  - Position: fixed\n  - Top: 0, left: 0, right: 0, bottom: 0\n  - Background: rgba(0, 0, 0, 0.5)\n  - Display: flex\n  - Align-items: center\n  - Justify-content: center\n  - Z-index: 9999\n\n- **Spinner Container**:\n  - Background: #FFFFFF\n  - Padding: 32px\n  - Border radius: 8px\n  - Text-align: center\n  - Min-width: 200px\n\n- **Spinner**:\n  - Size: 40px Г— 40px\n  - Border: 3px solid #E5E7EB\n  - Border-top: 3px solid #2563EB\n  - Border radius: 50%\n  - Animation: spin 0.8s linear infinite\n  - Margin: 0 auto 16px\n\n- **Text**:\n  - Font: Body, Text Primary\n  - Margin-top: 12px\n\n#### Confirmation Dialog\n- **Overlay**:\n  - Position: fixed\n  - Top: 0, left: 0, right: 0, bottom: 0\n  - Background: rgba(0, 0, 0, 0.5)\n  - Display: flex\n  - Align-items: center\n  - Justify-content: center\n  - Z-index: 10000\n\n- **Dialog Container**:\n  - Background: #FFFFFF\n  - Padding: 24px\n  - Border radius: 8px\n  - Min-width: 320px\n  - Max-width: 400px\n  - Box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2)\n\n- **Title**:\n  - Font: H2 (20px, 600 weight)\n  - Color: Text Primary\n  - Margin-bottom: 12px\n\n- **Message**:\n  - Font: Body (16px)\n  - Color: Text Secondary\n  - Margin-bottom: 24px\n  - Line-height: 1.5\n\n- **Button Container**:\n  - Display: flex\n  - Gap: 12px\n  - Justify-content: flex-end\n\n- **Cancel Button**:\n  - Background: transparent\n  - Color: Text Secondary\n  - Border: 1px solid #E5E7EB\n  - Padding: 10px 20px\n  - Border-radius: 6px\n  - Cursor: pointer\n  - Hover: Background #F9FAFB\n\n- **Confirm Button** (Delete):\n  - Background: #EF4444 (Red 500)\n  - Color: #FFFFFF\n  - Border: none\n  - Padding: 10px 20px\n  - Border-radius: 6px\n  - Cursor: pointer\n  - Hover: Background #DC2626 (Red 600)\n\n### User Flow\n\n#### Primary Flow: Generate Face Swap\n1. **Select/Upload Preset** (left column, top)\n   - Option A: Upload new preset\n     - User clicks upload area or drags file\n     - Large preview appears immediately (300-400px height)\n     - Status: \"Uploading...\" вҶ’ \"Uploaded\" or \"Already exists\"\n     - Gallery refreshes to show new preset\n   - Option B: Select from gallery\n     - User clicks thumbnail in gallery\n     - Selected preset shows in large preview area\n     - Visual feedback: Selected border on thumbnail\n\n2. **Select/Upload Selfie** (left column, bottom)\n   - Option A: Upload new selfie\n     - User clicks upload area or drags file\n     - Large preview appears immediately (300-400px height)\n     - Status: \"Uploading...\" вҶ’ \"Uploaded\" or \"Already exists\"\n     - Gallery refreshes to show new selfie\n   - Option B: Select from gallery\n     - User clicks thumbnail in gallery\n     - Selected selfie shows in large preview area\n     - Visual feedback: Selected border on thumbnail\n\n3. **Generate Button Enabled**\n   - Visual feedback: Button changes from disabled to active\n   - Both large previews visible in left column\n   - Right column shows empty state\n\n4. **Click Generate**\n   - Loading overlay appears\n   - Button disabled\n   - Status: \"Processing face swap...\"\n\n5. **Result Display**\n   - Loading overlay disappears\n   - Result image appears in large right column (spans both rows)\n   - Success message: \"Face swap completed\"\n   - Result added to history gallery below\n\n### Responsive Design\n\n#### Breakpoints\n- **Mobile**: < 768px\n  - Single column layout (stack preset, selfie, result vertically)\n  - Full-width buttons\n  - 2-column gallery grid for presets/selfies\n  - Reduced padding (16px)\n  - Result image: Full width, normal height\n\n- **Tablet**: 768px - 1024px\n  - Two-column grid layout (40% left, 60% right)\n  - 3-column gallery grid for presets/selfies\n  - Standard padding (24px)\n  - Result image: Spans both rows\n\n- **Desktop**: > 1024px\n  - Two-column grid layout (40% left, 60% right)\n  - 3-column gallery grid for presets/selfies\n  - Max-width container (1200px)\n  - Result image: Large display, spans both rows\n\n### Accessibility\n\n#### Keyboard Navigation\n- All interactive elements must be keyboard accessible\n- Tab order: Upload areas вҶ’ Gallery items вҶ’ Generate button вҶ’ Results\n- Enter/Space to activate buttons and select items\n- Focus indicators: 2px solid outline in Primary color\n\n#### Screen Readers\n- All images must have alt text\n- Buttons must have descriptive labels\n- Status messages must be announced\n- Loading states must be announced\n\n#### Visual Accessibility\n- Color contrast: Minimum 4.5:1 for text\n- Focus indicators: Clear and visible\n- Error states: Use icons + text, not just color\n- Touch targets: Minimum 44px Г— 44px\n\n### Performance Considerations\n- Lazy load gallery images (use loading=\"lazy\")\n- Optimize images before upload (client-side compression if possible)\n- Show skeleton loaders while fetching data\n- Debounce search/filter inputs if added later\n- Cache gallery images in browser\n\n### Error States\n\n#### Upload Errors\n- Network error: \"Upload failed. Please check your connection and try again.\"\n- File too large: \"File exceeds 10MB limit. Please choose a smaller file.\"\n- Invalid format: \"Invalid file type. Please upload JPG, PNG, or WebP.\"\n- Duplicate: \"This image already exists. Using existing version.\"\n\n#### Generation Errors\n- API error: \"Face swap failed. Please try again.\"\n- Timeout: \"Request timed out. Please try again.\"\n- Invalid images: \"Could not process images. Please ensure both images contain faces.\"\n\n### Empty States\n- **No Presets Gallery**: \"No presets yet. Upload your first preset above.\"\n- **No Selfies Gallery**: \"No selfies yet. Upload your first selfie above.\"\n- **No Results History**: \"No results yet. Generate your first face swap to see it here.\"\n- **Result Display Empty**: \"Result will appear here\"\n- Use subtle illustration or icon (48px, Gray 300)\n- Text: Small, Text Secondary, centered\n\n## Backend API Endpoints\n\n\n### Backend Database Schema\n- `presets` table: `id`, `image_url`, `prompt_json`, `thumbnail_url`, `thumbnail_format`, `thumbnail_resolution`, `thumbnail_r2_key`, `created_at`\n- `selfies` table: `id`, `image_url`, `profile_id`, `created_at`\n- `results` table: `id`, `preset_name`, `result_url`, `profile_id`, `created_at`\n\n**LЖ°u ГҪ:**\n- Metadata (type, sub_category, gender, position) Д‘Ж°б»Јc lЖ°u trong R2 bucket path, khГҙng lЖ°u trong database\n- Thumbnails Д‘Ж°б»Јc lЖ°u trong cГ№ng row vб»ӣi preset (same-row approach)\n\n### Endpoints\n\n#### GET `/presets`\n- Returns: `{ presets: [...] }`\n- Each preset contains: `id`, `image_url`, `prompt_json`, `thumbnail_url`, `thumbnail_format`, `thumbnail_resolution`, `created_at`\n- Query params: `include_thumbnails` (optional, default: false) - bao gб»“m presets cГі thumbnail\n- Presets are stored as individual entries (no collections)\n- Backend queries database and returns all presets\n\n#### GET `/selfies`\n- Returns: `{ selfies: [...] }`\n- Each selfie contains: `id`, `selfie_url` (full URL), `action`, `created_at`\n- Selfies are stored as individual entries\n- Backend queries database and returns all selfies\n- **LЖ°u ГҪ**: `selfie_url` trong database chб»ү lЖ°u bucket key, API tб»ұ Д‘б»ҷng assemble full URL tб»« `R2_DOMAIN` khi trбәЈ vб»Ғ\n\n#### DELETE `/presets/:id`\n- Path parameter: `id` (preset ID)\n- Backend logic:\n  1. Find preset by ID in database\n  2. Delete file from R2 storage using `image_url`\n  3. Delete record from `presets` table\n  4. Return `{ success: true, message: \"Preset deleted\" }`\n- Error handling: Return 404 if preset not found, 500 on deletion failure\n\n#### DELETE `/selfies/:id`\n- Path parameter: `id` (selfie ID)\n- Backend logic:\n  1. Find selfie by ID in database\n  2. Delete file from R2 storage using `image_url`\n  3. Delete record
