from `selfies` table\n  4. Return `{ success: true, message: \"Selfie deleted\" }`\n- Error handling: Return 404 if selfie not found, 500 on deletion failure\n\n#### POST `/upload-url`\n- Content-Type: `multipart/form-data` hoбә·c `application/json`\n- Body (multipart): `files` (file[]), `type`, `profile_id`, `enableVertexPrompt` (optional), `action` (optional, chб»ү cho selfie)\n- Body (JSON): `image_url` hoбә·c `image_urls` (string[]), `type`, `profile_id`, `enableVertexPrompt` (optional), `action` (optional, chб»ү cho selfie)\n- Backend logic:\n  1. Upload file(s) to R2 storage\n  2. Vб»ӣi selfie: \n     - **Chб»ү vб»ӣi `action=\"4k\"` hoбә·c `action=\"4K\"`**: Kiб»ғm tra an toГ n bбәұng Vision API trЖ°б»ӣc khi lЖ°u vГ o database\n     - **CГЎc action khГЎc (nhЖ° `\"faceswap\"`, `\"wedding\"`, `\"default\"`, v.v.)**: KhГҙng kiб»ғm tra Vision API\n     - Tб»ұ Д‘б»ҷng xГіa бәЈnh cЕ© dб»ұa trГӘn action:\n       - `action=\"faceswap\"`: Tб»‘i Д‘a 8 бәЈnh (cГі thб»ғ cбәҘu hГ¬nh qua `SELFIE_MAX_FACESWAP`), xГіa бәЈnh cЕ© nhбәҘt khi vЖ°б»Јt quГЎ giб»ӣi hбәЎn\n       - `action=\"wedding\"`: Tб»‘i Д‘a 2 бәЈnh (cбәҘu hГ¬nh qua `SELFIE_MAX_WEDDING`), xГіa бәЈnh cЕ© nhбәҘt khi cГі >= 2 бәЈnh\n       - `action=\"4k\"` hoбә·c `\"4K\"`: Tб»‘i Д‘a 1 бәЈnh (cбәҘu hГ¬nh qua `SELFIE_MAX_4K`), xГіa бәЈnh cЕ© khi cГі >= 1 бәЈnh\n       - Action khГЎc: Tб»‘i Д‘a 1 бәЈnh (cбәҘu hГ¬nh qua `SELFIE_MAX_OTHER`), xГіa бәЈnh cЕ© khi cГі >= 1 бәЈnh\n  3. Insert record(s) vГ o database (`presets` hoбә·c `selfies` table) vб»ӣi bucket key (khГҙng phбәЈi full URL)\n  4. Vб»ӣi preset: tб»ұ Д‘б»ҷng generate Vertex prompt nбәҝu `enableVertexPrompt=true`\n- Response format: `{ data: { results: [...], count, successful, failed }, status, message, code, debug? }`\n  - Vб»ӣi selfie: mб»—i result cГі thГӘm field `action`\n- Hб»— trб»Ј upload nhiб»Ғu file cГ№ng lГәc\n- **LЖ°u ГҪ**: `selfie_url` trong database chб»ү lЖ°u bucket key (vГӯ dб»Ҙ: `\"selfie/filename.jpg\"`), API tб»ұ Д‘б»ҷng assemble full URL khi trбәЈ vб»Ғ\n\n#### POST `/faceswap`\n- Body:\n  ```json\n  {\n    \"preset_image_id\": \"preset_id_from_database\",\n    \"selfie_id\": \"selfie_id_from_database\",\n    \"profile_id\": \"user_profile_id\"\n  }\n  ```\n- Returns:\n  ```json\n  {\n    \"data\": {\n      \"resultImageUrl\": \"result_url\"\n    },\n    \"status\": \"success\",\n    \"message\": \"Processing successful\",\n    \"code\": 200,\n    \"debug\": {}\n  }\n  ```\n\n#### GET `/results`\n- Returns: `{ results: [...] }`\n- Each result contains: `result_url`, `created_at`\n\n## Frontend Functionality\n\n### Preset Section (Left Column, Top)\n- **Upload Area**:\n  - Single file input (one preset at a time)\n  - Drag and drop support\n  - On file selection:\n    - Use original filename from file input (sanitize for safety)\n    - Show preview immediately using FileReader in large preview area\n    - Call `/upload-url` with original filename and type 'preset'\n    - If response has `exists: true`: Use existing URL, show message \"Image already exists\"\n    - If response has `exists: false`: Upload file to returned uploadUrl\n    - Store uploaded/existing URL and preset object\n  - Show success/error status messages\n  - Reload presets gallery after upload\n\n- **Preset Gallery**:\n  - Display below upload area in scrollable grid\n  - Load presets from `/presets` endpoint on page load\n  - Each preset card shows thumbnail image (square, 100px)\n  - Click preset to select (visual feedback with selected state)\n  - Selected preset shows in large preview area above gallery\n  - Use `image_url` directly from database (no conversion needed)\n  - Empty state: \"No presets yet. Upload your first preset above.\"\n  - Delete button on each gallery item (top-right corner, appears on hover)\n  - Delete button on selected preset preview (top-right corner, always visible)\n\n- **Delete Preset**:\n  - On delete button click (gallery or preview):\n    - Show confirmation dialog: \"Are you sure you want to delete this preset?\"\n    - If confirmed: Call `DELETE /presets/:id`\n    - On success: Remove from gallery, clear selection if deleted preset was selected, show success message\n    - On error: Show error message, keep item in gallery\n    - Reload presets gallery after successful deletion\n\n### Selfie Section (Left Column, Bottom)\n- **Upload Area**:\n  - Identical UI and functionality to Preset Upload\n  - Single file input (one selfie at a time)\n  - Drag and drop support\n  - On file selection:\n    - Use original filename from file input (sanitize for safety)\n    - Show preview immediately using FileReader in large preview area\n    - Call `/upload-url` with original filename and type 'selfie'\n    - If response has `exists: true`: Use existing URL, show message \"Image already exists\"\n    - If response has `exists: false`: Upload file to returned uploadUrl\n    - Store uploaded/existing URL and selfie object\n  - Show success/error status messages\n  - Reload selfies gallery after upload\n\n- **Selfie Gallery**:\n  - Display below upload area in scrollable grid\n  - Load selfies from `/selfies` endpoint on page load\n  - Each selfie card shows thumbnail image (square, 100px)\n  - Click selfie to select (visual feedback with selected state)\n  - Selected selfie shows in large preview area above gallery\n  - Use `image_url` directly from database (no conversion needed)\n  - Empty state: \"No selfies yet. Upload your first selfie above.\"\n  - Delete button on each gallery item (top-right corner, appears on hover)\n  - Delete button on selected selfie preview (top-right corner, always visible)\n\n- **Delete Selfie**:\n  - On delete button click (gallery or preview):\n    - Show confirmation dialog: \"Are you sure you want to delete this selfie?\"\n    - If confirmed: Call `DELETE /selfies/:id`\n    - On success: Remove from gallery, clear selection if deleted selfie was selected, show success message\n    - On error: Show error message, keep item in gallery\n    - Reload selfies gallery after successful deletion\n\n### Result Display (Right Column, Spans Both Rows)\n- Large display area (min-height: 600px)\n- Shows generated face swap result\n- Empty state: \"Result will appear here\" with icon\n- Result image: Max width/height 100%, object-fit: contain\n- Updates automatically after successful generation\n\n### Face Swap Generation\n- Button positioned below main workspace grid\n- Enabled when both preset and selfie are selected\n- On click:\n  - Show loading spinner overlay\n  - Disable button\n  - Call `/faceswap` with preset URL and selfie URL\n  - Display result image in right column on success\n  - Show error message on failure\n  - Reload results history gallery after success\n\n### Results Display\n- Load results from `/results` on page load\n- Display results in simple grid gallery\n- Each result card shows image and date\n- Date formatted as Vietnamese locale\n\n## Data Structures\n\n### Preset Object\n```javascript\n{\n  id: string,\n  image_url: string,\n  prompt_json: object | null,\n  thumbnail_url: string | null,\n  thumbnail_format: 'webp' | 'lottie' | null,\n  thumbnail_resolution: string | null,\n  created_at: string\n}\n```\n\n### Selfie Object\n```javascript\n{\n  id: string,\n  image_url: string,\n  created_at: string\n}\n```\n\n### Result Object\n```javascript\n{\n  result_url: string,\n  created_at: string (ISO format)\n}\n```\n\n## State Variables\n- `selectedPreset`: Currently selected preset object or null\n- `selectedSelfie`: Currently selected selfie object or null\n- `presets`: Array of all preset objects (loaded from `/presets`)\n- `selfies`: Array of all selfie objects (loaded from `/selfies`)\n- `results`: Array of all result objects (loaded from `/results`)\n\n## UI Elements\n\n### Preset Gallery\n- Simple grid layout\n- Each card: square aspect ratio, image only\n- Selected state: border highlight\n\n### Status Messages\n- Success: Green color\n- Error: Red color\n- Loading: Spinner animation\n\n## Image URL Handling\n- Database stores the final accessible URL directly in `image_url` field\n- Backend constructs the correct R2 URL (e.g., `/r2/preset/filename.jpg` or full URL with worker domain) when uploading\n- Frontend uses `image_url` from database directly - no conversion needed\n- URLs are ready to use as-is for display and API calls\n\n## Error Handling\n- Network errors: Show error message\n- API errors: Display error message from response\n- Image load errors: Show placeholder\n\n## Initialization\n- Load presets from `/presets` on page load\n- Load selfies from `/selfies` on page load\n- Load results from `/results` on page load\n- Display loading placeholders while fetching\n- Show empty states if no data available\n\n"

rocessing","text":"style RETRY_POSSIBLE fill:#ffe0b2","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"**BбәЈng tГіm tбәҜt cГЎc trЖ°б»қng hб»Јp:**","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"**Key Rules:**","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"1. **Chб»ү cache khi SUCCESS** - Error khГҙng cache","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"2. **Selfie Д‘Ж°б»Јc quбәЈn lГҪ theo queue** - Tб»‘i Д‘a `SELFIE_MAX_FILTER` selfies (mбә·c Д‘б»Ӣnh: 5), tб»ұ Д‘б»ҷng xГіa cЕ© nhбәҘt khi vЖ°б»Јt quГЎ","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"3. **`redraw: true` bб»Ҹ qua cache** - LuГҙn generate mб»ӣi","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"4. **Cache TTL = 24h** - Sau 24h cache tб»ұ expire","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing - 2.6. POST `/restore` - AI Restore","heading":"2.6. POST `/restore` - AI Restore","text":"## 2.6. POST `/restore` - AI Restore","url":"#/API_AI_PROCESSING_VI.md?id=26-post-restore-ai-restore","level":2},{"title":"2. AI Processing","heading":"2. AI Processing","text":"**Mб»Ҙc Д‘Гӯch:** AI khГҙi phб»Ҙc vГ  nГўng cбәҘp бәЈnh - phб»Ҙc hб»“i бәЈnh bб»Ӣ hЖ° hб»Ҹng, cЕ©, mб»қ, hoбә·c Д‘en trбәҜng thГ nh бәЈnh chбәҘt lЖ°б»Јng cao vб»ӣi mГ u sбәҜc sб»‘ng Д‘б»ҷng.","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"**API lГ m gГ¬:** Gб»ӯi `image_url` вҶ’ AI restore (WaveSpeed tImageUrl`.","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"- Endpoint nГ y yГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"- Hб»— trб»Ј `aspect_ratio` tЖ°ЖЎng tб»ұ `/enhance`. Khi `aspect_ratio` lГ  `\"original\"` hoбә·c khГҙng Д‘Ж°б»Јc cung cбәҘp, hб»Ү thб»‘ng sбәҪ tб»ұ Д‘б»ҷng:","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"1. LбәҘy kГӯch thЖ°б»ӣc (width/height) tб»« бәЈnh selfie input","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"2. TГӯnh toГЎn tб»· lб»Ү khung hГ¬nh thб»ұc tбәҝ","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"3. Chб»Қn tб»· lб»Ү gбә§n nhбәҘt trong danh sГЎch hб»— trб»Ј cб»§a Vertex AI","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"4. Sб»ӯ dб»Ҙng tб»· lб»Ү Д‘Гі Д‘б»ғ generate бәЈnh","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"- Дҗiб»Ғu nГ y Д‘бәЈm bбәЈo бәЈnh kбәҝt quбәЈ giб»Ҝ Д‘Ж°б»Јc tб»· lб»Ү gбә§n vб»ӣi бәЈnh gб»‘c thay vГ¬ mбә·c Д‘б»Ӣnh vб»Ғ 1:1.","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"- **CГЎc giГЎ trб»Ӣ hб»— trб»Ј:** `\"original\"`, `\"1:1\"`, `\"3:2\"`, `\"2:3\"`, `\"3:4\"`, `\"4:3\"`, `\"4:5\"`, `\"5:4\"`, `\"9:16\"`, `\"16:9\"`, `\"21:9\"`. Mбә·c Д‘б»Ӣnh: `\"origi","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"**HГ nh vi theo Provider:**","url":"#/API_AI_PROCESSING_VI.md","level":0},{"title":"2. AI Processing","heading":"2. AI Processing","text":"- **Vertex AI (mбә·c Д‘б»Ӣnh):** Sб»ӯ dб»Ҙng `pr               // Override search functionality
              const searchInput = document.querySelector('.search input');
              if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                  const query = e.target.value.toLowerCase().trim();
                  if (query.length < 2) return;
                  
                  const results = window.__staticSearchIndex.filter(item => {
                    const searchText = (item.title + ' ' + item.text).toLowerCase();
                    return searchText.includes(query);
                  });
                  
                  // Display results (simplified - Docsify will handle UI)
                  console.log('Search results:', results.length);
                });
              }
            }
          });
        }
      ]
    };
  </script>
