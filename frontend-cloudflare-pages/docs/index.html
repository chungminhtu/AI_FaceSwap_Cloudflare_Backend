      "API_AI_PROCESSING_VI.md": "# 2. AI Processing\n\n## 2.1. POST `/faceswap` - Face Swap\n\n**Mб»Ҙc Д‘Гӯch:** Thб»ұc hiб»Үn face swap giб»Ҝa бәЈnh preset vГ  бәЈnh selfie. Hб»— trб»Ј multiple selfies Д‘б»ғ tбәЎo composite results (vГӯ dб»Ҙ: wedding photos vб»ӣi cбәЈ male vГ  female).\n\n**API lГ m gГ¬:** Gб»ӯi preset + selfie(s) вҶ’ AI (Vertex dГ№ng prompt_json tб»« preset; WaveSpeed dГ№ng prompt cб»‘ Д‘б»Ӣnh) thay mбә·t/Д‘бә·t ngЖ°б»қi vГ o preset вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:**\n- KhГЎc vб»ӣi `/background`: FaceSwap thay Д‘б»•i khuГҙn mбә·t trong preset, cГІn AI Background merge selfie vГ o preset scene.\n- Endpoint nГ y yГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**HГ nh vi theo Provider:**\n- **Vertex AI (mбә·c Д‘б»Ӣnh):** Sб»ӯ dб»Ҙng `prompt_json` tб»« metadata cб»§a preset Д‘б»ғ thб»ұc hiб»Үn faceswap.\n- **WaveSpeed (`provider: \"wavespeed\"`):** KhГҙng sб»ӯ dб»Ҙng `prompt_json`. Sб»ӯ dб»Ҙng prompt cб»‘ Д‘б»Ӣnh:\n  - **Single mode (1 selfie):** Gб»ӯi `[selfie, preset]` vб»ӣi prompt: \"Put the person in image1 into image2, keep all the makeup same as preset.\"\n  - **Couple mode (2 selfies):** Gб»ӯi `[selfie1, selfie2, preset]` vб»ӣi prompt cГі cбәҘu trГәc Goal/Action/Expressions/Scale/Skin/Body Integrity/Constraints: Д‘бә·t cбәЈ hai ngЖ°б»қi tб»« Image 1 vГ  Image 2 vГ o Image 3, giб»Ҝ nguyГӘn biб»ғu cбәЈm, tб»· lб»Ү cЖЎ thб»ғ, vГ  perspective. Bao gб»“m body integrity checks (khГҙng thб»«a/thiбәҝu ngГіn tay, tay chГўn khГҙng bб»Ӣ biбәҝn dбәЎng) vГ  constraints (khГҙng mang phб»Ҙ kiб»Үn tб»« бәЈnh nguб»“n, giб»Ҝ nguyГӘn filter Д‘en trбәҜng nбәҝu cГі).\n\n**Request:**\n\n**Sб»ӯ dб»Ҙng selfie_ids (tб»« database):**\n```bash\ncurl -X POST https://api.d.shotpix.app/faceswap \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"preset_1234567890_abc123\",\n    \"selfie_ids\": [\"selfie_1234567890_xyz789\"],\n    \"profile_id\": \"profile_1234567890\",\n    \"additional_prompt\": \"Add dramatic lighting and cinematic atmosphere\",\n    \"aspect_ratio\": \"16:9\"\n  }'\n```\n\n**Sб»ӯ dб»Ҙng selfie_image_urls (URL trб»ұc tiбәҝp):**\n```bash\ncurl -X POST https://api.d.shotpix.app/faceswap \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"preset_1234567890_abc123\",\n    \"selfie_image_urls\": [\"https://example.com/selfie1.jpg\", \"https://example.com/selfie2.jpg\"],\n    \"profile_id\": \"profile_1234567890\",\n    \"additional_prompt\": \"Add dramatic lighting and cinematic atmosphere\",\n    \"aspect_ratio\": \"16:9\"\n  }'\n```\n\n**Request Parameters:**\n- `preset_image_id` (string, required): ID бәЈnh preset Д‘ГЈ lЖ°u trong database (format: `preset_...`).\n- `selfie_ids` (array of strings, optional): MбәЈng cГЎc ID бәЈnh selfie Д‘ГЈ lЖ°u trong database (hб»— trб»Ј multiple selfies). Thб»© tб»ұ: [selfie_chГӯnh, selfie_phб»Ҙ] - selfie Д‘бә§u tiГӘn sбәҪ Д‘Ж°б»Јc face swap vГ o preset, selfie thб»© hai (nбәҝu cГі) sбәҪ Д‘Ж°б»Јc sб»ӯ dб»Ҙng lГ m tham chiбәҝu bб»• sung.\n- `selfie_image_urls` (array of strings, optional): MбәЈng cГЎc URL бәЈnh selfie trб»ұc tiбәҝp (thay thбәҝ cho `selfie_ids`). Hб»— trб»Ј multiple selfies. PhбәЈi cung cбәҘp `selfie_ids` HOбә¶C `selfie_image_urls` (khГҙng phбәЈi cбәЈ hai).\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `aspect_ratio` (string, optional): Tб»· lб»Ү khung hГ¬nh (mбә·c Д‘б»Ӣnh: \"3:4\"). Hб»— trб»Ј: \"1:1\", \"3:2\", \"2:3\", \"3:4\", \"4:3\", \"4:5\", \"5:4\", \"9:16\", \"16:9\", \"21:9\".\n  - **LЖ°u ГҪ vб»Ғ kГӯch thЖ°б»ӣc Д‘бә§u ra (WaveSpeed provider):** Nбәҝu `aspect_ratio` Д‘Ж°б»Јc chб»ү Д‘б»Ӣnh rГө rГ ng, hб»Ү thб»‘ng sбәҪ sб»ӯ dб»Ҙng aspect ratio Д‘Гі. Nбәҝu khГҙng chб»ү Д‘б»Ӣnh hoбә·c lГ  \"original\", hб»Ү thб»‘ng sбәҪ sб»ӯ dб»Ҙng kГӯch thЖ°б»ӣc gб»‘c cб»§a selfie (tб»« trЖ°б»қng `dimensions` Д‘Ж°б»Јc lЖ°u khi upload) Д‘б»ғ giб»Ҝ nguyГӘn kГӯch thЖ°б»ӣc бәЈnh Д‘бә§u ra.\n- `additional_prompt` (string, optional): cГўu mГҙ tбәЈ bб»• sung, Д‘Ж°б»Јc nб»‘i vГ o cuб»‘i trЖ°б»қng `prompt` bбәұng kГҪ tб»ұ `+`.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_1234567890_abc123\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Processing successful\",\n  \"code\": 200,\n  \"debug\": {\n    \"request\": {\n      \"targetUrl\": \"https://resources.d.shotpix.app/faceswap-images/preset/example.jpg\",\n      \"sourceUrls\": [\n        \"https://resources.d.shotpix.app/faceswap-images/selfie/selfie_001.jpg\",\n        \"https://resources.d.shotpix.app/faceswap-images/selfie/selfie_002.jpg\"\n      ]\n    },\n    \"provider\": {\n      \"success\": true,\n      \"statusCode\": 200,\n      \"message\": \"Processing successful\",\n      \"finalResultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\",\n      \"debug\": {\n        \"endpoint\": \"https://...\",\n        \"status\": 200,\n        \"durationMs\": 843\n      }\n    },\n    \"vertex\": {\n      \"prompt\": { \"...\": \"...\" },\n      \"debug\": {\n        \"endpoint\": \"https://.../generateContent\",\n        \"status\": 200,\n        \"durationMs\": 5180,\n        \"requestPayload\": {\n          \"promptLength\": 746,\n          \"imageBytes\": 921344\n        }\n      }\n    },\n    \"vision\": {\n      \"checked\": false,\n      \"isSafe\": true,\n      \"error\": \"Safety check skipped for Vertex AI mode\"\n    },\n    \"storage\": {\n      \"attemptedDownload\": true,\n      \"downloadStatus\": 200,\n      \"savedToR2\": true,\n      \"r2Key\": \"results/result_123.jpg\",\n      \"publicUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n    },\n    \"database\": {\n      \"attempted\": true,\n      \"success\": true,\n      \"resultId\": \"result_...\"\n    }\n  }\n}\n```\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.2. POST `/background` - AI Background\n\n**Mб»Ҙc Д‘Гӯch:** TбәЎo бәЈnh mб»ӣi bбәұng cГЎch Д‘бә·t selfie (ngЖ°б»қi) vГ o nб»Ғn. Hб»— trб»Ј 3 cГЎch cung cбәҘp nб»Ғn: `preset_image_id`, `preset_image_url`, hoбә·c `custom_prompt`.\n\n**Luб»“ng xб»ӯ lГҪ (Logic):**\n\n| TrЖ°б»қng hб»Јp | API lГ m gГ¬ |\n|------------|------------|\n| **CГі `custom_prompt`** | Mб»ҷt bЖ°б»ӣc: ghГ©p chuб»—i `custom_prompt` cб»§a client vГ o template (cГі `{{place_holder}}`), gб»ӯi **mб»ҷt бәЈnh selfie** + prompt Д‘Гі vГ o [WaveSpeed Seedream v4 edit-sequential](https://wavespeed.ai/models/bytedance/seedream-v4/edit-sequential). KhГҙng tбәЎo бәЈnh nб»Ғn tб»« text; chб»ү gб»Қi edit vб»ӣi 1 бәЈnh + prompt. |\n| **KhГҙng cГі `custom_prompt`** | Hai thб»©: (1) LбәҘy бәЈnh nб»Ғn tб»« preset (DB hoбә·c `remove_bg/background/` hoбә·c URL). (2) Merge: selfie + бәЈnh nб»Ғn vб»ӣi prompt merge cб»‘ Д‘б»Ӣnh (Vertex hoбә·c WaveSpeed), trбәЈ vб»Ғ бәЈnh composite. |\n\n**LЖ°u ГҪ:** Endpoint nГ y yГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Request:**\n\n**Sб»ӯ dб»Ҙng selfie_id (tб»« database):**\n```bash\ncurl -X POST https://api.d.shotpix.app/background \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"preset_1234567890_abc123\",\n    \"selfie_id\": \"selfie_1234567890_xyz789\",\n    \"profile_id\": \"profile_1234567890\",\n    \"aspect_ratio\": \"16:9\"\n  }'\n```\n\n**Sб»ӯ dб»Ҙng selfie_image_url (URL trб»ұc tiбәҝp):**\n```bash\ncurl -X POST https://api.d.shotpix.app/background \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"preset_1234567890_abc123\",\n    \"selfie_image_url\": \"https://example.com/selfie.png\",\n    \"profile_id\": \"profile_1234567890\",\n    \"aspect_ratio\": \"16:9\"\n  }'\n```\n\n**Sб»ӯ dб»Ҙng custom_prompt (tбәЎo nб»Ғn tб»« text prompt vб»ӣi Vertex AI):**\n```bash\ncurl -X POST https://api.d.shotpix.app/background \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"custom_prompt\": \"A beautiful sunset beach scene with palm trees and golden sand\",\n    \"selfie_id\": \"selfie_1234567890_xyz789\",\n    \"profile_id\": \"profile_1234567890\",\n    \"aspect_ratio\": \"16:9\"\n  }'\n```\n\n**Sб»ӯ dб»Ҙng custom_prompt vб»ӣi selfie_image_url:**\n```bash\ncurl -X POST https://api.d.shotpix.app/background \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"custom_prompt\": \"A futuristic cityscape at night with neon lights and flying cars\",\n    \"selfie_image_url\": \"https://example.com/selfie.png\",\n    \"profile_id\": \"profile_1234567890\",\n    \"aspect_ratio\": \"16:9\"\n  }'\n```\n\n**LЖ°u ГҪ vб»Ғ custom_prompt:**\n- Khi dГ№ng `custom_prompt`: prompt gб»ӯi Д‘i = template (trong config) vб»ӣi `{{place_holder}}` Д‘Ж°б»Јc thay bбәұng chuб»—i client gб»ӯi; gб»Қi WaveSpeed Seedream v4 edit-sequential vб»ӣi **1 бәЈnh selfie** vГ  prompt Д‘Гі.\n- `custom_prompt` khГҙng thб»ғ kбәҝt hб»Јp vб»ӣi `preset_image_id` hoбә·c `preset_image_url` (chб»ү chб»Қn mб»ҷt trong ba).\n\n**LЖ°u ГҪ vб»Ғ preset_image_id:**\n- Hб»— trб»Ј cбәЈ preset tб»« database (trong bбәЈng `presets`) vГ  file trб»ұc tiбәҝp trong folder `/remove_bg/background/` trГӘn R2\n- CГі thб»ғ truyб»Ғn `preset_image_id` kГЁm extension (vГӯ dб»Ҙ: `\"background_001.webp\"`) hoбә·c khГҙng cГі extension (vГӯ dб»Ҙ: `\"background_001\"`)\n- Nбәҝu khГҙng cГі extension, hб»Ү thб»‘ng sбәҪ tб»ұ Д‘б»ҷng thб»ӯ cГЎc extension phб»• biбәҝn: .webp, .jpg, .png, .jpeg\n- Hб»Ү thб»‘ng sбәҪ tГ¬m file theo thб»© tб»ұ: database trЖ°б»ӣc, sau Д‘Гі folder `/remove_bg/background/` nбәҝu khГҙng tГ¬m thбәҘy trong database\n\n**Request Parameters:**\n- `preset_image_id` (string, optional): ID бәЈnh preset hoбә·c filename trong folder `/remove_bg/background/`. PhбәЈi cung cбәҘp `preset_image_id` HOбә¶C `preset_image_url` HOбә¶C `custom_prompt` (chб»ү mб»ҷt trong ba).\n- `preset_image_url` (string, optional): URL бәЈnh preset trб»ұc tiбәҝp (thay thбәҝ cho `preset_image_id`). PhбәЈi cung cбәҘp `preset_image_id` HOбә¶C `preset_image_url` HOбә¶C `custom_prompt` (chб»ү mб»ҷt trong ba).\n- `custom_prompt` (string, optional): Chuб»—i mГҙ tбәЈ nб»Ғn/scene do client gб»ӯi; Д‘Ж°б»Јc thay vГ o `{{place_holder}}` trong template vГ  gб»ӯi cГ№ng **mб»ҷt бәЈnh selfie** tб»ӣi WaveSpeed Seedream v4 edit-sequential. PhбәЈi cung cбәҘp `preset_image_id` HOбә¶C `preset_image_url` HOбә¶C `custom_prompt` (chб»ү mб»ҷt trong ba).\n- `selfie_id` (string, optional): ID бәЈnh selfie Д‘ГЈ lЖ°u trong database (ngЖ°б»қi). PhбәЈi cung cбәҘp `selfie_id` HOбә¶C `selfie_image_url` (khГҙng phбәЈi cбәЈ hai).\n- `selfie_image_url` (string, optional): URL бәЈnh selfie trб»ұc tiбәҝp (thay thбәҝ cho `selfie_id`).\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `aspect_ratio` (string, optional): Tб»· lб»Ү khung hГ¬nh. CГЎc giГЎ trб»Ӣ hб»— trб»Ј: `\"original\"`, `\"1:1\"`, `\"3:2\"`, `\"2:3\"`, `\"3:4\"`, `\"4:3\"`, `\"4:5\"`, `\"5:4\"`, `\"9:16\"`, `\"16:9\"`, `\"21:9\"`. Mбә·c Д‘б»Ӣnh: `\"3:4\"`.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_1234567890_abc123\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Processing successful\",\n  \"code\": 200,\n  \"debug\": {\n    \"request\": {\n      \"targetUrl\": \"https://resources.d.shotpix.app/faceswap-images/preset/landscape.jpg\",\n      \"selfieUrl\": \"https://resources.d.shotpix.app/faceswap-images/selfie/selfie_001.png\"\n    },\n    \"provider\": {\n      \"success\": true,\n      \"statusCode\": 200,\n      \"message\": \"Processing successful\",\n      \"finalResultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n    },\n    \"vision\": {\n      \"checked\": false,\n      \"isSafe\": true,\n      \"error\": \"Safety check skipped for Vertex AI mode\"\n    },\n    \"storage\": {\n      \"attemptedDownload\": true,\n      \"downloadStatus\": 200,\n      \"savedToR2\": true,\n      \"r2Key\": \"results/result_123.jpg\",\n      \"publicUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n    },\n    \"database\": {\n      \"attempted\": true,\n      \"success\": true,\n      \"resultId\": \"result_1234567890_abc123\"\n    }\n  }\n}\n```\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.3. POST `/enhance` - AI Enhance\n\n**Mб»Ҙc Д‘Гӯch:** AI restoration vГ  enhancement бәЈnh - cбәЈi thiб»Үn sharpness, clarity, vГ  fine detail trong khi giб»Ҝ nguyГӘn chГӯnh xГЎc objects vГ  structure tб»« бәЈnh gб»‘c. Chб»ү restore detail bб»Ӣ mбәҘt do blur, noise, hoбә·c compression вҖ” khГҙng tбәЎo thГӘm objects mб»ӣi.\n\n**API lГ m gГ¬:** Gб»ӯi `image_url` вҶ’ AI (WaveSpeed) enhance бәЈnh вҶ’ trбәЈ `resultImageUrl`. Tб»ұ Д‘б»ҷng chб»Қn model theo kГӯch thЖ°б»ӣc: бәЈnh nhб»Ҹ (< 800px) dГ№ng Gemini 2.5 Flash Image, бәЈnh lб»ӣn (вүҘ 800px) dГ№ng Flux 2 Klein 9B.\n\n**LЖ°u ГҪ:**\n- Endpoint nГ y yГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n- CГЎc endpoints khГҙng phбәЈi faceswap (`/enhance`, `/beauty`, `/filter`, `/restore`, `/aging`, `/background`) hб»— trб»Ј giГЎ trб»Ӣ `\"original\"` cho `aspect_ratio`.\n- Khi `aspect_ratio` lГ  `\"original\"` hoбә·c khГҙng Д‘Ж°б»Јc cung cбәҘp, hб»Ү thб»‘ng sбәҪ tб»ұ Д‘б»ҷng:\n  1. LбәҘy kГӯch thЖ°б»ӣc (width/height) tб»« бәЈnh input\n  2. TГӯnh toГЎn tб»· lб»Ү khung hГ¬nh thб»ұc tбәҝ\n  3. Chб»Қn tб»· lб»Ү gбә§n nhбәҘt trong danh sГЎch hб»— trб»Ј cб»§a Vertex AI\n  4. Sб»ӯ dб»Ҙng tб»· lб»Ү Д‘Гі Д‘б»ғ generate бәЈnh\n- Дҗiб»Ғu nГ y Д‘бәЈm bбәЈo бәЈnh kбәҝt quбәЈ giб»Ҝ Д‘Ж°б»Јc tб»· lб»Ү gбә§n vб»ӣi бәЈnh gб»‘c thay vГ¬ mбә·c Д‘б»Ӣnh vб»Ғ 1:1.\n- **CГЎc giГЎ trб»Ӣ hб»— trб»Ј:** `\"original\"`, `\"1:1\"`, `\"3:2\"`, `\"2:3\"`, `\"3:4\"`, `\"4:3\"`, `\"4:5\"`, `\"5:4\"`, `\"9:16\"`, `\"16:9\"`, `\"21:9\"`. Mбә·c Д‘б»Ӣnh: `\"original\"`.\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/enhance \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_url\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\",\n    \"profile_id\": \"profile_1234567890\",\n    \"aspect_ratio\": \"1:1\",\n  }'\n```\n\n**Request Parameters:**\n- `image_url` (string, required): URL бәЈnh cбә§n enhance.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `aspect_ratio` (string, optional): Tб»· lб»Ү khung hГ¬nh. Xem [LЖ°u ГҪ vб»Ғ Aspect Ratio](#23-post-enhance---ai-enhance) cho chi tiбәҝt. Mбә·c Д‘б»Ӣnh: `\"original\"`.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_1234567890_abc123\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/enhance_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Image enhancement completed\",\n  \"code\": 200,\n  \"debug\": {\n    \"provider\": {\n      \"success\": true,\n      \"statusCode\": 200,\n      \"message\": \"Enhancement completed\"\n    }\n  }\n}\n```\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.4. POST `/beauty` - AI Beauty\n\n**Mб»Ҙc Д‘Гӯch:** AI beautify бәЈnh - retouching tб»ұ nhiГӘn cho portrait. LГ m mб»Ӣn da, xГіa mб»Ҙn, makeup nhбә№ tб»ұ nhiГӘn. KhГҙng chб»үnh sб»ӯa vГ№ng mбәҜt (giб»Ҝ nguyГӘn trбәЎng thГЎi mбәҜt mб»ҹ/nhбәҜm). Bao gб»“m body integrity checks.\n\n**API lГ m gГ¬:** Gб»ӯi `image_url` вҶ’ AI beautify (WaveSpeed Flux 2 Klein 9B) вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:** Endpoint nГ y yГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/beauty \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_url\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\",\n    \"profile_id\": \"profile_1234567890\",\n    \"aspect_ratio\": \"1:1\",\n  }'\n```\n\n**Request Parameters:**\n- `image_url` (string, required): URL бәЈnh cбә§n beautify.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `aspect_ratio` (string, optional): Tб»· lб»Ү khung hГ¬nh. Xem [LЖ°u ГҪ vб»Ғ Aspect Ratio](#23-post-enhance---ai-enhance) cho chi tiбәҝt. Mбә·c Д‘б»Ӣnh: `\"original\"`.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_1234567890_abc123\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/beauty_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Image beautification completed\",\n  \"code\": 200,\n  \"debug\": {\n    \"provider\": {\n      \"success\": true,\n      \"statusCode\": 200,\n      \"message\": \"Beautification completed\"\n    }\n  }\n}\n```\n\n**TГӯnh nДғng AI Beauty:**\n- LГ m mб»Ӣn da tб»ұ nhiГӘn (smooth skin, remove acne/blemishes)\n- Дҗб»Ғu mГ u da toГ n thГўn (consistent skin tone across all visible areas)\n- Makeup nhбә№ tб»ұ nhiГӘn (subtle natural makeup on lips/complexion only)\n- **KhГҙng chб»үnh sб»ӯa vГ№ng mбәҜt** (preserve eye state, eyelids, eyelashes, eyebrows exactly)\n- XГіa lГҙng trГӘn cЖЎ thб»ғ (remove body hair)\n- Giб»Ҝ nguyГӘn cбәҘu trГәc khuГҙn mбә·t vГ  biб»ғu cбәЈm gб»‘c\n- Body integrity: khГҙng thб»«a/thiбәҝu ngГіn tay, khГҙng biбәҝn dбәЎng tay chГўn\n\n**LЖ°u ГҪ:** AI Beauty tбәӯp trung vГ o retouching tб»ұ nhiГӘn вҖ” khГҙng reconstruct khuГҙn mбә·t hoбә·c tбәЎo thГӘm chi tiбәҝt khГҙng cГі trong бәЈnh gб»‘c. KhГЎc vб»ӣi AI Enhance (cбәЈi thiб»Үn chбәҘt lЖ°б»Јng kб»№ thuбәӯt).\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.5. POST `/filter` - AI Filter (Styles)\n\n**Mб»Ҙc Д‘Гӯch:** AI Filter (Styles) - ГҒp dб»Ҙng cГЎc style sГЎng tбәЎo hoбә·c Д‘iб»Үn бәЈnh tб»« preset lГӘn selfie trong khi giб»Ҝ nguyГӘn tГӯnh toГ n vбә№n khuГҙn mбә·t.\n\n**API lГ m gГ¬:** Gб»ӯi preset + selfie вҶ’ AI (Vertex dГ№ng prompt_json; WaveSpeed phГўn tГӯch style tб»« preset) ГЎp dб»Ҙng style lГӘn selfie, giб»Ҝ mбә·t вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:** Endpoint nГ y yГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**HГ nh vi theo Provider:**\n- **Vertex AI (mбә·c Д‘б»Ӣnh):** Sб»ӯ dб»Ҙng `prompt_json` tб»« metadata cб»§a preset Д‘б»ғ ГЎp dб»Ҙng style. Preset phбәЈi cГі `prompt_json`.\n- **WaveSpeed (`provider: \"wavespeed\"`):** KhГҙng sб»ӯ dб»Ҙng `prompt_json`. Thay vГ o Д‘Гі, WaveSpeed tб»ұ phГўn tГӯch style cб»§a preset image (figurine, pop mart, clay, disney, etc.) vГ  ГЎp dб»Ҙng style Д‘Гі lГӘn selfie. Gб»ӯi images theo thб»© tб»ұ `[selfie, preset]` - image 1 lГ  selfie (бәЈnh cбә§n ГЎp dб»Ҙng style), image 2 lГ  preset (nguб»“n style).\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/filter \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"preset_1234567890_abc123\",\n    \"selfie_id\": \"selfie_1234567890_xyz789\",\n    \"profile_id\": \"profile_1234567890\",\n    \"aspect_ratio\": \"1:1\",\n    \"additional_prompt\": \"Add dramatic lighting\"\n  }'\n```\n\n**Hoбә·c sб»ӯ dб»Ҙng selfie_image_url:**\n```bash\ncurl -X POST https://api.d.shotpix.app/filter \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"preset_1234567890_abc123\",\n    \"selfie_image_url\": \"https://resources.d.shotpix.app/faceswap-images/selfie/selfie_001.png\",\n    \"profile_id\": \"profile_1234567890\"\n  }'\n```\n\n**Request Parameters:**\n- `preset_image_id` (string, required): ID preset Д‘ГЈ lЖ°u trong database (format: `preset_...`). Preset phбәЈi cГі `prompt_json` (chб»ү yГӘu cбә§u cho Vertex provider).\n- `selfie_id` (string, optional): ID selfie Д‘ГЈ lЖ°u trong database. BбәҜt buб»ҷc nбәҝu khГҙng cГі `selfie_image_url`.\n- `selfie_image_url` (string, optional): URL бәЈnh selfie trб»ұc tiбәҝp. BбәҜt buб»ҷc nбәҝu khГҙng cГі `selfie_id`.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `aspect_ratio` (string, optional): Tб»· lб»Ү khung hГ¬nh. Xem [LЖ°u ГҪ vб»Ғ Aspect Ratio](#23-post-enhance---ai-enhance) cho chi tiбәҝt. Mбә·c Д‘б»Ӣnh: `\"original\"`.\n- `additional_prompt` (string, optional): Prompt bб»• sung Д‘б»ғ tГ№y chб»үnh style.\n- `provider` (string, optional): Provider AI. GiГЎ trб»Ӣ: `\"vertex\"` (mбә·c Д‘б»Ӣnh), `\"wavespeed\"` (Flux), hoбә·c `\"wavespeed_gemini_2_5_flash_image\"` (Gemini 2.5 Flash Image qua WaveSpeed). WaveSpeed khГҙng yГӘu cбә§u `prompt_json` trong preset.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_1234567890_abc123\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/filter_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Style filter applied successfully\",\n  \"code\": 200,\n  \"debug\": {\n    \"provider\": {\n      \"success\": true,\n      \"statusCode\": 200,\n      \"message\": \"Filter applied\"\n    }\n  }\n}\n```\n\n**TГӯnh nДғng AI Filter:**\n- Дҗб»Қc prompt_json tб»« preset (chб»©a thГҙng tin vб»Ғ style, lighting, composition, camera, background)\n- ГҒp dб»Ҙng style sГЎng tбәЎo/Д‘iб»Үn бәЈnh tб»« preset lГӘn selfie\n- Giб»Ҝ nguyГӘn 100% khuГҙn mбә·t, Д‘бә·c Д‘iб»ғm, cбәҘu trГәc xЖ°ЖЎng, mГ u da\n- Chб»ү thay Д‘б»•i style, mГҙi trЖ°б»қng, ГЎnh sГЎng, mГ u sбәҜc, vГ  mood hГ¬nh бәЈnh\n- Hб»— trб»Ј additional_prompt Д‘б»ғ tГ№y chб»үnh thГӘm\n\n**LЖ°u ГҪ:**\n- Preset phбәЈi cГі prompt_json (Д‘Ж°б»Јc tбәЎo tб»ұ Д‘б»ҷng khi upload preset vб»ӣi `enableVertexPrompt=true`)\n- Nбәҝu preset chЖ°a cГі prompt_json, API sбәҪ tб»ұ Д‘б»ҷng generate tб»« preset image\n- KhГЎc vб»ӣi `/faceswap`: Filter giб»Ҝ nguyГӘn khuГҙn mбә·t vГ  chб»ү ГЎp dб»Ҙng style, khГҙng thay Д‘б»•i khuГҙn mбә·t\n\n**Parameter `redraw`:**\n- `redraw: true` вҶ’ Bб»Ҹ qua cache, luГҙn generate бәЈnh mб»ӣi (sб»ӯ dб»Ҙng cho nГәt \"Redraw\")\n- `redraw: false` hoбә·c khГҙng set вҶ’ Check cache trЖ°б»ӣc khi generate\n\n**Flow xб»ӯ lГҪ /filter:**\n\n```mermaid\nflowchart TD\n    START([Client Request]) --> PARSE[Parse Request Body]\n    PARSE --> VALIDATE{Valid Input?}\n\n    VALIDATE -->|No| ERR400[400: Missing required field]\n    VALIDATE -->|Yes| CHECK_REDRAW{redraw: true?}\n\n    CHECK_REDRAW -->|Yes| LOOKUP_SELFIE_REDRAW[Lookup Selfie in DB]\n    CHECK_REDRAW -->|No| LOOKUP_SELFIE[Lookup Selfie in DB]\n\n    LOOKUP_SELFIE --> SELFIE_EXISTS{Selfie Exists?}\n    LOOKUP_SELFIE_REDRAW --> SELFIE_EXISTS_REDRAW{Selfie Exists?}\n\n    SELFIE_EXISTS -->|Yes| CALL_AI[Call AI Provider]\n    SELFIE_EXISTS -->|No| CHECK_CACHE{Check KV Cache}\n\n    SELFIE_EXISTS_REDRAW -->|Yes| CALL_AI_REDRAW[Call AI Provider]\n    SELFIE_EXISTS_REDRAW -->|No| ERR404_REDRAW[404: Selfie not found<br/>Cannot redraw without selfie]\n\n    CHECK_CACHE -->|Found| RETURN_CACHED[200: Return Cached Result<br/>cached: true]\n    CHECK_CACHE -->|Not Found| ERR404[404: Selfie not found<br/>No cached result]\n\n    CALL_AI --> AI_RESULT{AI Success?}\n    CALL_AI_REDRAW --> AI_RESULT_REDRAW{AI Success?}\n\n    AI_RESULT -->|Error| ERR500[500: AI Processing Error<br/>Selfie NOT deleted<br/>NO cache stored]\n    AI_RESULT -->|Success| CACHE_RESULT[Cache Result in KV<br/>TTL: 24h]\n\n    AI_RESULT_REDRAW -->|Error| ERR500\n    AI_RESULT_REDRAW -->|Success| CACHE_RESULT_REDRAW[Update Cache in KV<br/>TTL: 24h]\n\n    CACHE_RESULT --> SUCCESS[200: Return Result<br/>resultImageUrl]\n    CACHE_RESULT_REDRAW --> SUCCESS_REDRAW[200: Return NEW Result<br/>resultImageUrl]\n\n    ERR400 --> END([End])\n    ERR404 --> END\n    ERR404_REDRAW --> END\n    ERR500 --> RETRY_POSSIBLE([Client Can Retry<br/>Selfie still exists])\n    RETURN_CACHED --> END\n    SUCCESS --> END\n    SUCCESS_REDRAW --> END\n\n    style START fill:#e1f5fe\n    style SUCCESS fill:#c8e6c9\n    style SUCCESS_REDRAW fill:#c8e6c9\n    style RETURN_CACHED fill:#fff9c4\n    style ERR400 fill:#ffcdd2\n    style ERR404 fill:#ffcdd2\n    style ERR404_REDRAW fill:#ffcdd2\n    style ERR500 fill:#ffcdd2\n    style RETRY_POSSIBLE fill:#ffe0b2\n```\n\n**BбәЈng tГіm tбәҜt cГЎc trЖ°б»қng hб»Јp:**\n\n| Scenario | `redraw` | Selfie Exists | Cache Exists | Result |\n|----------|----------|---------------|--------------|--------|\n| First request | `false` | вң… | вқҢ | Generate new |\n| Retry after success | `false` | вқҢ (deleted by queue) | вң… | Return cached |\n| Redraw button | `true` | вң… | вң… (ignored) | Generate new |\n| Retry after API error | `false` | вң… (not deleted) | вқҢ | Generate new |\n| Invalid selfie + no cache | `false` | вқҢ | вқҢ | 404 Error |\n\n**Key Rules:**\n1. **Chб»ү cache khi SUCCESS** - Error khГҙng cache\n2. **Selfie Д‘Ж°б»Јc quбәЈn lГҪ theo queue** - Tб»‘i Д‘a `SELFIE_MAX_FILTER` selfies (mбә·c Д‘б»Ӣnh: 5), tб»ұ Д‘б»ҷng xГіa cЕ© nhбәҘt khi vЖ°б»Јt quГЎ\n3. **`redraw: true` bб»Ҹ qua cache** - LuГҙn generate mб»ӣi\n4. **Cache TTL = 24h** - Sau 24h cache tб»ұ expire\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.6. POST `/restore` - AI Restore\n\n**Mб»Ҙc Д‘Гӯch:** AI khГҙi phб»Ҙc vГ  nГўng cбәҘp бәЈnh - phб»Ҙc hб»“i бәЈnh bб»Ӣ hЖ° hб»Ҹng, cЕ©, mб»қ, hoбә·c Д‘en trбәҜng thГ nh бәЈnh chбәҘt lЖ°б»Јng cao vб»ӣi mГ u sбәҜc sб»‘ng Д‘б»ҷng.\n\n**API lГ m gГ¬:** Gб»ӯi `image_url` вҶ’ AI restore (WaveSpeed) вҶ’ trбәЈ `resultImageUrl`. Tб»ұ Д‘б»ҷng chб»Қn model theo kГӯch thЖ°б»ӣc бәЈnh: бәЈnh nhб»Ҹ (< 800px cбәЎnh lб»ӣn nhбәҘt) dГ№ng Gemini 2.5 Flash Image, бәЈnh lб»ӣn (вүҘ 800px) dГ№ng Flux 2 Klein 9B v3.\n\n**LЖ°u ГҪ:** Endpoint nГ y yГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/restore \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_url\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\",\n    \"profile_id\": \"profile_1234567890\",\n    \"aspect_ratio\": \"1:1\",\n  }'\n```\n\n**Request Parameters:**\n- `image_url` (string, required): URL бәЈnh cбә§n khГҙi phб»Ҙc (бәЈnh cЕ©, bб»Ӣ hЖ° hб»Ҹng, mб»қ, hoбә·c Д‘en trбәҜng).\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `aspect_ratio` (string, optional): Tб»· lб»Ү khung hГ¬nh. Xem [LЖ°u ГҪ vб»Ғ Aspect Ratio](#23-post-enhance---ai-enhance) cho chi tiбәҝt. Mбә·c Д‘б»Ӣnh: `\"original\"`.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_1234567890_abc123\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/restore_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Image restoration completed\",\n  \"code\": 200,\n  \"debug\": {\n    \"provider\": {\n      \"success\": true,\n      \"statusCode\": 200,\n      \"message\": \"Restoration completed\"\n    }\n  }\n}\n```\n\n**TГӯnh nДғng AI Restore:**\n- KhГҙi phб»Ҙc бәЈnh bб»Ӣ hЖ° hб»Ҹng (fix scratches, tears, noise, blurriness)\n- Chuyб»ғn Д‘б»•i бәЈnh Д‘en trбәҜng thГ nh mГ u vб»ӣi mГ u sбәҜc sб»‘ng Д‘б»ҷng\n- NГўng cбәҘp chбәҘt lЖ°б»Јng lГӘn 16K DSLR quality\n- TДғng cЖ°б»қng chi tiбәҝt (face, eyes, hair, clothing)\n- ThГӘm ГЎnh sГЎng, bГіng Д‘б»•, vГ  Д‘б»ҷ sГўu trЖ°б»қng бәЈnh thб»ұc tбәҝ\n- Retouching chuyГӘn nghiб»Үp cбәҘp Photoshop\n- High dynamic range, ultra-HD, lifelike textures\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.7. POST `/aging` - AI Aging\n\n**Mб»Ҙc Д‘Гӯch:** AI biбәҝn Д‘б»•i tuб»•i khuГҙn mбә·t - ГЎp dб»Ҙng style tuб»•i tб»« preset lГӘn selfie. Mб»—i preset chб»©a prompt_json Д‘б»Ӣnh nghД©a style tuб»•i cб»Ҙ thб»ғ (em bГ©, ngЖ°б»қi giГ , v.v.).\n\n**API lГ m gГ¬:** Gб»ӯi preset (cГі prompt_json style tuб»•i) + selfie вҶ’ AI (Vertex/WaveSpeed) ГЎp dб»Ҙng biбәҝn Д‘б»•i tuб»•i вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:**\n- Endpoint nГ y yГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n- Hб»— trб»Ј `aspect_ratio` tЖ°ЖЎng tб»ұ `/enhance`. Khi `aspect_ratio` lГ  `\"original\"` hoбә·c khГҙng Д‘Ж°б»Јc cung cбәҘp, hб»Ү thб»‘ng sбәҪ tб»ұ Д‘б»ҷng:\n  1. LбәҘy kГӯch thЖ°б»ӣc (width/height) tб»« бәЈnh selfie input\n  2. TГӯnh toГЎn tб»· lб»Ү khung hГ¬nh thб»ұc tбәҝ\n  3. Chб»Қn tб»· lб»Ү gбә§n nhбәҘt trong danh sГЎch hб»— trб»Ј cб»§a Vertex AI\n  4. Sб»ӯ dб»Ҙng tб»· lб»Ү Д‘Гі Д‘б»ғ generate бәЈnh\n- Дҗiб»Ғu nГ y Д‘бәЈm bбәЈo бәЈnh kбәҝt quбәЈ giб»Ҝ Д‘Ж°б»Јc tб»· lб»Ү gбә§n vб»ӣi бәЈnh gб»‘c thay vГ¬ mбә·c Д‘б»Ӣnh vб»Ғ 1:1.\n- **CГЎc giГЎ trб»Ӣ hб»— trб»Ј:** `\"original\"`, `\"1:1\"`, `\"3:2\"`, `\"2:3\"`, `\"3:4\"`, `\"4:3\"`, `\"4:5\"`, `\"5:4\"`, `\"9:16\"`, `\"16:9\"`, `\"21:9\"`. Mбә·c Д‘б»Ӣnh: `\"original\"`.\n\n**HГ nh vi theo Provider:**\n- **Vertex AI (mбә·c Д‘б»Ӣnh):** Sб»ӯ dб»Ҙng `prompt_json` tб»« metadata cб»§a preset Д‘б»ғ ГЎp dб»Ҙng biбәҝn Д‘б»•i tuб»•i. Preset phбәЈi cГі `prompt_json`.\n- **WaveSpeed (`provider: \"wavespeed\"`):** Sб»ӯ dб»Ҙng `prompt_json` nбәҝu cГі, hoбә·c phГўn tГӯch style cб»§a preset image trб»ұc tiбәҝp. Gб»ӯi images theo thб»© tб»ұ `[selfie, preset]`.\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/aging \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"aging_baby_preset_001\",\n    \"selfie_id\": \"selfie_1234567890_xyz789\",\n    \"profile_id\": \"profile_1234567890\"\n  }'\n```\n\n**Hoбә·c sб»ӯ dб»Ҙng selfie_image_url:**\n```bash\ncurl -X POST https://api.d.shotpix.app/aging \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"aging_elderly_preset_001\",\n    \"selfie_image_url\": \"https://example.com/selfie.jpg\",\n    \"profile_id\": \"profile_1234567890\",\n    \"aspect_ratio\": \"original\",\n    \"additional_prompt\": \"Make the aging look natural\"\n  }'\n```\n\n**Request Parameters:**\n- `preset_image_id` (string, required*): ID preset aging Д‘ГЈ lЖ°u trong database. Preset chб»©a `prompt_json` Д‘б»Ӣnh nghД©a style tuб»•i. *BбәҜt buб»ҷc nбәҝu khГҙng cГі `preset_image_url`.\n- `preset_image_url` (string, required*): URL бәЈnh preset trб»ұc tiбәҝp. *BбәҜt buб»ҷc nбәҝu khГҙng cГі `preset_image_id`.\n- `selfie_id` (string, required*): ID selfie Д‘ГЈ lЖ°u trong database. *BбәҜt buб»ҷc nбәҝu khГҙng cГі `selfie_image_url`.\n- `selfie_image_url` (string, required*): URL бәЈnh selfie trб»ұc tiбәҝp. *BбәҜt buб»ҷc nбәҝu khГҙng cГі `selfie_id`.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `aspect_ratio` (string, optional): Tб»· lб»Ү khung hГ¬nh. Mбә·c Д‘б»Ӣnh: `\"original\"`.\n- `additional_prompt` (string, optional): Prompt bб»• sung Д‘б»ғ tГ№y chб»үnh.\n- `provider` (string, optional): Provider AI. GiГЎ trб»Ӣ: `\"vertex\"` (mбә·c Д‘б»Ӣnh), `\"wavespeed\"` (Flux), hoбә·c `\"wavespeed_gemini_2_5_flash_image\"` (Gemini 2.5 Flash Image qua WaveSpeed).\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_1234567890_abc123\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/aging_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Aging transformation completed\",\n  \"code\": 200,\n  \"debug\": {\n    \"provider\": {\n      \"success\": true,\n      \"statusCode\": 200,\n      \"message\": \"Aging completed\"\n    }\n  }\n}\n```\n\n**TГӯnh nДғng AI Aging:**\n- Sб»ӯ dб»Ҙng prompt_json tб»« preset (chб»©a hЖ°б»ӣng dбә«n biбәҝn Д‘б»•i tuб»•i cб»Ҙ thб»ғ)\n- Mб»—i preset cГі style tuб»•i riГӘng (em bГ©, thiбәҝu niГӘn, trung niГӘn, ngЖ°б»қi giГ , v.v.)\n- Giб»Ҝ nguyГӘn race, ethnicity, skin tone, gender\n- Hб»— trб»Ј additional_prompt Д‘б»ғ tГ№y chб»үnh thГӘm\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.8. POST `/upscaler4k` - AI Upscale 4K\n\n**Mб»Ҙc Д‘Гӯch:** Upscale бәЈnh lГӘn Д‘б»ҷ phГўn giбәЈi 4K sб»ӯ dб»Ҙng WaveSpeed AI.\n\n**API lГ m gГ¬:** Gб»ӯi `image_url` вҶ’ WaveSpeed upscaler вҶ’ trбәЈ `resultImageUrl` (4K).\n\n**LЖ°u ГҪ:** Endpoint nГ y yГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/upscaler4k \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_url\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\",\n    \"profile_id\": \"profile_1234567890\"\n  }'\n```\n\n**Request Parameters:**\n- `image_url` (string, required): URL бәЈnh cбә§n upscale.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_1234567890_abc123\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/upscaler4k_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Upscaling completed\",\n  \"code\": 200,\n  \"debug\": {\n    \"provider\": {\n      \"success\": true,\n      \"statusCode\": 200,\n      \"message\": \"Upscaler4K image upscaling completed\",\n      \"finalResultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/upscaler4k_123.jpg\"\n    },\n    \"vertex\": {\n      \"debug\": {\n        \"endpoint\": \"https://api.wavespeed.ai/api/v3/wavespeed-ai/ultimate-image-upscaler\",\n        \"status\": 200,\n        \"durationMs\": 5000\n      }\n    },\n    \"inputSafety\": {\n      \"checked\": true,\n      \"isSafe\": true\n    },\n    \"outputSafety\": {\n      \"checked\": true,\n      \"isSafe\": true\n    }\n  }\n}\n```\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.9. POST `/remove-object` - AI XГіa vбәӯt thб»ғ\n\n**Mб»Ҙc Д‘Гӯch:** XГіa vбәӯt thб»ғ hoбә·c vГ№ng Д‘Ж°б»Јc chб»ү Д‘б»Ӣnh bбәұng mask khб»Ҹi бәЈnh, lбәҘp Д‘бә§y bбәұng nб»Ғn tб»ұ nhiГӘn. Sб»ӯ dб»Ҙng WaveSpeed Bria Eraser API (SOTA object removal).\n\n**API lГ m gГ¬:** Gб»ӯi бәЈnh gб»‘c + mask (selfie_id + mask_id hoбә·c URL) вҶ’ WaveSpeed Bria Eraser xГіa vГ№ng trбәҜng trГӘn mask вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:** YГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Quy trГ¬nh:**\n1. Upload бәЈnh gб»‘c qua `POST /upload-url` (type=selfie, action=remove_object)\n2. Upload mask qua `POST /upload-url` (type=mask) - vГ№ng trбәҜng = xГіa, vГ№ng Д‘en = giб»Ҝ lбәЎi\n3. Gб»Қi `POST /remove-object` vб»ӣi selfie_id vГ  mask_id\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/remove-object \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"selfie_id\": \"E0PtVZEio5fctjMd\",\n    \"mask_id\": \"mask_abc123\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n**Hoбә·c dГ№ng URL trб»ұc tiбәҝp:**\n```bash\ncurl -X POST https://api.d.shotpix.app/remove-object \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"selfie_image_url\": \"https://resources.d.shotpix.app/selfie/abc.webp\",\n    \"mask_image_url\": \"https://resources.d.shotpix.app/mask/xyz.webp\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n**Request Parameters:**\n- `selfie_id` (string): ID бәЈnh gб»‘c (tб»« upload-url type=selfie). KhГҙng dГ№ng cГ№ng `selfie_image_url`.\n- `selfie_image_url` (string): URL бәЈnh gб»‘c. KhГҙng dГ№ng cГ№ng `selfie_id`.\n- `mask_id` (string): ID mask (tб»« upload-url type=mask). KhГҙng dГ№ng cГ№ng `mask_image_url`.\n- `mask_image_url` (string): URL mask. KhГҙng dГ№ng cГ№ng `mask_id`.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n\n**LЖ°u ГҪ kб»№ thuбәӯt:** API sб»ӯ dб»Ҙng WaveSpeed Bria Eraser - khГҙng cбә§n prompt, chб»ү gб»ӯi бәЈnh gб»‘c + mask. KhГҙng hб»— trб»Ј `aspect_ratio`, `model`, `provider` (luГҙn dГ№ng Bria Eraser).\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_id\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Object removal completed\",\n  \"code\": 200\n}\n```\n\n**LЖ°u ГҪ:** Sau khi xб»ӯ lГҪ, selfie vГ  mask sбәҪ tб»ұ Д‘б»ҷng bб»Ӣ xГіa.\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.10. POST `/expression` - AI Thay Д‘б»•i biб»ғu cбәЈm\n\n**Mб»Ҙc Д‘Гӯch:** Thay Д‘б»•i biб»ғu cбәЈm khuГҙn mбә·t trong бәЈnh dб»ұa trГӘn loбәЎi biб»ғu cбәЈm Д‘Ж°б»Јc chб»Қn.\n\n**API lГ m gГ¬:** Gб»ӯi selfie + `expression` (sad/laugh/smile/...) вҶ’ AI (Vertex/WaveSpeed) chб»үnh biб»ғu cбәЈm вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:** YГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Danh sГЎch Expression hб»— trб»Ј:**\n\n| GiГЎ trб»Ӣ | MГҙ tбәЈ |\n|---------|-------|\n| `sad` | Buб»“n - NГ©t mбә·t buб»“n bГЈ, u sбә§u |\n| `laugh` | CЖ°б»қi lб»ӣn - CЖ°б»қi sбәЈng khoГЎi, hГЎ miб»Үng |\n| `smile` | Mб»үm cЖ°б»қi - Nб»Ҙ cЖ°б»қi tб»ұ nhiГӘn, бәҘm ГЎp |\n| `dimpled_smile` | CЖ°б»қi lГәm Д‘б»“ng tiб»Ғn - Nб»Ҙ cЖ°б»қi rб»ҷng vб»ӣi lГәm Д‘б»“ng tiб»Ғn |\n| `open_eye` | Mб»ҹ mбәҜt to - MбәҜt mб»ҹ rб»ҷng, ngбәЎc nhiГӘn |\n| `close_eye` | NhбәҜm mбәҜt - MбәҜt nhбә№ nhГ ng nhбәҜm lбәЎi |\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/expression \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"selfie_id\": \"E0PtVZEio5fctjMd\",\n    \"expression\": \"smile\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\",\n    \"aspect_ratio\": \"original\"\n  }'\n```\n\n**Hoбә·c dГ№ng URL trб»ұc tiбәҝp:**\n```bash\ncurl -X POST https://api.d.shotpix.app/expression \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"selfie_image_url\": \"https://resources.d.shotpix.app/selfie/abc.webp\",\n    \"expression\": \"laugh\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n**Request Parameters:**\n- `selfie_id` (string): ID selfie. KhГҙng dГ№ng cГ№ng `selfie_image_url`.\n- `selfie_image_url` (string): URL бәЈnh. KhГҙng dГ№ng cГ№ng `selfie_id`.\n- `expression` (string, required): LoбәЎi biб»ғu cбәЈm. GiГЎ trб»Ӣ: `sad`, `laugh`, `smile`, `dimpled_smile`, `open_eye`, `close_eye`.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `aspect_ratio` (string, optional): Tб»ү lб»Ү khung hГ¬nh. Mбә·c Д‘б»Ӣnh `original`.\n- `model` (string, optional): Model AI. Mбә·c Д‘б»Ӣnh `2.5`.\n- `provider` (string, optional): `vertex` hoбә·c `wavespeed`.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_id\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\",\n    \"expression\": \"smile\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Expression modification completed\",\n  \"code\": 200\n}\n```\n\n**LЖ°u ГҪ:** Sau khi xб»ӯ lГҪ, selfie sбәҪ tб»ұ Д‘б»ҷng bб»Ӣ xГіa.\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.11. POST `/expand` - AI Expand\n\n**Mб»Ҙc Д‘Гӯch:** Mб»ҹ rб»ҷng/outpaint бәЈnh. Gб»ӯi 1 бәЈnh origin + size бәЈnh mong muб»‘n. AI sбәҪ expand vГ№ng mб»ӣi vб»ӣi lighting, perspective, colors, textures nhбәҘt quГЎn. KhГҙng thay Д‘б»•i nб»ҷi dung gб»‘c. Bao gб»“m safety policy (khГҙng tбәЎo nб»ҷi dung khГҙng phГ№ hб»Јp) vГ  tб»ұ Д‘б»ҷng thГӘm quбә§n ГЎo tб»ұ nhiГӘn nбәҝu expand lб»ҷ thГӘm cЖЎ thб»ғ.\n\n**AI model:** WaveSpeed **Flux 2 Klein 9B** (edit) вҖ” endpoint `api.wavespeed.ai/.../flux-2-klein-9b/edit`. Chб»ү dГ№ng WaveSpeed; khГҙng hб»— trб»Ј Д‘б»•i provider.\n\n**API lГ m gГ¬:** Gб»ӯi бәЈnh PNG (cГі vГ№ng trong suб»‘t) вҶ’ AI fill/expand vГ№ng transparent вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:** YГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**CГЎch hoбәЎt Д‘б»ҷng:**\n1. Client tбәЎo бәЈnh PNG vб»ӣi kГӯch thЖ°б»ӣc mong rontend ghГ©p бәЈnh gб»‘c + mask thГ nh 1 бәЈnh duy nhбәҘt (vГ№ng highlight = nЖЎi cбә§n thay thбәҝ)\n2. Upload бәЈnh Д‘ГЈ ghГ©p lГӘn\n3. Gб»Қi API kГЁm `custom_prompt` mГҙ tбәЈ nб»ҷi dung muб»‘n thay thбәҝ vГ o\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/replace-object \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"selfie_id\": \"E0PtVZEio5fctjMd\",\n    \"custom_prompt\": \"a red sports car\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n```bash\ncurl -X POST https://api.d.shotpix.app/replace-object \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"selfie_image_url\": \"https://resources.d.shotpix.app/selfie/abc.png\",\n    \"custom_prompt\": \"a beautiful garden with flowers\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n**Request Parameters:**\n- `selfie_id` (string): ID бәЈnh Д‘ГЈ ghГ©p (origin + mask). KhГҙng dГ№ng cГ№ng `selfie_image_url`.\n- `selfie_image_url` (string): URL бәЈnh Д‘ГЈ ghГ©p. KhГҙng dГ№ng cГ№ng `selfie_id`.\n- `custom_prompt` (string, required): MГҙ tбәЈ nб»ҷi dung muб»‘n thay thбәҝ vГ o vГ№ng Д‘Ж°б»Јc Д‘ГЎnh dбәҘu.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_id\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Object replacement completed\",\n  \"code\": 200\n}\n```\n\n**LЖ°u ГҪ:** Sau khi xб»ӯ lГҪ, selfie sбәҪ tб»ұ Д‘б»ҷng bб»Ӣ xГіa.\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n## 2.13. POST `/remove-text` - AI Remove Text\n\n**Mб»Ҙc Д‘Гӯch:** XГіa text Д‘Ж°б»Јc Д‘ГЎnh dбәҘu (masked) khб»Ҹi бәЈnh sб»ӯ dб»Ҙng Gemini 2.5 Flash Image Edit qua WaveSpeed.\n\n**API lГ m gГ¬:** Gб»ӯi бәЈnh Д‘ГЈ ghГ©p (gб»‘c + mask, vГ№ng highlight = text cбә§n xГіa) вҶ’ AI xГіa text trong vГ№ng mask, giб»Ҝ layout вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:** YГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**CГЎch hoбәЎt Д‘б»ҷng:**\n1. Frontend ghГ©p бәЈnh gб»‘c + mask thГ nh 1 бәЈnh duy nhбәҘt (vГ№ng highlight = text cбә§n xГіa)\n2. Upload бәЈnh Д‘ГЈ ghГ©p lГӘn\n3. Gб»Қi API - AI sбәҪ xГіa text trong vГ№ng mask, giб»Ҝ nguyГӘn layout vГ  format\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/remove-text \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_id\": \"E0PtVZEio5fctjMd\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n```bash\ncurl -X POST https://api.d.shotpix.app/remove-text \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_url\": \"https://resources.d.shotpix.app/selfie/abc.png\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n**Request Parameters:**\n- `image_id` (string): ID бәЈnh Д‘ГЈ ghГ©p (origin + mask). KhГҙng dГ№ng cГ№ng `image_url`. (Legacy: `selfie_id` vбә«n Д‘Ж°б»Јc hб»— trб»Ј)\n- `image_url` (string): URL бәЈnh Д‘ГЈ ghГ©p. KhГҙng dГ№ng cГ№ng `image_id`. (Legacy: `selfie_image_url` vбә«n Д‘Ж°б»Јc hб»— trб»Ј)\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_id\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Text removal completed\",\n  \"code\": 200\n}\n```\n\n**LЖ°u ГҪ:** Sau khi xб»ӯ lГҪ, бәЈnh sбәҪ tб»ұ Д‘б»ҷng bб»Ӣ xГіa.\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.14. POST `/editor` - AI Image Editor\n\n**Mб»Ҙc Д‘Гӯch:** Chб»үnh sб»ӯa бәЈnh theo hЖ°б»ӣng dбә«n tб»ұ do tб»« ngЖ°б»қi dГ№ng. Hб»— trб»Ј provider routing tб»ұ Д‘б»ҷng (Gemini 2.5 Flash Image cho бәЈnh nhб»Ҹ < 800px, WaveSpeed Flux Klein v3 cho бәЈnh lб»ӣn hЖЎn).\n\n**API lГ m gГ¬:** Nhбәӯn бәЈnh + `custom_prompt` mГҙ tбәЈ cГЎch chб»үnh sб»ӯa вҶ’ kiб»ғm tra an toГ n бәЈnh Д‘бә§u vГ o вҶ’ AI chб»үnh sб»ӯa theo hЖ°б»ӣng dбә«n вҶ’ kiб»ғm tra an toГ n kбәҝt quбәЈ вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:** YГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**CГЎch hoбәЎt Д‘б»ҷng:**\n1. Upload бәЈnh cбә§n chб»үnh sб»ӯa (selfie hoбә·c image_url)\n2. (TГ№y chб»Қn) Upload бәЈnh tham chiбәҝu bбәұng `type=selfie, action=ref` rб»“i truyб»Ғn `ref_image_id`, hoбә·c truyб»Ғn `ref_image_url` trб»ұc tiбәҝp\n3. Gб»Қi API kГЁm `custom_prompt` mГҙ tбәЈ cГЎch muб»‘n chб»үnh sб»ӯa\n4. Hб»Ү thб»‘ng kiб»ғm tra an toГ n бәЈnh Д‘бә§u vГ o (pre-check) vГ  kбәҝt quбәЈ (post-check)\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/editor \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_id\": \"E0PtVZEio5fctjMd\",\n    \"custom_prompt\": \"Change the sky to a golden sunset with warm orange and pink tones\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n```bash\ncurl -X POST https://api.d.shotpix.app/editor \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_url\": \"https://resources.d.shotpix.app/selfie/abc.png\",\n    \"custom_prompt\": \"Make the person look like the reference image style\",\n    \"ref_image_url\": \"https://example.com/reference-style.jpg\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n```bash\n# With uploaded reference image (type=selfie, action=ref)\ncurl -X POST https://api.d.shotpix.app/editor \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"image_url\": \"https://resources.d.shotpix.app/selfie/abc.png\",\n    \"custom_prompt\": \"Apply the hairstyle from the reference image\",\n    \"ref_image_id\": \"RefImageIdHere\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\"\n  }'\n```\n\n**Request Parameters:**\n- `selfie_id` / `image_id` (string): ID бәЈnh cбә§n chб»үnh sб»ӯa. KhГҙng dГ№ng cГ№ng URL.\n- `selfie_image_url` / `image_url` (string): URL бәЈnh cбә§n chб»үnh sб»ӯa. KhГҙng dГ№ng cГ№ng ID.\n- `custom_prompt` (string, required): MГҙ tбәЈ cГЎch chб»үnh sб»ӯa бәЈnh (tб»ұ do, bбәҘt kб»і yГӘu cбә§u nГ o).\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `ref_image_id` (string, optional): ID бәЈnh tham chiбәҝu (upload vб»ӣi `type=selfie, action=ref`). Tб»ұ Д‘б»ҷng xГіa sau khi xб»ӯ lГҪ.\n- `ref_image_url` (string, optional): URL бәЈnh tham chiбәҝu. KhГҙng dГ№ng cГ№ng `ref_image_id`.\n- `aspect_ratio` (string, optional): Tб»· lб»Ү бәЈnh Д‘бә§u ra (vГӯ dб»Ҙ: \"1:1\", \"3:4\", \"16:9\"). Mбә·c Д‘б»Ӣnh giб»Ҝ nguyГӘn tб»· lб»Ү gб»‘c.\n- `provider` (string, optional): Chб»Қn provider xб»ӯ lГҪ. Mбә·c Д‘б»Ӣnh tб»ұ Д‘б»ҷng theo kГӯch thЖ°б»ӣc бәЈnh.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_id\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Image edit completed\",\n  \"code\": 200\n}\n```\n\n**LЖ°u ГҪ:** Sau khi xб»ӯ lГҪ, selfie sбәҪ tб»ұ Д‘б»ҷng bб»Ӣ xГіa.\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n\n## 2.15. POST `/hair-style` - AI Hair Style\n\n**Mб»Ҙc Д‘Гӯch:** ГҒp dб»Ҙng kiб»ғu tГіc tб»« preset lГӘn бәЈnh selfie sб»ӯ dб»Ҙng WaveSpeed flux-2-klein-9b.\n\n**API lГ m gГ¬:** LбәҘy prompt tб»« R2 metadata cб»§a preset вҶ’ gб»ӯi бәЈnh selfie + prompt вҶ’ AI tбәЎo бәЈnh vб»ӣi kiб»ғu tГіc mб»ӣi вҶ’ trбәЈ `resultImageUrl`.\n\n**LЖ°u ГҪ:** YГӘu cбә§u API key authentication khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**CГЎch hoбәЎt Д‘б»ҷng:**\n1. Frontend chб»Қn preset kiб»ғu tГіc (cГі `prompt_json` metadata trong R2)\n2. Gб»Қi API vб»ӣi `preset_image_id` + бәЈnh selfie\n3. API Д‘б»Қc prompt tб»« preset metadata вҶ’ gб»ӯi Д‘бәҝn WaveSpeed AI вҶ’ trбәЈ kбәҝt quбәЈ\n\n**Request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/hair-style \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"hair_preset_001\",\n    \"selfie_id\": \"E0PtVZEio5fctjMd\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\",\n    \"aspect_ratio\": \"original\"\n  }'\n```\n\n```bash\ncurl -X POST https://api.d.shotpix.app/hair-style \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"preset_image_id\": \"hair_preset_001\",\n    \"selfie_image_url\": \"https://resources.d.shotpix.app/selfie/abc.png\",\n    \"profile_id\": \"CbS0w8Ed8ezrlJ7o\",\n    \"aspect_ratio\": \"original\"\n  }'\n```\n\n**Request Parameters:**\n- `preset_image_id` (string, required): ID preset kiб»ғu tГіc (phбәЈi cГі `prompt_json` metadata trong R2).\n- `selfie_id` (string): ID бәЈnh selfie. KhГҙng dГ№ng cГ№ng `selfie_image_url`.\n- `selfie_image_url` (string): URL бәЈnh selfie. KhГҙng dГ№ng cГ№ng `selfie_id`.\n- `profile_id` (string, required): ID profile ngЖ°б»қi dГ№ng.\n- `aspect_ratio` (string, optional): Tб»· lб»Ү khung hГ¬nh. Mбә·c Д‘б»Ӣnh `\"original\"`.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"result_id\",\n    \"resultImageUrl\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Hair style applied successfully\",\n  \"code\": 200\n}\n```\n\n**LЖ°u ГҪ:** Sau khi xб»ӯ lГҪ, selfie sбәҪ tб»ұ Д‘б»ҷng bб»Ӣ xГіa.\n\n**Error Responses:** Xem [Error Codes Reference](API_TONG_QUAN_VI.md#error-codes-reference)\n\n---\n",
      "API_BILLING_VI.md": "# 6. Thanh toГЎn & Subscription (Google Play Billing)\n\nHб»Ү thб»‘ng Д‘iб»ғm kГ©p (dual credit):\n- **Subscription points** (`sub_point_remaining`): reset mб»—i 30 ngГ y theo chu kб»і subscription, trб»« trЖ°б»ӣc\n- **Consumable points** (`consumable_point_remaining`): mua thГӘm, khГҙng bao giб»қ reset, trб»« sau khi sub hбәҝt\n\n## Luб»“ng tб»•ng quan\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  1. User mua subscription trГӘn Google Play                      в”Ӯ\nв”Ӯ  2. App nhбәӯn purchaseToken вҶ’ gб»Қi POST /api/subscription/verify  в”Ӯ\nв”Ӯ  3. Backend verify vб»ӣi Google Play API вҶ’ kГӯch hoбәЎt subscription  в”Ӯ\nв”Ӯ  4. Backend gГЎn sub_point_remaining = points_per_cycle           в”Ӯ\nв”Ӯ                                                                  в”Ӯ\nв”Ӯ  Sau Д‘Гі (tб»ұ Д‘б»ҷng, khГҙng cбә§n app gб»Қi):                           в”Ӯ\nв”Ӯ  5. Google Play gб»ӯi RTDN qua Pub/Sub вҶ’ POST /webhooks/google    в”Ӯ\nв”Ӯ     - RENEWED(2): reset sub points, cycle+1                     в”Ӯ\nв”Ӯ     - IN_GRACE(6): status=GRACE, vбә«n reset sub points           в”Ӯ\nв”Ӯ     - RECOVERED(1): status=ACTIVE, giб»Ҝ nguyГӘn points            в”Ӯ\nв”Ӯ     - EXPIRED(13): chбә·n hoГ n toГ n, sub points = 0               в”Ӯ\nв”Ӯ  6. Backend gб»ӯi FCM silent push вҶ’ app sync trбәЎng thГЎi mб»ӣi       в”Ӯ\nв”Ӯ                                                                  в”Ӯ\nв”Ӯ  Khi user dГ№ng AI feature:                                       в”Ӯ\nв”Ӯ  7. Backend lazy-check subscription + trб»« sub trЖ°б»ӣc, consumable  в”Ӯ\nв”Ӯ     sau (real-time, khГҙng cron)                                  в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n## CбәҘu hГ¬nh\n\n- Hб»Ү thб»‘ng credit **luГҙn bбәӯt** (khГҙng cбә§n toggle)\n- `CREDIT_COST_*`: Chi phГӯ cho tб»«ng action (override bбәұng env var, vГӯ dб»Ҙ `CREDIT_COST_FACESWAP=10`)\n- `TIER_MULTIPLIER_*`: Hб»Ү sб»‘ theo tier (FREE=1.0, SUBSCRIBER=0.8)\n\n### Chi phГӯ mбә·c Д‘б»Ӣnh (Default Credit Costs)\n\n| Category | Action | Endpoint | Cost |\n|----------|--------|----------|------|\n| **Enhance** | Image Enhance | `/enhance` | 2 |\n| | Image Restore | `/restore` | 2 |\n| | HD 4K Upscale | `/upscaler4k` | 5 |\n| **Portrait** | AI Beautify | `/beauty` | 2 |\n| | AI Filter | `/filter` | 3 |\n| | AI Avatar | `/faceswap` | 5 |\n| | AI Expressions | `/expression` | 1 |\n| | AI Hairstyles | `/hair-style` | 1 |\n| | AI Aging | `/aging` | 1 |\n| **Edit** | Remove Object | `/remove-object` | 1 |\n| | AI Background | `/background` | 5 |\n| | AI Expand | `/expand` | 2 |\n| | AI Replace | `/replace-object` | 2 |\n| | AI Remove Text | `/remove-text` | 1 |\n| | AI Editor | `/editor` | 5 |\n\nChi phГӯ thб»ұc tбәҝ = `CREDIT_COST_*` Г— `TIER_MULTIPLIER_*` (mбә·c Д‘б»Ӣnh subscriber = 0.8Г— free)\n\n## Subscription SKUs\n\n| SKU | Дҗiб»ғm/chu kб»і (30 ngГ y) | GiГЎ |\n|-----|----------------------|-----|\n| `sub_monthly` | 1000 | 99,000 VND/thГЎng |\n| `sub_semi_annual` | 1200 | 499,000 VND/6 thГЎng |\n| `sub_annual` | 1500 | 899,000 VND/nДғm |\n\n## Consumable SKUs\n\n| SKU | Дҗiб»ғm | GiГЎ |\n|-----|------|-----|\n| `credits_10` | 10 | 22,000 VND |\n| `credits_50` | 50 | 99,000 VND |\n| `credits_100` | 100 | 176,000 VND |\n| `credits_500` | 500 | 770,000 VND |\n\n## Endpoints\n\n### GET `/api/products` - Danh sГЎch sбәЈn phбә©m\n\n**Auth:** API Key\n\n```json\n// Response\n{\n  \"data\": [\n    {\n      \"sku\": \"credits_10\",\n      \"type\": \"consumable\",\n      \"credits\": 10,\n      \"points_per_cycle\": 0,\n      \"name\": \"10 Credits\",\n      \"description\": \"GГіi 10 credits\",\n      \"price_micros\": 22000000000,\n      \"currency\": \"VND\"\n    },\n    {\n      \"sku\": \"sub_monthly\",\n      \"type\": \"subscription\",\n      \"credits\": 0,\n      \"points_per_cycle\": 1000,\n      \"name\": \"Monthly\",\n      \"description\": \"GГіi thГЎng - 1000 Д‘iб»ғm/chu kб»і\",\n      \"price_micros\": 99000000000,\n      \"currency\": \"VND\"\n    }\n  ],\n  \"status\": \"success\",\n  \"code\": 200\n}\n```\n\n### GET `/api/user/balance?profile_id={id}` - Sб»‘ dЖ° Д‘iб»ғm kГ©p + trбәЎng thГЎi subscription\n\n**Auth:** API Key\n\n```json\n// Response\n{\n  \"data\": {\n    \"sub_point_remaining\": 800,\n    \"consumable_point_remaining\": 50,\n    \"total_available\": 850,\n    \"subscription_status\": \"ACTIVE\",\n    \"total_credits_purchased\": 100,\n    \"total_credits_spent\": 50\n  },\n  \"status\": \"success\",\n  \"code\": 200\n}\n```\n\n`subscription_status`: `ACTIVE` | `GRACE` | `CANCELLED` | `EXPIRED` | `PAUSED` | `NONE`\n\n### POST `/api/deposit` - NбәЎp consumable points (verify Google Play purchase)\n\n**Auth:** API Key\n\nMua consumable вҶ’ Д‘iб»ғm vГ o `consumable_point_remaining` (khГҙng bao giб»қ reset).\n\n```json\n// Request\n{\n  \"profile_id\": \"abc123\",\n  \"sku\": \"credits_50\",\n  \"purchase_token\": \"google-play-purchase-token\",\n  \"order_id\": \"GPA.1234-5678-9012\"\n}\n\n// Response (success)\n{\n  \"data\": {\n    \"payment_id\": \"pay_xxx\",\n    \"credits_granted\": 50,\n    \"status\": \"COMPLETED\"\n  },\n  \"status\": \"success\",\n  \"code\": 200\n}\n```\n\n**LЖ°u ГҪ:** Idempotent theo `order_id` - gб»Қi lбәЎi vб»ӣi cГ№ng order_id sбәҪ trбәЈ kбәҝt quбәЈ cЕ©.\n\n### GET `/api/deposit/status/{order_id}` - Kiб»ғm tra trбәЎng thГЎi nбәЎp\n\n**Auth:** API Key\n\n```json\n// Response\n{\n  \"data\": {\n    \"id\": \"pay_xxx\",\n    \"profile_id\": \"abc123\",\n    \"sku\": \"credits_50\",\n    \"order_id\": \"GPA.1234-5678-9012\",\n    \"status\": \"COMPLETED\",\n    \"credits_granted\": 50\n  },\n  \"status\": \"success\",\n  \"code\": 200\n}\n```\n\n### POST `/api/subscription/verify` - KГӯch hoбәЎt subscription (app gб»Қi sau khi mua trГӘn Google Play)\n\n**Auth:** API Key\n\n**Luб»“ng:** User mua subscription trГӘn Google Play вҶ’ app nhбәӯn `purchaseToken` вҶ’ app gб»Қi endpoint nГ y вҶ’ backend verify vб»ӣi Google Play API вҶ’ kГӯch hoбәЎt + gГЎn `sub_point_remaining = points_per_cycle`.\n\n```json\n// Request\n{\n  \"profile_id\": \"abc123\",\n  \"sku\": \"sub_monthly\",\n  \"purchase_token\": \"google-play-subscription-token\"\n}\n\n// Response\n{\n  \"data\": {\n    \"subscription_id\": \"sub_xxx\",\n    \"points_per_cycle\": 1000,\n    \"expires_at\": 1742592000,\n    \"status\": \"ACTIVE\"\n  },\n  \"status\": \"success\",\n  \"code\": 200\n}\n```\n\n### GET `/api/subscription/status?profile_id={id}` - TrбәЎng thГЎi subscription hiб»Үn tбәЎi\n\n**Auth:** API Key\n\n```json\n// Response\n{\n  \"data\": {\n    \"id\": \"sub_xxx\",\n    \"sku\": \"sub_monthly\",\n    \"status\": \"ACTIVE\",\n    \"auto_renewing\": 1,\n    \"expires_at\": 1742592000,\n    \"last_reset_at\": 1740000000,\n    \"cycle_count_used\": 3,\n    \"points_per_cycle\": 1000,\n    \"cancelled_at\": null\n  },\n  \"status\": \"success\",\n  \"code\": 200\n}\n```\n\n### POST `/webhooks/google` - Google Play RTDN Webhook\n\n**Auth:** Shared secret (`GOOGLE_WEBHOOK_SECRET`)\n\nNhбәӯn thГҙng bГЎo tб»« Google Play qua Pub/Sub (RTDN). App **KHГ”NG** gб»Қi endpoint nГ y вҖ” Google gб»Қi tб»ұ Д‘б»ҷng.\n\n**Subscription events Д‘Ж°б»Јc xб»ӯ lГҪ:**\n\n| Type | Event | HГ nh Д‘б»ҷng |\n|------|-------|-----------|\n| 2 | RENEWED | status=ACTIVE, reset sub=points_per_cycle, cycle+1 |\n| 6 | IN_GRACE_PERIOD | status=GRACE, reset sub=points_per_cycle, cycle+1 |\n| 1 | RECOVERED | status=ACTIVE, KHГ”NG reset, KHГ”NG Д‘б»•i cycle |\n| 3 | CANCELED | status=CANCELLED, auto_renewing=0 |\n| 13 | EXPIRED | status=EXPIRED, sub_point_remaining=0 |\n| 12 | REVOKED | status=EXPIRED, sub_point_remaining=0 |\n| 10 | PAUSED | status=PAUSED |\n\n**One-time product events:**\n- Refund (type 2): trб»« `consumable_point_remaining` (clamp to 0)\n\n## Trб»« Д‘iб»ғm trong AI Endpoints (Dual Credit Deduction)\n\nMб»—i AI endpoint tб»ұ Д‘б»ҷng trб»« Д‘iб»ғm theo 5 bЖ°б»ӣc:\n\n1. **Auth check** вҖ” verify profile token вҶ’ fail = `INVALID_TOKEN`\n2. **Profile check** вҖ” profile tб»“n tбәЎi? bб»Ӣ ban? вҶ’ fail = `PROFILE_NOT_FOUND` / `ACCOUNT_BANNED`\n3. **Subscription check:**\n   - CГі sub ON_HOLD вҶ’ zero sub points, reason = `SUB_ON_HOLD`\n   - CГі sub GRACE nhЖ°ng hбәҝt hбәЎn вҶ’ mark EXPIRED, zero sub, reason = `SUB_GRACE_EXPIRED`\n   - CГі sub ACTIVE quГЎ 30 ngГ y вҶ’ lazy reset sub = points_per_cycle\n   - KhГҙng cГі sub вҶ’ zero sub points, reason = `SUB_NONE`\n4. **Fail fast** вҖ” sub + consumable < cost вҶ’ HTTP 402, reason = `INSUFFICIENT_CREDITS` (hoбә·c reason cб»Ҙ thб»ғ hЖЎn nбәҝu do sub status)\n5. **Trб»« Д‘iб»ғm** вҖ” sub trЖ°б»ӣc, hбәҝt sub thГ¬ trб»« consumable (atomic UPDATE vб»ӣi WHERE guard)\n\nNбәҝu AI xб»ӯ lГҪ lб»—i вҶ’ hoГ n Д‘iб»ғm vГ o `consumable_point_remaining` (saga compensation).\n\n### Response khi credit check thбәҘt bбәЎi (HTTP 402)\n\n```json\n{\n  \"data\": null,\n  \"status\": \"error\",\n  \"message\": \"Credit check failed\",\n  \"code\": 402,\n  \"reason\": 4070\n}\n```\n\n### BбәЈng `reason` codes\n\n| reason | Гқ nghД©a | App nГӘn lГ m gГ¬ |\n|--------|---------|-----------------|\n| `INVALID_TOKEN` | Token xГЎc thб»ұc sai | Re-login |\n| `PROFILE_NOT_FOUND` | Profile khГҙng tб»“n tбәЎi | TбәЎo profile mб»ӣi |\n| `ACCOUNT_BANNED` | TГ i khoбәЈn bб»Ӣ cбәҘm | Hiб»Үn thГҙng bГЎo ban |\n| `SUB_ON_HOLD` | Thanh toГЎn bб»Ӣ giб»Ҝ | Hiб»Үn \"Cбәӯp nhбәӯt thanh toГЎn\" |\n| `SUB_GRACE_EXPIRED` | Grace period hбәҝt | Hiб»Үn \"Gia hбәЎn subscription\" |\n| `SUB_NONE` | KhГҙng cГі subscription | Hiб»Үn \"Mua subscription\" hoбә·c \"Mua credits\" |\n| `INSUFFICIENT_CREDITS` | Hбәҝt Д‘iб»ғm | Hiб»Үn \"Mua thГӘm credits\" |\n| `CONCURRENT_CONFLICT` | TrГ№ng request | Retry 1 lбә§n |\n\nChi phГӯ = `CREDIT_C le IN_GRACE fill:#eab308,color:#000\n    style SUB_EXPIRED fill:#ef4444,color:#fff\n    style R1 fill:#ef4444,color:#fff\n    style R2 fill:#ef4444,color:#fff\n    style R3 fill:#ef4444,color:#fff\n    style OK fill:#22c55e,color:#fff\n    style BUY_OK fill:#a855f7,color:#fff\n```\n",
      "API_PROFILE_DATA_VI.md": "# 3-4. Profile & Truy vбәҘn Dб»Ҝ liб»Үu\n\n## 3. QuбәЈn lГҪ Profile\n\n### 3.1. POST `/profiles` - TбәЎo profile\n\n**Mб»Ҙc Д‘Гӯch:** TбәЎo profile mб»ӣi.\n\n**Authentication:** YГӘu cбә§u API key khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Request:**\n\n**Minimal (chб»ү cбә§n device_id):**\n```bash\ncurl -X POST https://api.d.shotpix.app/profiles \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"device_id\": \"device_1765774126587_yaq0uh6rvz\"\n  }'\n```\n\n**Full request:**\n```bash\ncurl -X POST https://api.d.shotpix.app/profiles \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"device_id\": \"device_1765774126587_yaq0uh6rvz\",\n    \"userID\": \"user_external_123\",\n    \"name\": \"John Doe\",\n    \"email\": \"john@example.com\",\n    \"phone\": \"+84123456789\",\n    \"avatar_url\": \"https://example.com/avatar.jpg\",\n    \"preferences\": \"{\\\"theme\\\":\\\"dark\\\",\\\"language\\\":\\\"vi\\\"}\"\n  }'\n```\n\n**Vб»ӣi preferences dбәЎng object:**\n```bash\ncurl -X POST https://api.d.shotpix.app/profiles \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"device_id\": \"device_1765774126587_yaq0uh6rvz\",\n    \"name\": \"John Doe\",\n    \"email\": \"john@example.com\",\n    \"phone\": \"+84123456789\",\n    \"avatar_url\": \"https://example.com/avatar.jpg\",\n    \"preferences\": {\n      \"theme\": \"dark\",\n      \"language\": \"vi\"\n    }\n  }'\n```\n\n**Hoбә·c gб»ӯi device_id qua header:**\n```bash\ncurl -X POST https://api.d.shotpix.app/profiles \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -H \"x-device-id: device_1765774126587_yaq0uh6rvz\" \\\n  -d '{\n    \"name\": \"John Doe\",\n    \"email\": \"john@example.com\"\n  }'\n```\n\n**Request Parameters:**\n- `device_id` (string, optional): ID thiбәҝt bб»Ӣ. CГі thб»ғ gб»ӯi trong body hoбә·c header `x-device-id`. Nбәҝu khГҙng cГі, sбәҪ lГ  `null`.\n- `userID` hoбә·c `user_id` (string, optional): **User ID bГӘn ngoГ i** dГ№ng Д‘б»ғ tГ¬m kiбәҝm profile. ДҗГўy lГ  ID tб»« hб»Ү thб»‘ng cб»§a bбәЎn (vГӯ dб»Ҙ: Firebase UID, Auth0 ID, v.v.). CГі thб»ғ dГ№ng Д‘б»ғ tГ¬m profile sau nГ y.\n- `id` (string, optional): ID profile nб»ҷi bб»ҷ. Nбәҝu khГҙng cГі, hб»Ү thб»‘ng tб»ұ tбәЎo bбәұng `nanoid(16)`.\n- `name` (string, optional): tГӘn profile.\n- `email` (string, optional): email.\n- `phone` (string, optional): sб»‘ Д‘iб»Үn thoбәЎi (vГӯ dб»Ҙ: \"+84123456789\"). DГ№ng cho xГЎc minh khi xГіa profile.\n- `avatar_url` (string, optional): URL avatar.\n- `preferences` (string hoбә·c object, optional): preferences dбәЎng JSON string hoбә·c object. Nбәҝu lГ  object, hб»Ү thб»‘ng tб»ұ Д‘б»ҷng chuyб»ғn thГ nh JSON string trЖ°б»ӣc khi lЖ°u vГ o D1 database (vГ¬ D1 khГҙng hб»— trб»Ј JSON object trб»ұc tiбәҝp).\n\n**LЖ°u ГҪ vб»Ғ ID:**\n- `id` (profile_id): ID nб»ҷi bб»ҷ cб»§a profile, tб»ұ Д‘б»ҷng tбәЎo nбәҝu khГҙng cung cбәҘp.\n- `user_id`: ID tб»« hб»Ү thб»‘ng bГӘn ngoГ i (Firebase, Auth0, v.v.), dГ№ng Д‘б»ғ liГӘn kбәҝt vб»ӣi user cб»§a bбәЎn.\n- `device_id`: ID thiбәҝt bб»Ӣ, dГ№ng Д‘б»ғ theo dГөi user chЖ°a Д‘Дғng nhбәӯp.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"uYNgRR70Ry9OFuMV\",\n    \"device_id\": \"device_1765774126587_yaq0uh6rvz\",\n    \"user_id\": \"user_external_123\",\n    \"created_at\": \"2025-12-15T04:48:47.676Z\",\n    \"updated_at\": \"2025-12-15T04:48:47.676Z\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Profile created successfully\",\n  \"code\": 200,\n  \"debug\": {\n    \"profileId\": \"uYNgRR70Ry9OFuMV\",\n    \"deviceId\": \"device_1765774126587_yaq0uh6rvz\",\n    \"userId\": \"user_external_123\"\n  }\n}\n```\n\n---\n\n### 3.2. GET `/profiles/{id}` - LбәҘy profile\n\n**Mб»Ҙc Д‘Гӯch:** LбәҘy thГҙng tin profile theo Profile ID, Device ID, hoбә·c User ID.\n\n**Authentication:** YГӘu cбә§u API key khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Path Parameters:**\n- `id` (string, required): CГі thб»ғ lГ  **Profile ID**, **Device ID**, hoбә·c **User ID**. API sбәҪ tГ¬m theo thб»© tб»ұ: profile_id вҶ’ device_id вҶ’ user_id.\n\n**Request:**\n```bash\n# TГ¬m bбәұng Profile ID\ncurl https://api.d.shotpix.app/profiles/uYNgRR70Ry9OFuMV \\\n  -H \"X-API-Key: your_api_key_here\"\n\n# TГ¬m bбәұng Device ID\ncurl https://api.d.shotpix.app/profiles/device_1765774126587_yaq0uh6rvz \\\n  -H \"X-API-Key: your_api_key_here\"\n\n# TГ¬m bбәұng User ID (tб»« hб»Ү thб»‘ng bГӘn ngoГ i)\ncurl https://api.d.shotpix.app/profiles/user_external_123 \\\n  -H \"X-API-Key: your_api_key_here\"\n```\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"uYNgRR70Ry9OFuMV\",\n    \"device_id\": \"device_1765774126587_yaq0uh6rvz\",\n    \"user_id\": \"user_external_123\",\n    \"name\": \"John Doe\",\n    \"email\": \"john@example.com\",\n    \"phone\": \"+84123456789\",\n    \"avatar_url\": \"https://example.com/avatar.jpg\",\n    \"preferences\": \"{\\\"theme\\\":\\\"dark\\\",\\\"language\\\":\\\"vi\\\"}\",\n    \"sub_point_remaining\": 800,\n    \"consumable_point_remaining\": 50,\n    \"total_credits_purchased\": 100,\n    \"total_credits_spent\": 50,\n    \"created_at\": \"2025-12-15T04:48:47.676Z\",\n    \"updated_at\": \"2025-12-15T04:48:47.676Z\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Profile retrieved successfully\",\n  \"code\": 200\n}\n```\n\n**LЖ°u ГҪ:** CбәЈ ba cГЎch tГ¬m (bбәұng Profile ID, Device ID, hoбә·c User ID) Д‘б»Ғu trбәЈ vб»Ғ cГ№ng mб»ҷt profile vб»ӣi Д‘бә§y Д‘б»§ thГҙng tin.\n\n---\n\n### 3.3. PUT `/profiles/{id}` - Cбәӯp nhбәӯt profile\n\n**Mб»Ҙc Д‘Гӯch:** Cбәӯp nhбәӯt thГҙng tin profile.\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Request:**\n```bash\ncurl -X PUT https://api.d.shotpix.app/profiles/profile_1234567890 \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"name\": \"John Doe Updated\",\n    \"email\": \"john.updated@example.com\",\n    \"phone\": \"+84987654321\",\n    \"avatar_url\": \"https://example.com/new-avatar.jpg\",\n    \"preferences\": {\n      \"theme\": \"light\",\n      \"language\": \"en\"\n    },\n    \"sub_point_remaining\": 100,\n    \"consumable_point_remaining\": 500\n  }'\n```\n\n**Request Parameters:**\n- `name` (string, optional): tГӘn profile.\n- `email` (string, optional): email.\n- `phone` (string, optional): sб»‘ Д‘iб»Үn thoбәЎi.\n- `avatar_url` (string, optional): URL avatar.\n- `preferences` (string hoбә·c object, optional): preferences dбәЎng JSON string hoбә·c object. Nбәҝu lГ  object, hб»Ү thб»‘ng tб»ұ Д‘б»ҷng chuyб»ғn thГ nh JSON string trЖ°б»ӣc khi lЖ°u vГ o D1 database (vГ¬ D1 khГҙng hб»— trб»Ј JSON object trб»ұc tiбәҝp).\n- `sub_point_remaining` (number, optional): sб»‘ Д‘iб»ғm subscription cГІn lбәЎi (dГ№ng cho testing).\n- `consumable_point_remaining` (number, optional): sб»‘ Д‘iб»ғm consumable cГІn lбәЎi (dГ№ng cho testing).\n\n**LЖ°u ГҪ:** ID profile phбәЈi Д‘Ж°б»Јc cung cбәҘp trong URL path (`/profiles/{id}`), khГҙng cбә§n gб»ӯi trong body.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"uYNgRR70Ry9OFuMV\",\n    \"device_id\": \"device_1765774126587_yaq0uh6rvz\",\n    \"user_id\": \"user_external_123\",\n    \"name\": \"John Doe Updated\",\n    \"email\": \"john.updated@example.com\",\n    \"phone\": \"+84987654321\",\n    \"avatar_url\": \"https://example.com/new-avatar.jpg\",\n    \"preferences\": \"{\\\"theme\\\":\\\"light\\\",\\\"language\\\":\\\"en\\\"}\",\n    \"sub_point_remaining\": 100,\n    \"consumable_point_remaining\": 500,\n    \"total_credits_purchased\": 100,\n    \"total_credits_spent\": 50,\n    \"created_at\": \"2025-12-15T04:48:47.676Z\",\n    \"updated_at\": \"2025-12-15T05:00:00.000Z\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Profile updated successfully\",\n  \"code\": 200\n}\n```\n\n---\n\n### 3.4. GET `/profiles` - Liб»Үt kГӘ profiles\n\n**Mб»Ҙc Д‘Гӯch:** Liб»Үt kГӘ tбәҘt cбәЈ profiles (dГ№ng cho admin/debugging).\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Request:**\n```bash\ncurl https://api.d.shotpix.app/profiles\n```\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"profiles\": [\n      {\n        \"id\": \"uYNgRR70Ry9OFuMV\",\n        \"device_id\": \"device_1765774126587_yaq0uh6rvz\",\n        \"user_id\": \"user_external_123\",\n        \"name\": \"John Doe\",\n        \"email\": \"john@example.com\",\n        \"phone\": \"+84123456789\",\n        \"avatar_url\": \"https://example.com/avatar.jpg\",\n        \"preferences\": \"{\\\"theme\\\":\\\"dark\\\",\\\"language\\\":\\\"vi\\\"}\",\n        \"created_at\": \"2025-12-15T04:48:47.676Z\",\n        \"updated_at\": \"2025-12-15T04:48:47.676Z\"\n      }\n    ]\n  },\n  \"status\": \"success\",\n  \"message\": \"Profiles retrieved successfully\",\n  \"code\": 200\n}\n```\n\n---\n\n### 3.5. DELETE `/profiles/{id}` - XГіa profile (YГӘu cбә§u xГЎc minh)\n\n**Mб»Ҙc Д‘Гӯch:** XГіa profile vГ  toГ n bб»ҷ dб»Ҝ liб»Үu liГӘn quan (selfies, results, subscriptions, payments, device tokens, audit log). File R2 cЕ©ng Д‘Ж°б»Јc xГіa.\n\n**Authentication:** YГӘu cбә§u API key khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**BбәЈo mбәӯt:** Endpoint nГ y yГӘu cбә§u xГЎc minh danh tГӯnh bбәұng **3 thГҙng tin** trЖ°б»ӣc khi xГіa:\n1. `profile_id` (bбәҜt buб»ҷc) - phбәЈi khб»ӣp vб»ӣi URL param\n2. `user_id` (bбәҜt buб»ҷc) - phбәЈi khб»ӣp vб»ӣi DB\n3. `email` hoбә·c `phone` (bбәҜt buб»ҷc 1 trong 2) - phбәЈi khб»ӣp vб»ӣi DB\n\n**Request:**\n```bash\ncurl -X DELETE https://api.d.shotpix.app/profiles/uYNgRR70Ry9OFuMV \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"profile_id\": \"uYNgRR70Ry9OFuMV\",\n    \"user_id\": \"user_external_123\",\n    \"email\": \"john@example.com\"\n  }'\n```\n\n**Hoбә·c dГ№ng phone thay email:**\n```bash\ncurl -X DELETE https://api.d.shotpix.app/profiles/uYNgRR70Ry9OFuMV \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-API-Key: your_api_key_here\" \\\n  -d '{\n    \"profile_id\": \"uYNgRR70Ry9OFuMV\",\n    \"user_id\": \"user_external_123\",\n    \"phone\": \"+84123456789\"\n  }'\n```\n\n**Request Body Parameters:**\n\n| Param | Type | Required | MГҙ tбәЈ |\n|-------|------|----------|-------|\n| `profile_id` | string | **Yes** | Profile ID - phбәЈi khб»ӣp vб»ӣi `{id}` trong URL |\n| `user_id` | string | **Yes** | User ID bГӘn ngoГ i - phбәЈi khб»ӣp vб»ӣi DB |\n| `email` | string | Yes (nбәҝu khГҙng cГі phone) | Email - phбәЈi khб»ӣp vб»ӣi DB |\n| `phone` | string | Yes (nбәҝu khГҙng cГі email) | Sб»‘ Д‘iб»Үn thoбәЎi - phбәЈi khб»ӣp vб»ӣi DB |\n\n**Response thГ nh cГҙng:**\n```json\n{\n  \"data\": { \"id\": \"uYNgRR70Ry9OFuMV\" },\n  \"status\": \"success\",\n  \"message\": \"Profile and all associated data deleted successfully\",\n  \"code\": 200\n}\n```\n\n**Response lб»—i - thiбәҝu thГҙng tin (400):**\n```json\n{\n  \"data\": null,\n  \"status\": \"error\",\n  \"message\": \"Missing required field: user_id\",\n  \"code\": 400\n}\n```\n\n**Response lб»—i - xГЎc minh thбәҘt bбәЎi (403):**\n```json\n{\n  \"data\": null,\n  \"status\": \"error\",\n  \"message\": \"Verification failed: user_id does not match\",\n  \"code\": 403\n}\n```\n\n**Response lб»—i - khГҙng tГ¬m thбәҘy (404):**\n```json\n{\n  \"data\": null,\n  \"status\": \"error\",\n  \"message\": \"Profile not found\",\n  \"code\": 404\n}\n```\n\n---\n\n## 4. Truy vбәҘn Dб»Ҝ liб»Үu\n\n### 4.1. GET `/presets` - Liб»Үt kГӘ presets\n\n**Mб»Ҙc Д‘Гӯch:** TrбәЈ vб»Ғ danh sГЎch preset trong database.\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Request:**\n```bash\ncurl https://api.d.shotpix.app/presets\ncurl https://api.d.shotpix.app/presets?include_thumbnails=true\n```\n\n**Query Parameters:**\n- `include_thumbnails` (optional): `true` Д‘б»ғ bao gб»“m cбәЈ presets cГі thumbnail. Mбә·c Д‘б»Ӣnh chб»ү trбәЈ vб»Ғ presets khГҙng cГі thumbnail.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"presets\": [\n      {\n        \"id\": \"preset_1234567890_abc123\",\n        \"preset_url\": \"https://resources.d.shotpix.app/faceswap-images/preset/example.jpg\",\n        \"image_url\": \"https://resources.d.shotpix.app/faceswap-images/preset/example.jpg\",\n        \"hasPrompt\": true,\n        \"prompt_json\": null,\n        \"thumbnail_url\": \"https://resources.d.shotpix.app/webp_1x/face-swap/wedding_both_1.webp\",\n        \"thumbnail_format\": \"webp\",\n        \"thumbnail_resolution\": \"1x\",\n        \"created_at\": \"2024-01-01T00:00:00.000Z\"\n      }\n    ]\n  },\n  \"status\": \"success\",\n  \"message\": \"Presets retrieved successfully\",\n  \"code\": 200,\n  \"debug\": {\n    \"count\": 1\n  }\n}\n```\n\n---\n\n### 4.2. GET `/presets/{id}` - LбәҘy preset theo ID\n\n**Mб»Ҙc Д‘Гӯch:** LбәҘy thГҙng tin chi tiбәҝt cб»§a mб»ҷt preset theo ID (bao gб»“m `prompt_json`).\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Request:**\n```bash\ncurl https://api.d.shotpix.app/presets/preset_1234567890_abc123\n```\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"id\": \"preset_1234567890_abc123\",\n    \"preset_url\": \"https://resources.d.shotpix.app/faceswap-images/preset/example.jpg\",\n    \"image_url\": \"https://resources.d.shotpix.app/faceswap-images/preset/example.jpg\",\n    \"hasPrompt\": true,\n    \"prompt_json\": {\n      \"prompt\": \"...\",\n      \"style\": \"...\",\n      \"lighting\": \"...\"\n    },\n    \"thumbnail_url\": \"https://resources.d.shotpix.app/webp_1x/face-swap/wedding_both_1.webp\",\n    \"thumbnail_format\": \"webp\",\n    \"thumbnail_resolution\": \"1x\",\n    \"created_at\": \"2024-01-01T00:00:00.000Z\"\n  },\n  \"status\": \"success\",\n  \"message\": \"Preset retrieved successfully\",\n  \"code\": 200,\n  \"debug\": {\n    \"presetId\": \"preset_1234567890_abc123\",\n    \"hasPrompt\": true\n  }\n}\n```\n\n---\n\n### 4.3. DELETE `/presets/{id}` - XГіa preset\n\n**Mб»Ҙc Д‘Гӯch:** XГіa preset khб»Ҹi D1 vГ  R2.\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Request:**\n```bash\ncurl -X DELETE https://api.d.shotpix.app/presets/preset_1234567890_abc123\n```\n\n**Response:**\n```json\n{\n  \"data\": null,\n  \"status\": \"success\",\n  \"message\": \"Preset deleted successfully\",\n  \"code\": 200\n}\n```\n\n---\n\n### 4.4. GET `/selfies` - Liб»Үt kГӘ selfies\n\n**Mб»Ҙc Д‘Гӯch:** TrбәЈ vб»Ғ tб»‘i Д‘a 50 selfie gбә§n nhбәҘt cб»§a mб»ҷt profile. Endpoint nГ y Д‘Ж°б»Јc sб»ӯ dб»Ҙng bб»ҹi mobile app Д‘б»ғ lбәҘy danh sГЎch selfies Д‘ГЈ upload.\n\n**Authentication:** KhГҙng yГӘu cбә§u API key (cГі thб»ғ Д‘Ж°б»Јc bбәӯt trong tЖ°ЖЎng lai).\n\n**Request:**\n```bash\ncurl https://api.d.shotpix.app/selfies?profile_id=profile_1234567890\n```\n\n**Query Parameters:**\n- `profile_id` (required): ID profile.\n- `limit` (optional): Sб»‘ lЖ°б»Јng selfies tб»‘i Д‘a trбәЈ vб»Ғ (1-50). Mбә·c Д‘б»Ӣnh: 50.\n\n**Response:**\n```json\n{\n  \"data\": {\n    \"selfies\": [\n      {\n        \"id\": \"selfie_1234567890_xyz789\",\n        \"selfie_url\": \"https://resources.d.shotpix.app/faceswap-images/selfie/example.jpg\",\n        \"action\": \"faceswap\",\n        \"created_at\": \"2024-01-01T00:00:00.000Z\"\n      }\n    ]\n  },\n  \"status\": \"success\",\n  \"message\": \"Selfies retrieved successfully\",\n  \"code\": 200\n}\n```\n\n---\n\n### 4.5. DELETE `/selfies/{id}` - XГіa selfie\n\n**Mб»Ҙc Д‘Гӯch:** XГіa selfie khб»Ҹi D1 vГ  R2.\n\n**Authentication:** KhГҙng yГӘu cбә§u API key.\n\n**Request:**\n```bash\ncurl -X DELETE https://api.d.shotpix.app/selfies/selfie_1234567890_xyz789\n```\n\n**Response:**\n```json\n{\n  \"data\": null,\n  \"status\": \"success\",\n  \"message\": \"Selfie deleted successfully\",\n  \"code\": 200,\n  \"debug\": {\n    \"selfieId\": \"selfie_1234567890_xyz789\",\n    \"r2Deleted\": true,\n    \"r2Error\": null\n  }\n}\n```\n\n---\n\n### 4.6. GET `/results` - Liб»Үt kГӘ results\n\n**Mб»Ҙc Д‘Гӯch:** TrбәЈ vб»Ғ tб»‘i Д‘a 50 kбәҝt quбәЈ generated images (face swap, background, enhance, beauty, filter, restore, aging, upscaler4k) gбә§n nhбәҘt. Endpoint nГ y Д‘Ж°б»Јc sб»ӯ dб»Ҙng bб»ҹi mobile app Д‘б»ғ lбәҘy danh sГЎch cГЎc бәЈnh Д‘ГЈ Д‘Ж°б»Јc tбәЎo.\n\n**Authentication:** KhГҙng yГӘu cбә§u API key (cГі thб»ғ Д‘Ж°б»Јc bбәӯt trong tЖ°ЖЎng lai).\n\n**Request:**\n```bash\ncurl https://api.d.shotpix.app/results\ncurl https://api.d.shotpix.app/results?profile_id=profile_1234567890\n```\n\n**Query Parameters:**\n- `profile_id` (optional): ID profile Д‘б»ғ lб»Қc kбәҝt quбәЈ.\n- `limit` (optional): Sб»‘ lЖ°б»Јng results tб»‘i Д‘a trбәЈ vб»Ғ (1-50). Mбә·c Д‘б»Ӣnh: 50.\n\n**Response:**\n```json\n{\n  \"data\": [\n    {\n      \"id\": \"result_1234567890_abc123\",\n      \"result_url\": \"https://resources.d.shotpix.app/faceswap-images/results/result_123.jpg\",\n      \"action\": \"faceswap\",\n      \"created_at\": \"2024-01-01T00:00:00.000Z\"\n    }\n  ],\n  \"status\": \"success\",\n  \"message\": \"Results retrieved successfully\",\n  \"code\": 200\n}\n```\n\n**Response:** `data` lГ  mбәЈng phбәіng (flat array) cГЎc result. Mб»—i item:\n- `id`: ID duy nhбәҘt cб»§a result\n- `result_url`: URL public cб»§a бәЈnh kбәҝt quбәЈ\n- `action`: TГӘn API endpoint Д‘ГЈ tбәЎo ra result nГ y (khб»ӣp vб»ӣi route name). GiГЎ trб»Ӣ: `faceswap`, `background`, `enhance`, `beauty`, `filter`, `restore`, `aging`, `upscaler4k`, `remove-object`, `expression`, `expand`, `replace-object`, `remove-text`, `hair-style`. CГі thб»ғ null.\n- `created_at`: Thб»қi gian tбәЎo (ISO 8601)\n\n---\n\n### 4.7. DELETE `/results/{id}` - XГіa result\n\n**Mб»Ҙc Д‘Гӯch:** XГіa kбәҝt quбәЈ khб»Ҹi D1 vГ  R2.\n\n**Authentication:** YГӘu cбә§u API key khi `ENABLE_MOBILE_API_KEY_AUTH=true`.\n\n**Request:**\n```bash\ncurl -X DELETE https://api.d.shotpix.app/results/result_1234567890_abc123\n```\n\n**Response:**\n```json\n{\n  \"data\": null,\n  \"status\": \"success\",\n  \"message\": \"Result deleted successfully\",\n  \"code\": 200,\n  \"debug\": {\n    \"resultId\": \"result_1234567890_abc123\",\n    \"databaseDeleted\": 1,\n r Naming Convention (Quy tбәҜc Д‘бә·t tГӘn thЖ° mб»Ҙc):**\n\nFormat: `{folderType}_{resolution}`\n\n**TбәҘt cбәЈ cГЎc folder types vГ  resolutions Д‘Ж°б»Јc hб»— trб»Ј:**\n\n- `webp_1x`, `webp_1.5x`, `webp_2x`, `webp_3x`, `webp_4x`\n- `lottie_1x`, `lottie_1.5x`, `lottie_2x`, `lottie_3x`, `lottie_4x`\n- `lottie_avif_1x`, `lottie_avif_1.5x`, `lottie_avif_2x`, `lottie_avif_3x`, `lottie_avif_4x`\n\n**Tб»•ng cб»ҷng: 15 folder types Г— resolutions**\n\n**File Naming Convention (Quy tбәҜc Д‘бә·t tГӘn file):**\n\nFormat: `{presetId}.{ext}`\n\n- `presetId`: ID cб»§a preset (vГӯ dб»Ҙ: `fs_frosted_window_portrait_f_4`, `preset_1234567890_abc123`)\n- `ext`: Extension dб»ұa trГӘn folder type:\n  - `webp` вҶ’ `.webp`\n  - `lottie` вҶ’ `.json`\n  - `lottie_avif` вҶ’ `.json`\n\n**VГӯ dб»Ҙ file names:**\n\n- `fs_frosted_window_portrait_f_4.json` (lottie thumbnail)\n- `fs_wonder_f_3.webp` (webp thumbnail)\n- `preset_1234567890_abc123.json` (lottie_avif thumbnail)\n\n**Database Storage (LЖ°u trб»Ҝ trong Database):**\n\nThumbnails Д‘Ж°б»Јc lЖ°u trong bбәЈng `presets` vб»ӣi trЖ°б»қng `thumbnail_r2` dбәЎng JSON:\n\n```json\n{\n  \"webp_1x\": \"preset_thumb/webp_1x/fs_frosted_window_portrait_f_4.webp\",\n  \"webp_1.5x\": \"preset_thumb/webp_1.5x/fs_frosted_window_portrait_f_4.webp\",\n  \"webp_2x\": \"preset_thumb/webp_2x/fs_frosted_window_portrait_f_4.webp\",\n  \"webp_3x\": \"preset_thumb/webp_3x/fs_frosted_window_portrait_f_4.webp\",\n  \"webp_4x\": \"preset_thumb/webp_4x/fs_frosted_window_portrait_f_4.webp\",\n  \"lottie_1x\": \"preset_thumb/lottie_1x/fs_frosted_window_portrait_f_4.json\",\n  \"lottie_1.5x\": \"preset_thumb/lottie_1.5x/fs_frosted_window_portrait_f_4.json\",\n  \"lottie_2x\": \"preset_thumb/lottie_2x/fs_frosted_window_portrait_f_4.json\",\n  \"lottie_3x\": \"preset_thumb/lottie_3x/fs_frosted_window_portrait_f_4.json\",\n  \"lottie_4x\": \"preset_thumb/lottie_4x/fs_frosted_window_portrait_f_4.json\",\n  \"lottie_avif_1x\": \"preset_thumb/lottie_avif_1x/fs_frosted_window_
